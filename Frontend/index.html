            );
        }
        // --- COMPOSANT MESSAGERIE PRIVÉE (Correction : Scroll & Filtres) ---
        function Messages({ utilisateurConnecte, contactPreselectionne }) {
            const [tout, setTout] = React.useState([]); 
            const [filtre, setFiltre] = React.useState('tous');
            
            const [contactSelectionne, setContactSelectionne] = React.useState(null);
            const [discussionType, setDiscussionType] = React.useState('prive'); 
            const [historiqueMessages, setHistoriqueMessages] = React.useState([]);
            const [nouveauMessage, setNouveauMessage] = React.useState("");

            const [modalGroupe, setModalGroupe] = React.useState(false);
            const [nomNouveauGroupe, setNomNouveauGroupe] = React.useState("");
            const [membresCoches, setMembresCoches] = React.useState([]);
            const [listeContacts, setListeContacts] = React.useState([]); 

            const chatContainerRef = React.useRef(null);

            const chargerTout = () => {
                if (!utilisateurConnecte) return;
                
                Promise.all([
                    fetch("../Backend/get_utilisateurs.php").then(r => r.json()),
                    fetch(`../Backend/get_salons.php?user_id=${utilisateurConnecte.ID}`).then(r => r.json()),
                    fetch(`../Backend/get_chats_evenements.php?user_id=${utilisateurConnecte.ID}`).then(r => r.json())
                ]).then(([users, salons, evts]) => {
                    const liste = [
                        ...users.filter(u => u.ID != utilisateurConnecte.ID).map(u => ({...u, type: 'prive', label: u.Nom, icon: '👤'})),
                        ...salons.map(s => ({...s, type: 'salon', label: s.Nom, icon: '🔒'})),
                        ...evts.map(e => ({...e, type: 'evenement', label: e.Titre, icon: '📢'}))
                    ];
                    setTout(liste);
                    setListeContacts(users.filter(u => u.ID != utilisateurConnecte.ID));
                });
            };

            React.useEffect(() => { 
                chargerTout(); 
                if (contactPreselectionne) ouvrirDiscussion(contactPreselectionne);
            }, [utilisateurConnecte]);

            // Scroll automatique vers le bas
            React.useEffect(() => {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [historiqueMessages]);

            const discussionsFiltrees = filtre === 'tous' ? tout : tout.filter(item => item.type === filtre);

            const ouvrirDiscussion = (item) => {
                setContactSelectionne(item);
                setDiscussionType(item.type);
                
                let url, body;
                if (item.type === 'prive') {
                    url = "../Backend/get_messages.php";
                    body = { user1: utilisateurConnecte.ID, user2: item.ID };
                } else if (item.type === 'evenement') {
                    url = "../Backend/get_messages_evenement.php";
                    body = { evenement_id: item.ID };
                } else {
                    url = "../Backend/get_messages_salon.php";
                    body = { salon_id: item.ID };
                }

                fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) })
                    .then(r => r.json())
                    .then(data => setHistoriqueMessages(data.erreur ? [] : data));
            };

            const handleEnvoyer = (e) => {
                e.preventDefault();
                if (nouveauMessage.trim() === "") return;

                let url, payload;
                if (discussionType === 'prive') {
                    url = "../Backend/envoyer_message.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, destinataire_id: contactSelectionne.ID, contenu: nouveauMessage };
                } else if (discussionType === 'evenement') {
                    url = "../Backend/envoyer_message_evenement.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, evenement_id: contactSelectionne.ID, contenu: nouveauMessage };
                } else {
                    url = "../Backend/envoyer_message_salon.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, salon_id: contactSelectionne.ID, contenu: nouveauMessage };
                }

                fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        setNouveauMessage("");
                        ouvrirDiscussion(contactSelectionne);
                    }
                });
            };

            if (!utilisateurConnecte) return <div className="card">Veuillez vous connecter.</div>;

            return (
                <div className="messages-layout">
                    {/* ... (Modale groupe identique) ... */}
                    
                    <div className="contacts-sidebar">
                        <button className="btn-primary" style={{ padding: '0.5rem', marginBottom: '1rem', borderRadius: '20px' }} onClick={() => setModalGroupe(true)}>➕ Nouveau Groupe</button>
                        
                        <div className="filter-bar">
                            {['tous', 'prive', 'salon', 'evenement'].map(f => (
                                <button key={f} onClick={() => setFiltre(f)} className={`filter-btn ${filtre === f ? 'active' : ''}`}>
                                    {f.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {discussionsFiltrees.map(item => (
                            <div key={`${item.type}-${item.ID}`} onClick={() => ouvrirDiscussion(item)} className={`contact-item ${contactSelectionne?.ID === item.ID && discussionType === item.type ? 'active' : ''}`}>
                                <strong>{item.icon} {item.label}</strong>
                            </div>
                        ))}
                    </div>

                    <div className="chat-area">
                        {contactSelectionne ? (
                            <React.Fragment>
                                <h3 style={{ color: 'var(--orange-primary)', marginBottom: '1rem' }}>{contactSelectionne.label}</h3>
                                
                                {/* LE FIX EST ICI : Ajout des styles pour forcer le scroll */}
                                <div className="messages-container" ref={chatContainerRef} style={{ overflowY: 'auto', flex: '1 1 0', minHeight: '0' }}>
                                    {historiqueMessages.map(msg => {
                                        const estMoi = msg.Expediteur_ID === utilisateurConnecte.ID;
                                        return (
                                            <div key={msg.ID} style={{ display: 'flex', flexDirection: 'column', alignItems: estMoi ? 'flex-end' : 'flex-start', marginBottom: '0.6rem' }}>
                                                <div className={`msg-bulle ${estMoi ? 'msg-moi' : 'msg-autre'}`}>{msg.Contenu}</div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <form onSubmit={handleEnvoyer} style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem' }}>
                                    <input value={nouveauMessage} onChange={e => setNouveauMessage(e.target.value)} placeholder="Message..." required />
                                    <button type="submit" className="btn-primary" style={{ borderRadius: '20px' }}>➤</button>
                                </form>
                            </React.Fragment>
                        ) : (
                            <p style={{ textAlign: 'center', marginTop: '20%', color: 'var(--text-muted)' }}>Sélectionnez une discussion.</p>
                        )}
                    </div>
                </div>
            );
        }
        // --- NOUVEAU COMPOSANT : CONNEXION / INSCRIPTION ---
        function Authentification({ onConnect }) {
            const [isLogin, setIsLogin] = React.useState(true);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setMessage("Chargement...");

                // Le fetch pointe vers login.php ou inscription.php selon le mode
                const url = isLogin ? "../Backend/login.php" : "../Backend/inscription.php";

                fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.erreur) {
                            setMessage("❌ " + data.erreur);
                        } else {
                            if (isLogin) {
                                setMessage("✅ Connexion réussie !");
                                onConnect(data.utilisateur); // Transmet l'utilisateur au composant principal
                            } else {
                                setMessage("✅ Inscription réussie ! Vous pouvez maintenant vous connecter.");
                                setIsLogin(true); // Bascule sur l'onglet connexion
                            }
                        }
                    })
                    .catch(() => setMessage("❌ Erreur de communication avec le serveur."));
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)' }}>{isLogin ? "Se connecter" : "Créer un compte"}</h2>
                    <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {!isLogin && (
                            <input type="text" placeholder="Nom complet" value={formData.nom} onChange={e => setFormData({ ...formData, nom: e.target.value })} required />
                        )}
                        <input type="email" placeholder="Adresse Email" value={formData.email} onChange={e => setFormData({ ...formData, email: e.target.value })} required />
                        <input type="password" placeholder="Mot de passe" value={formData.motDePasse} onChange={e => setFormData({ ...formData, motDePasse: e.target.value })} required />

                        <button type="submit" className="btn-primary">{isLogin ? "Connexion" : "S'inscrire"}</button>
                    </form>
                    <p style={{ marginTop: '1.5rem', textAlign: 'center', fontSize: '0.9rem' }}>
                        {isLogin ? "Pas encore de compte ? " : "Déjà un compte ? "}
                        <span style={{ color: 'var(--orange-primary)', cursor: 'pointer', fontWeight: 'bold' }} onClick={() => setIsLogin(!isLogin)}>
                            {isLogin ? "S'inscrire" : "Se connecter"}
                        </span>
                    </p>
                    {message && <p style={{ fontWeight: 'bold', textAlign: 'center', marginTop: '1rem' }}>{message}</p>}
                </div>
            );
        }

        // --- COMPOSANT FIL D'ACTUALITÉ ---
        function FilActualite({ utilisateurConnecte, ouvrirProfil, modalOuverte, fermerModal }) {
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [fichierMedia, setFichierMedia] = React.useState(null);
            const [publications, setPublications] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            const [fluxActif, setFluxActif] = React.useState("recommandations");

            const [commentairesOuverts, setCommentairesOuverts] = React.useState(null);
            const [listeCommentaires, setListeCommentaires] = React.useState([]);

            const [idPostEnEdition, setIdPostEnEdition] = React.useState(null);
            const [texteEdition, setTexteEdition] = React.useState("");
            const [idPostEnSuppression, setIdPostEnSuppression] = React.useState(null);

            const [pubAPartager, setPubAPartager] = React.useState(null);
            const [listeContacts, setListeContacts] = React.useState([]);

            const [idPostEnSignalement, setIdPostEnSignalement] = React.useState(null);
            const [motifSignalement, setMotifSignalement] = React.useState("");

            const chargerPublications = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_publications.php?user_id=${userId}&flux=${fluxActif}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setPublications(data); setChargement(false); });
            };

            React.useEffect(() => { chargerPublications(); }, [fluxActif, utilisateurConnecte]);

            const handlePublier = (e) => {
                e.preventDefault();
                const formData = new FormData();
                formData.append('contenu', nouveauMessage);
                formData.append('auteur_id', utilisateurConnecte.ID);
                if (fichierMedia) formData.append('media', fichierMedia);

                fetch("../Backend/ajouter_publication.php", { method: "POST", body: formData })
                    .then(res => res.json())
                    .then(data => {
                        if (data.erreur) alert("❌ " + data.erreur);
                        else { setNouveauMessage(""); setFichierMedia(null); fermerModal(); chargerPublications(); }
                    });
            };

            const activerEditionInline = (pub) => {
                setIdPostEnEdition(pub.ID);
                setTexteEdition(pub.Contenu);
                setIdPostEnSuppression(null); setIdPostEnSignalement(null); setPubAPartager(null);
            };

            const validerModificationInline = (pubId) => {
                if (!texteEdition.trim()) return;
                fetch("../Backend/modifier_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID, contenu: texteEdition })
                })
                    .then(res => res.json()).then(data => {
                        if (data.erreur) alert(data.erreur);
                        else { setIdPostEnEdition(null); chargerPublications(); }
                    });
            };

            const validerSuppressionInline = (pubId) => {
                fetch("../Backend/supprimer_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.json()).then(data => {
                        if (data.erreur) alert(data.erreur);
                        else { setIdPostEnSuppression(null); chargerPublications(); }
                    });
            };

            const ouvrirSignalement = (pub) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter pour signaler.");
                setIdPostEnSignalement(idPostEnSignalement === pub.ID ? null : pub.ID);
                setMotifSignalement("");
                setPubAPartager(null); setIdPostEnEdition(null); setIdPostEnSuppression(null);
            };

            const validerSignalement = (pubId) => {
                if (!motifSignalement.trim()) return alert("Veuillez préciser la raison.");
                fetch("../Backend/signaler_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, signaleur_id: utilisateurConnecte.ID, motif: motifSignalement })
                })
                    .then(res => res.json()).then(data => {
                        alert(data.succes || data.erreur);
                        setIdPostEnSignalement(null);
                    });
            };

            const ouvrirPartage = (pub) => {
                if (!utilisateurConnecte) return alert("Connectez-vous pour partager.");
                setPubAPartager(pubAPartager === pub.ID ? null : pub.ID);
                setIdPostEnSignalement(null); setIdPostEnEdition(null); setIdPostEnSuppression(null);
                if (pubAPartager !== pub.ID) {
                    fetch("../Backend/get_utilisateurs.php")
                        .then(res => res.json())
                        .then(data => { if (!data.erreur) setListeContacts(data.filter(u => u.ID !== utilisateurConnecte.ID)); });
                }
            };

            const envoyerPartage = (contactId, pub) => {
                const lien = `\n\n--- Performance partagée ---\nDe : ${pub.Nom}\n"${pub.Contenu}"\n--------------------------`;
                fetch("../Backend/envoyer_message.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ expediteur_id: utilisateurConnecte.ID, destinataire_id: contactId, contenu: lien })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) { alert("✅ Partagé en message privé !"); setPubAPartager(null); }
                    });
            };

            return (
                <div>
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Partager une performance</h3>
                                <form onSubmit={handlePublier} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <textarea value={nouveauMessage} onChange={(e) => setNouveauMessage(e.target.value)} placeholder="Décrivez votre séance, posez une question..." rows="4" required={!fichierMedia} />
                                    <input type="file" accept="image/*,video/*" onChange={(e) => setFichierMedia(e.target.files[0])} style={{ padding: 0 }} />
                                    <button type="submit" className="btn-primary">Publier</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.5rem', justifyContent: 'center' }}>
                        <button onClick={() => setFluxActif("recommandations")} style={{ background: 'none', border: 'none', color: fluxActif === "recommandations" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "recommandations" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Pour vous</button>
                        {utilisateurConnecte && <button onClick={() => setFluxActif("abonnes")} style={{ background: 'none', border: 'none', color: fluxActif === "abonnes" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "abonnes" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Abonnements</button>}
                    </div>

                    <div>
                        {chargement ? (
                            <div className="card"><p style={{ textAlign: 'center' }}>Chargement...</p></div>
                        ) : publications.length === 0 ? (
                            <div className="card"><p style={{ textAlign: 'center' }}>Aucune publication.</p></div>
                        ) : publications.map(pub => (
                            <div key={pub.ID} className="card post" style={{ marginBottom: '1.5rem', paddingBottom: '1.5rem', borderBottom: 'none' }}>

                                <div className="post-header">
                                    <span className="post-author" onClick={() => ouvrirProfil(pub.Auteur_ID)} style={{ cursor: 'pointer', textDecoration: 'underline' }}>{pub.Nom}</span>
                                    {utilisateurConnecte && utilisateurConnecte.ID === pub.Auteur_ID && idPostEnEdition !== pub.ID ? (
                                        <div style={{ display: 'flex', gap: '0.6rem' }}>
                                            <button onClick={() => activerEditionInline(pub)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '0.8rem', textDecoration: 'underline' }}>Modifier</button>
                                            <button onClick={() => { setIdPostEnSuppression(pub.ID); setIdPostEnEdition(null); setIdPostEnSignalement(null); setPubAPartager(null); }} style={{ background: 'none', border: 'none', color: '#dc3545', cursor: 'pointer', fontSize: '0.8rem', textDecoration: 'underline' }}>Supprimer</button>
                                        </div>
                                    ) : utilisateurConnecte && utilisateurConnecte.ID !== pub.Auteur_ID && (
                                        <button onClick={() => fetch("../Backend/suivre_utilisateur.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ suiveur_id: utilisateurConnecte.ID, suivi_id: pub.Auteur_ID }) }).then(() => chargerPublications())}
                                            style={{
                                                backgroundColor: pub.EstAbonne ? 'var(--border-color)' : 'transparent',
                                                color: pub.EstAbonne ? 'var(--text-light)' : 'var(--orange-primary)',
                                                border: '1px solid var(--orange-primary)',
                                                borderRadius: '15px', padding: '0.2rem 0.8rem', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 'bold'
                                            }}>
                                            {pub.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                        </button>
                                    )}
                                </div>
                                <span className="post-date" style={{ display: 'block', marginBottom: '1rem', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{pub.Date_Publication}</span>

                                {idPostEnSuppression === pub.ID && (
                                    <div style={{ backgroundColor: 'rgba(220, 53, 69, 0.1)', border: '1px solid #dc3545', padding: '0.8rem', borderRadius: '8px', marginBottom: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span style={{ fontSize: '0.85rem', color: 'var(--text-light)' }}>Supprimer définitivement ce post ?</span>
                                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                                            <button className="btn-primary" style={{ backgroundColor: 'var(--border-color)', color: 'var(--text-light)', padding: '0.3rem 0.6rem', fontSize: '0.75rem' }} onClick={() => setIdPostEnSuppression(null)}>Annuler</button>
                                            <button className="btn-primary" style={{ backgroundColor: '#dc3545', color: 'white', padding: '0.3rem 0.6rem', fontSize: '0.75rem' }} onClick={() => validerSuppressionInline(pub.ID)}>Supprimer</button>
                                        </div>
                                    </div>
                                )}

                                {idPostEnEdition === pub.ID ? (
                                    <div style={{ marginBottom: '1rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                        <textarea value={texteEdition} onChange={(e) => setTexteEdition(e.target.value)} rows="3" style={{ fontSize: '0.95rem', padding: '0.6rem' }} />
                                        <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                                            <button className="btn-primary" style={{ backgroundColor: 'var(--border-color)', color: 'var(--text-light)', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => setIdPostEnEdition(null)}>Annuler</button>
                                            <button className="btn-primary" style={{ backgroundColor: '#28a745', color: 'white', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => validerModificationInline(pub.ID)}>Enregistrer</button>
                                        </div>
                                    </div>
                                ) : (
                                    pub.Contenu && <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                )}

                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm|ogg)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} alt="Performance" />
                                        )}
                                    </div>
                                )}

                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', borderTop: '1px solid var(--border-color)', paddingTop: '1rem', flexWrap: 'wrap' }}>
                                    <button className="btn-like" onClick={() => fetch("../Backend/liker_publication.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ publication_id: pub.ID, utilisateur_id: utilisateurConnecte.ID }) }).then(() => chargerPublications())}>🔥 Respect {pub.NbLikes > 0 && `(${pub.NbLikes})`}</button>
                                    <button className="btn-like" onClick={() => { if (commentairesOuverts === pub.ID) setCommentairesOuverts(null); else { setCommentairesOuverts(pub.ID); fetch(`../Backend/get_commentaires.php?pub_id=${pub.ID}`).then(res => res.json()).then(d => setListeCommentaires(d)); } }}>💬 Commenter</button>
                                    <button className="btn-like" style={{ borderColor: pubAPartager === pub.ID ? 'var(--orange-primary)' : '', color: pubAPartager === pub.ID ? 'var(--orange-primary)' : '' }} onClick={() => ouvrirPartage(pub)}>🔗 Partager</button>
                                    {utilisateurConnecte && utilisateurConnecte.ID !== pub.Auteur_ID && (
                                        <button className="btn-like" style={{ borderColor: idPostEnSignalement === pub.ID ? '#dc3545' : '', color: idPostEnSignalement === pub.ID ? '#dc3545' : '' }} onClick={() => ouvrirSignalement(pub)}>⚠️ Signaler</button>
                                    )}
                                </div>

                                {pubAPartager === pub.ID && (
                                    <div style={{ marginTop: '1rem', padding: '1rem', backgroundColor: 'var(--bg-dark)', borderRadius: '8px', border: '1px solid var(--orange-primary)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}>
                                            <strong style={{ color: 'var(--orange-primary)', fontSize: '0.9rem' }}>Partager cette performance :</strong>
                                            <button onClick={() => setPubAPartager(null)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}>✖</button>
                                        </div>

                                        <div style={{ display: 'flex', marginBottom: '1rem' }}>
                                            <button className="btn-like" style={{ width: '100%', justifyContent: 'center' }} onClick={() => {
                                                const url = window.location.origin + "/post/" + pub.ID;
                                                navigator.clipboard.writeText(url);
                                                alert("Lien copié dans le presse-papier !");
                                            }}>📋 Copier le lien</button>
                                        </div>

                                        <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Ou envoyer en message interne :</div>
                                        <div style={{ display: 'flex', gap: '0.5rem', overflowX: 'auto', paddingBottom: '0.5rem' }}>
                                            {listeContacts.length === 0 ? <span style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>Aucun contact disponible.</span> : listeContacts.map(c => (
                                                <button key={c.ID} onClick={() => envoyerPartage(c.ID, pub)} className="btn-like" style={{ whiteSpace: 'nowrap', backgroundColor: 'var(--border-color)', color: 'var(--text-light)' }}>
                                                    👤 {c.Nom}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {idPostEnSignalement === pub.ID && (
                                    <div style={{ marginTop: '1rem', padding: '1rem', backgroundColor: 'rgba(220, 53, 69, 0.05)', borderRadius: '8px', border: '1px dashed #dc3545' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}><strong style={{ color: '#dc3545', fontSize: '0.9rem' }}>Signaler :</strong><button onClick={() => setIdPostEnSignalement(null)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}>✖</button></div>
                                        <textarea placeholder="Motif du signalement..." value={motifSignalement} onChange={(e) => setMotifSignalement(e.target.value)} rows="2" style={{ fontSize: '0.9rem', padding: '0.6rem', borderColor: '#dc3545' }} />
                                        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '0.5rem', marginTop: '0.5rem' }}>
                                            <button className="btn-primary" style={{ backgroundColor: 'var(--border-color)', color: 'var(--text-light)', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => setIdPostEnSignalement(null)}>Annuler</button>
                                            <button className="btn-primary" style={{ backgroundColor: '#dc3545', color: 'white', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => validerSignalement(pub.ID)}>Envoyer</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        // --- COMPOSANT PROFIL PUBLIC (Vue pour les visiteurs) ---
        function ProfilPublic({ id, visiteur, fermer, demarrerDiscussion }) {
            const [data, setData] = React.useState(null);
            const [chargement, setChargement] = React.useState(true);

            const [modeSignalement, setModeSignalement] = React.useState(false);
            const [motifSignalement, setMotifSignalement] = React.useState("");

            const chargerProfil = () => {
                fetch(`../Backend/get_profil_public.php?id=${id}&visiteur=${visiteur ? visiteur.ID : 0}`)
                    .then(res => res.json())
                    .then(resData => {
                        if (!resData.erreur) setData(resData);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerProfil(); }, [id]);

            const handleActionAbonnement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour vous abonner.");
                fetch("../Backend/suivre_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ suiveur_id: visiteur.ID, suivi_id: id })
                })
                    .then(res => res.json())
                    .then(d => {
                        if (!d.erreur) chargerProfil();
                    });
            };

            const ouvrirSignalement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour signaler un profil.");
                setModeSignalement(!modeSignalement);
                setMotifSignalement("");
            };

            const validerSignalement = () => {
                if (!motifSignalement.trim()) return alert("Veuillez préciser la raison du signalement.");

                fetch("../Backend/signaler_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cible_id: id, signaleur_id: visiteur.ID, motif: motifSignalement })
                })
                    .then(res => res.json())
                    .then(resData => {
                        if (resData.erreur) alert("❌ " + resData.erreur);
                        else {
                            alert("✅ " + resData.succes);
                            setModeSignalement(false);
                            setMotifSignalement("");
                        }
                    });
            };

            if (chargement) return <div className="card" style={{ textAlign: 'center' }}>Chargement du profil...</div>;
            if (!data || !data.utilisateur) return <div className="card" style={{ textAlign: 'center' }}>Profil introuvable. <button className="btn-primary" onClick={fermer}>Retour</button></div>;

            const u = data.utilisateur;

            // Tri : Les posts épinglés par cet utilisateur remontent en premier
            const sortedPubs = [...data.publications].sort((a, b) => (b.Est_Epingle || 0) - (a.Est_Epingle || 0));

            return (
                <div>
                    <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', marginBottom: '1rem', fontSize: '1rem' }}>
                        ⬅ Retour
                    </button>

                    <div className="card" style={{ textAlign: 'center' }}>
                        <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: 'var(--bg-dark)' }}>
                            {u.Nom.charAt(0).toUpperCase()}
                        </div>
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{u.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{u.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'var(--text-light)' }}>{u.NbAbonnes}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'var(--text-light)' }}>{u.NbAbonnements}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        {visiteur && visiteur.ID !== u.ID && (
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.8rem', flexWrap: 'wrap' }}>
                                <button
                                    onClick={handleActionAbonnement}
                                    className="btn-primary"
                                    style={{ backgroundColor: u.EstAbonne ? '#333' : 'var(--orange-primary)', color: 'white', border: u.EstAbonne ? '1px solid var(--border-color)' : 'none' }}
                                >
                                    {u.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                </button>
                                <button
                                    onClick={() => demarrerDiscussion(u)}
                                    className="btn-primary"
                                    style={{ backgroundColor: 'transparent', border: '1px solid var(--orange-primary)', color: 'var(--orange-primary)' }}
                                >
                                    💬 Message
                                </button>

                                <button
                                    onClick={ouvrirSignalement}
                                    className="btn-primary"
                                    style={{ backgroundColor: modeSignalement ? '#dc3545' : 'transparent', border: '1px solid #dc3545', color: modeSignalement ? 'white' : '#dc3545' }}
                                >
                                    ⚠️ Signaler
                                </button>
                            </div>
                        )}

                        {modeSignalement && (
                            <div style={{ marginTop: '1.5rem', padding: '1rem', backgroundColor: 'rgba(220, 53, 69, 0.05)', borderRadius: '8px', border: '1px dashed #dc3545', textAlign: 'left' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}>
                                    <strong style={{ color: '#dc3545', fontSize: '0.9rem' }}>Signaler le profil de {u.Nom} :</strong>
                                    <button onClick={() => setModeSignalement(false)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}>✖</button>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    <textarea
                                        placeholder="Précisez la raison..."
                                        value={motifSignalement}
                                        onChange={(e) => setMotifSignalement(e.target.value)}
                                        rows="3"
                                        style={{ fontSize: '0.9rem', padding: '0.6rem', borderColor: '#dc3545' }}
                                    />
                                    <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '0.5rem' }}>
                                        <button className="btn-primary" style={{ backgroundColor: '#333', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => setModeSignalement(false)}>Annuler</button>
                                        <button className="btn-primary" style={{ backgroundColor: '#dc3545', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={validerSignalement}>Envoyer le signalement</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>Performances de {u.Nom}</h3>

                    {sortedPubs.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune publication pour le moment.</p>
                    ) : (
                        sortedPubs.map(pub => (
                            <div key={pub.ID} className="card post" style={{ padding: '1.5rem', border: pub.Est_Epingle == 1 ? '1px solid var(--orange-primary)' : '1px solid var(--border-color)' }}>
                                {pub.Est_Epingle == 1 && <div style={{ color: 'var(--orange-primary)', fontSize: '0.8rem', fontWeight: 'bold', marginBottom: '0.8rem' }}>📌 Mis en avant par l'athlète</div>}

                                <div className="post-header">
                                    <span className="post-author">{pub.Nom}</span>
                                    <span className="post-date">{pub.Date_Publication}</span>
                                </div>
                                <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} alt="Performance" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                        )}
                                    </div>
                                )}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects</span>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT MENU DÉROULANT DES NOTIFICATIONS (Interactif & Redirection) ---
        function NotificationsDropdown({ utilisateurConnecte, fermer, setOngletActif, setProfilCible }) {
            const [notifs, setNotifs] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            React.useEffect(() => {
                if (utilisateurConnecte) {
                    fetch(`../Backend/get_notifications.php?user_id=${utilisateurConnecte.ID}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.erreur) setNotifs(data);
                            setChargement(false);
                        });
                }
            }, [utilisateurConnecte]);

            // Fonction pour rediriger l'utilisateur et marquer comme "lu" (suppression)
            const traiterNotif = (notif) => {
                fetch("../Backend/supprimer_notification.php", {
                    method: "POST",
                    body: JSON.stringify({ notif_id: notif.ID })
                });

                if (notif.Type_Action === 'Like') {
                    setOngletActif('profil');
                    setProfilCible(null);
                } else if (notif.Type_Action === 'Abonnement') {
                    setProfilCible(notif.Acteur_ID); // Ouvre le profil de la personne
                } else if (notif.Type_Action === 'Signalement') {
                    setOngletActif('moderation');
                    setProfilCible(null);
                }
                fermer(); // Ferme le menu déroulant
            };

            // Fonction pour juste supprimer la notification sans rediriger
            const supprimerNotif = (e, id) => {
                e.stopPropagation(); // Empêche de déclencher le clic global "traiterNotif"
                fetch("../Backend/supprimer_notification.php", {
                    method: "POST",
                    body: JSON.stringify({ notif_id: id })
                }).then(() => {
                    setNotifs(notifs.filter(n => n.ID !== id));
                });
            };

            return (
                <div className="notif-dropdown">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>
                        <h3 style={{ margin: 0, color: 'var(--orange-primary)', fontSize: '1.1rem' }}>Alertes</h3>
                        <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>✖</button>
                    </div>

                    {chargement ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Vérification...</p>
                    ) : notifs.length === 0 ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Aucune activité récente.</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                            {notifs.map(n => (
                                <div key={n.ID} onClick={() => traiterNotif(n)} style={{
                                    padding: '0.8rem',
                                    backgroundColor: '#1a1a1a',
                                    borderLeft: '3px solid var(--orange-primary)',
                                    borderRadius: '4px',
                                    fontSize: '0.85rem',
                                    cursor: 'pointer',
                                    position: 'relative',
                                    transition: 'background-color 0.2s'
                                }}
                                    onMouseEnter={e => e.currentTarget.style.backgroundColor = '#2a2a2a'}
                                    onMouseLeave={e => e.currentTarget.style.backgroundColor = '#1a1a1a'}
                                >
                                    <button onClick={(e) => supprimerNotif(e, n.ID)} style={{ position: 'absolute', right: '5px', top: '5px', background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '0.9rem' }}>✖</button>

                                    <div style={{ paddingRight: '1rem' }}>
                                        {n.Type_Action === 'Like' && <span>🔥 <strong>{n.ActeurNom}</strong> a lâché un Respect.</span>}
                                        {n.Type_Action === 'Abonnement' && <span>👤 <strong>{n.ActeurNom}</strong> vous suit.</span>}
                                        {n.Type_Action === 'Signalement' && <span>⚠️ <strong>{n.ActeurNom}</strong> a signalé un contenu.</span>}
                                    </div>
                                    <div style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginTop: '0.3rem' }}>{n.Date_Notification}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT TABLEAU DE BORD DE MODÉRATION ---
        function DashboardModeration({ utilisateurConnecte }) {
            const [signalements, setSignalements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            const chargerSignalements = () => {
                fetch(`../Backend/get_signalements.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) setSignalements(data);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerSignalements(); }, []);

            const commanderAction = (sigId, pubId, action) => {
                fetch("../Backend/traiter_signalement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ signalement_id: sigId, publication_id: pubId, action: action, moderateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) {
                            alert("💼 " + data.succes);
                            chargerSignalements(); // Rafraîchit la liste
                        }
                    });
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Espace Modération</h2>
                    <p style={{ color: 'var(--text-muted)' }}>Consultez et traitez les publications signalées par la communauté.</p>

                    {chargement ? (
                        <p style={{ textAlign: 'center' }}>Chargement des alertes...</p>
                    ) : signalements.length === 0 ? (
                        <p style={{ textAlign: 'center', color: '#28a745' }}>✅ Aucun signalement en attente. Bon travail !</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            {signalements.map(s => (
                                <div key={s.ID} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', border: '1px solid #dc3545' }}>
                                    <div style={{ marginBottom: '0.5rem', fontSize: '0.9rem' }}>
                                        ⚠️ Post de <strong>{s.Auteur_Nom || s.AuteurNom}</strong> signalé pour : <span style={{ color: '#dc3545', fontWeight: 'bold' }}>{s.Motif}</span>
                                    </div>
                                    <blockquote style={{ margin: '0 0 1rem 0', paddingLeft: '0.5rem', borderLeft: '2px solid var(--border-color)', color: 'var(--text-muted)', italic: 'true' }}>
                                        "{s.PostContenu}"
                                    </blockquote>
                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'supprimer')} className="btn-primary" style={{ backgroundColor: '#dc3545', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Supprimer le post</button>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'rejeter')} className="btn-primary" style={{ backgroundColor: '#333', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Ignorer</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT PRINCIPAL DE L'APPLICATION (Avec Mode Clair/Sombre) ---
        function App() {
            const [ongletActif, setOngletActif] = React.useState('accueil');
            const [utilisateurConnecte, setUtilisateurConnecte] = React.useState(null);

            const [profilCible, setProfilCible] = React.useState(null);
            const [contactPreselectionne, setContactPreselectionne] = React.useState(null);
            const [afficherNotifs, setAfficherNotifs] = React.useState(false);
            const [modalCreationOuverte, setModalCreationOuverte] = React.useState(false);

            // --- GESTION DU THÈME ---
            const [isLightMode, setIsLightMode] = React.useState(false);

            // Charger la préférence au démarrage
            React.useEffect(() => {
                const savedTheme = localStorage.getItem('connecthub_theme');
                if (savedTheme === 'light') {
                    setIsLightMode(true);
                }
            }, []);

            // Appliquer la classe CSS et sauvegarder
            React.useEffect(() => {
                if (isLightMode) {
                    document.body.classList.add('light-mode');
                    localStorage.setItem('connecthub_theme', 'light');
                } else {
                    document.body.classList.remove('light-mode');
                    localStorage.setItem('connecthub_theme', 'dark');
                }
            }, [isLightMode]);

            const ouvrirProfil = (id) => setProfilCible(id);

            const demarrerDiscussion = (utilisateur) => {
                setContactPreselectionne(utilisateur);
                setProfilCible(null);
                setOngletActif('messages');
            };

            const handlePlusAction = () => {
                if (!utilisateurConnecte) {
                    alert("Veuillez vous connecter pour créer du contenu.");
                    setOngletActif('profil');
                    return;
                }
                if (['accueil', 'evenements', 'communautes'].includes(ongletActif)) {
                    setModalCreationOuverte(true);
                }
            };

            return (
                <div>
                    <header className="top-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem', cursor: 'pointer' }} onClick={() => { setOngletActif('accueil'); setProfilCible(null); }}>
                            <span style={{ fontSize: '1.5rem', color: 'var(--orange-primary)', fontWeight: 'bold' }}>Connect</span>
                            <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>Hub</span>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>

                            {/* BOUTON THÈME */}
                            <button
                                onClick={() => setIsLightMode(!isLightMode)}
                                style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.3rem', padding: 0 }}
                                title="Changer de thème"
                            >
                                {isLightMode ? '🌙' : '☀️'}
                            </button>

                            {utilisateurConnecte && (
                                <div className="notif-container">
                                    <button className="notif-bell" onClick={() => setAfficherNotifs(!afficherNotifs)}>🔔</button>
                                    {afficherNotifs && (
                                        <NotificationsDropdown
                                            utilisateurConnecte={utilisateurConnecte}
                                            fermer={() => setAfficherNotifs(false)}
                                            setOngletActif={setOngletActif}
                                            setProfilCible={setProfilCible}
                                        />
                                    )}
                                </div>
                            )}

                            <button className="profile-btn" onClick={() => { setOngletActif('profil'); setProfilCible(null); setAfficherNotifs(false); setModalCreationOuverte(false); }}>
                                {utilisateurConnecte && utilisateurConnecte.Photo_Profil ? (
                                    <img src={`../Backend/${utilisateurConnecte.Photo_Profil}`} alt="Profil" className="profile-pic" />
                                ) : (
                                    <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', backgroundColor: 'var(--bg-dark)' }}>
                                        {utilisateurConnecte ? utilisateurConnecte.Nom.charAt(0).toUpperCase() : '👤'}
                                    </div>
                                )}
                            </button>
                        </div>
                    </header>

                    <main>
                        <div className="content-container-grid">
                            <div className="sidebar-left-action">
                                {['accueil', 'evenements', 'communautes'].includes(ongletActif) && !profilCible && (
                                    <button className="btn-plus" onClick={handlePlusAction}>
                                        <span>➕</span> Créer
                                    </button>
                                )}
                            </div>

                            <div className="main-content-feed">
                                {profilCible ? (
                                    <ProfilPublic id={profilCible} visiteur={utilisateurConnecte} fermer={() => setProfilCible(null)} demarrerDiscussion={demarrerDiscussion} />
                                ) : (
                                    <React.Fragment>
                                        {ongletActif === 'profil' && (
                                            utilisateurConnecte ? <Profil utilisateurConnecte={utilisateurConnecte} setUtilisateurConnecte={setUtilisateurConnecte} setOngletActif={setOngletActif} />
                                                : <Authentification onConnect={(user) => { setUtilisateurConnecte(user); setOngletActif('accueil'); }} />
                                        )}

                                        {ongletActif === 'accueil' && <FilActualite utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'communautes' && <Communautes utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'evenements' && <Evenements utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'messages' && <Messages utilisateurConnecte={utilisateurConnecte} contactPreselectionne={contactPreselectionne} />}
                                        {ongletActif === 'recherche' && <Recherche utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} />}
                                        {ongletActif === 'moderation' && <DashboardModeration utilisateurConnecte={utilisateurConnecte} />}
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    </main>

                    <nav className="bottom-nav">
                        <div className={`nav-item ${ongletActif === 'accueil' ? 'active' : ''}`} onClick={() => { setOngletActif('accueil'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon" style={{ fontSize: '1.6rem', color: ongletActif === 'accueil' ? 'var(--orange-primary)' : 'inherit' }}>🏠</span>
                            <span style={{ fontSize: '0.7rem' }}>Accueil</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'communautes' ? 'active' : ''}`} onClick={() => { setOngletActif('communautes'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">👥</span>
                            <span style={{ fontSize: '0.7rem' }}>Hub</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'evenements' ? 'active' : ''}`} onClick={() => { setOngletActif('evenements'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">📅</span>
                            <span style={{ fontSize: '0.7rem' }}>Événements</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'messages' ? 'active' : ''}`} onClick={() => { setOngletActif('messages'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">💬</span>
                            <span style={{ fontSize: '0.7rem' }}>Messages</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'recherche' ? 'active' : ''}`} onClick={() => { setOngletActif('recherche'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">🔍</span>
                            <span style={{ fontSize: '0.7rem' }}>Recherche</span>
                        </div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
