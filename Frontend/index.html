<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub - Sport & Performance</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* === NOUVELLE DA : NOIR ET ORANGE === */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --orange-primary: #FF6B00;
            --orange-hover: #e65c00;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        /* === THÈME CLAIR (Surcharge des variables) === */
        body.light-mode {
            --bg-dark: #f0f2f5;
            --bg-card: #ffffff;
            --orange-primary: #FF6B00;
            /* On garde l'orange emblématique */
            --orange-hover: #e65c00;
            --text-light: #121212;
            /* Le texte devient foncé */
            --text-muted: #666666;
            --border-color: #dddddd;
        }

        /* Astuce pour forcer les inputs/textareas à s'adapter même avec des styles en ligne */
        body.light-mode input,
        body.light-mode textarea {
            background-color: var(--bg-card) !important;
            color: var(--text-light) !important;
            border-color: var(--border-color) !important;
        }

        body.light-mode .modal-content,
        body.light-mode .notif-dropdown {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-bottom: 70px;
            /* Espace pour la barre de navigation en bas */
        }

        /* === BANDEAU SUPÉRIEUR (Header épuré) === */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            box-sizing: border-box;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        /* === DISPOSITION INTERNE DU CONTENU === */
        .content-container-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1.5rem;
            align-items: start;
            width: 100%;
        }

        .sidebar-left-action {
            position: sticky;
            top: 90px;
        }

        /* Bouton Plus dans la colonne de gauche */
        .sidebar-left-action .btn-plus {
            width: 100%;
            background-color: var(--orange-primary);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0.8rem 0.5rem;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .sidebar-left-action .btn-plus:hover {
            background-color: var(--orange-hover);
            transform: translateY(-2px);
        }

        /* Zone principale globale élargie */
        main {
            padding-top: 90px;
            padding-bottom: 80px;
            max-width: 750px;
            margin: auto;
        }

        @media (max-width: 650px) {
            .content-container-grid {
                grid-template-columns: 1fr;
            }

            .sidebar-left-action {
                position: relative;
                top: 0;
                margin-bottom: 1rem;
            }
        }

        /* === MENU NOTIFICATIONS FLOTTANT === */
        .notif-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .notif-bell {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            padding: 0;
            margin-right: 1rem;
        }

        .notif-dropdown {
            position: absolute;
            top: 45px;
            right: -50px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 1rem;
        }

        /* === MODALE (Fenêtre de création en superposition) === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--orange-primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            position: relative;
            animation: apparition 0.2s ease-out;
        }

        @keyframes apparition {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: white;
        }

        /* Profil / Connexion (Haut Droite) */
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-weight: bold;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--orange-primary);
            object-fit: cover;
        }

        /* Cartes (Cards) */
        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        /* Formulaire & Boutons */
        textarea,
        input {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--orange-primary);
        }

        .btn-primary {
            background-color: var(--orange-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background-color: var(--orange-hover);
        }

        /* Publications */
        .post {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .post:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            align-items: center;
        }

        .post-author {
            font-weight: bold;
            color: var(--orange-primary);
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-like {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-like:hover,
        .btn-like.active {
            border-color: var(--orange-primary);
            color: var(--orange-primary);
        }

        /* Navigation Bas (Mobile/App style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            gap: 0.3rem;
        }

        .nav-item.active {
            color: var(--orange-primary);
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        /* === NOUVEAU LAYOUT MESSAGERIE (Adaptatif Clair/Sombre) === */
        /* === LAYOUT MESSAGERIE AJUSTÉ (Largeur Max & Hauteur Dynamique) === */
        .messages-layout {
            display: grid;
            grid-template-columns: 220px 1fr; /* Sidebar légèrement plus large */
            gap: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            /* Hauteur dynamique : occupe l'espace entre header (70px) et nav (70px) + marges */
            height: calc(100vh - 190px); 
            min-height: 400px;
            overflow: hidden;
            width: 100%; /* Occupe toute la largeur disponible de la colonne */
        }

        .contacts-sidebar {
            border-right: 1px solid var(--border-color);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background-color: var(--bg-dark);
        }

        .contact-item {
            padding: 0.8rem;
            background-color: var(--bg-card);
            color: var(--text-light);
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .contact-item:hover,
        .contact-item.active {
            border-color: var(--orange-primary);
            background-color: rgba(255, 107, 0, 0.08);
            /* Effet orangé léger */
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            height: 100%;
            box-sizing: border-box;
            background-color: transparent;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
        }

        /* Nouvelles classes pour les bulles de discussion */
        .msg-bulle {
            padding: 0.6rem 1rem;
            border-radius: 15px;
            font-size: 0.95rem;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        /* Ajustement du conteneur de recherche pour éviter le scroll */
        .search-controls {
            display: flex;
            flex-wrap: wrap;
            /* Permet le passage à la ligne */
            gap: 0.5rem;
            margin-top: 1rem;
            align-items: center;
        }

        .onglet-container {
            display: flex;
            flex-wrap: wrap;
            /* Les onglets sautent à la ligne si besoin */
            gap: 0.5rem;
            flex: 1;
        }

        .msg-moi {
            background-color: var(--orange-primary);
            color: white;
            /* Le texte sur fond orange reste toujours blanc */
            border-bottom-right-radius: 2px;
        }

        .msg-autre {
            background-color: var(--border-color);
            color: var(--text-light);
            /* S'adapte en noir ou blanc selon le thème */
            border-bottom-left-radius: 2px;
        }

        /* Boutons de filtre dans la messagerie */
        /* Boutons de filtre arrondis et élégants */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            /* Empêche le débordement horizontal */
        }

        .filter-btn {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 20px;
            /* Arrondi total pour un look "pill" */
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--orange-primary);
            color: white;
            border-color: var(--orange-primary);
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- COMPOSANT PROFIL PERSONNEL ---
        function Profil({ utilisateurConnecte, setUtilisateurConnecte, setOngletActif }) {
            const [sousOnglet, setSousOnglet] = React.useState('publications');
            const [modeEditionForm, setModeEditionForm] = React.useState(false);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [fichierAvatar, setFichierAvatar] = React.useState(null);
            const [message, setMessage] = React.useState('');

            const [donneesReseau, setDonneesReseau] = React.useState(null);
            const [chargementDonnees, setChargementDonnees] = React.useState(true);

            const chargerDonneesPerso = () => {
                fetch(`../Backend/get_profil_public.php?id=${utilisateurConnecte.ID}&visiteur=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setDonneesReseau(data); setChargementDonnees(false); });
            };

            React.useEffect(() => { chargerDonneesPerso(); }, [utilisateurConnecte]);

            const lancerEdition = () => {
                setFormData({ nom: utilisateurConnecte.Nom, email: utilisateurConnecte.Email, motDePasse: '' });
                setFichierAvatar(null);
                setModeEditionForm(true);
                setMessage('');
            };

            const handleSauvegarder = (e) => {
                e.preventDefault();
                const formObj = new FormData();
                formObj.append('id', utilisateurConnecte.ID);
                formObj.append('nom', formData.nom);
                formObj.append('email', formData.email);
                formObj.append('motDePasse', formData.motDePasse);
                if (fichierAvatar) formObj.append('avatar', fichierAvatar);

                fetch("../Backend/modifier_profil.php", {
                    method: "POST",
                    body: formObj
                })
                    .then(res => res.json()).then(data => {
                        if (data.erreur) setMessage("❌ " + data.erreur);
                        else {
                            setMessage("✅ Profil mis à jour !");
                            setUtilisateurConnecte(data.utilisateur);
                            setModeEditionForm(false);
                            chargerDonneesPerso();
                        }
                    });
            };

            const handleEpingler = (pubId) => {
                fetch("../Backend/epingler_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.text())
                    .then(text => {
                        try {
                            const data = JSON.parse(text);
                            if (data.erreur) {
                                alert("Erreur Serveur : " + data.erreur);
                            } else {
                                chargerDonneesPerso();
                            }
                        } catch (e) {
                            alert("Erreur fatale (Voir console F12). Réponse du serveur : " + text);
                            console.error("Réponse brute du serveur :", text);
                        }
                    })
                    .catch(err => alert("Erreur réseau : " + err));
            };

            const uStats = donneesReseau ? donneesReseau.utilisateurs || donneesReseau.utilisateur : utilisateurConnecte;

            const mesPubs = donneesReseau && donneesReseau.publications
                ? [...donneesReseau.publications].sort((a, b) => (b.Est_Epingle || 0) - (a.Est_Epingle || 0))
                : [];

            return (
                <div>
                    <div className="card" style={{ textAlign: 'center' }}>
                        {utilisateurConnecte.Photo_Profil ? (
                            <img src={`../Backend/${utilisateurConnecte.Photo_Profil}`} alt="Profil" className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'block' }} />
                        ) : (
                            <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: 'var(--bg-dark)' }}>
                                {utilisateurConnecte.Nom.charAt(0).toUpperCase()}
                            </div>
                        )}

                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{utilisateurConnecte.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{utilisateurConnecte.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'var(--text-light)' }}>{uStats.NbAbonnes || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'var(--text-light)' }}>{uStats.NbAbonnements || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                            <button onClick={() => setSousOnglet('publications')} style={{ background: 'none', border: 'none', color: sousOnglet === 'publications' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1rem', borderBottom: sousOnglet === 'publications' ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Performances</button>
                            <button onClick={() => setSousOnglet('parametres')} style={{ background: 'none', border: 'none', color: sousOnglet === 'parametres' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1rem', borderBottom: sousOnglet === 'parametres' ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Paramètres</button>
                        </div>
                    </div>

                    {sousOnglet === 'publications' ? (
                        <div>
                            <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem', fontSize: '1.1rem' }}>Vos performances publiées</h3>
                            {chargementDonnees ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Chargement...</p> : mesPubs.length === 0 ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune activité partagée.</p> : mesPubs.map(pub => (
                                <div key={pub.ID} className="card post" style={{ position: 'relative', border: pub.Est_Epingle == 1 ? '1px solid var(--orange-primary)' : '1px solid var(--border-color)' }}>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
                                        <div>
                                            {pub.Est_Epingle == 1 && <div style={{ color: 'var(--orange-primary)', fontSize: '0.8rem', fontWeight: 'bold', marginBottom: '0.3rem' }}>📌 Épinglé</div>}
                                            <span className="post-date" style={{ display: 'block', fontSize: '0.85rem' }}>{pub.Date_Publication}</span>
                                        </div>
                                        <button onClick={() => handleEpingler(pub.ID)} style={{ background: 'transparent', border: '1px solid var(--orange-primary)', color: 'var(--orange-primary)', padding: '0.3rem 0.6rem', borderRadius: '15px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                            {pub.Est_Epingle == 1 ? 'Désépingler' : '📌 Épingler'}
                                        </button>
                                    </div>

                                    <p style={{ whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>

                                    {pub.Media_URL && (
                                        <div style={{ textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden', marginBottom: '1rem' }}>
                                            {pub.Media_URL.match(/\.(mp4|webm|ogg)$/i) ? (
                                                <video controls style={{ maxWidth: '100%', maxHeight: '350px', display: 'block', margin: '0 auto' }}>
                                                    <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                                </video>
                                            ) : (
                                                <img src={`../Backend/${pub.Media_URL}`} style={{ maxWidth: '100%', maxHeight: '350px', objectFit: 'contain' }} alt="Performance" />
                                            )}
                                        </div>
                                    )}

                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects reçus</span>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="card">
                            {!modeEditionForm ? (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <button className="btn-primary" onClick={lancerEdition}>⚙️ Modifier mes informations</button>
                                    {utilisateurConnecte.Role === 'Moderateur' && (
                                        <div style={{ marginTop: '1.5rem', borderTop: '1px solid var(--border-color)', paddingTop: '1.5rem' }}>
                                            <DashboardModeration utilisateurConnecte={utilisateurConnecte} />
                                        </div>
                                    )}
                                    <button className="btn-primary" style={{ backgroundColor: '#333', marginTop: '1rem' }} onClick={() => { setUtilisateurConnecte(null); setOngletActif('accueil'); }}>Se déconnecter</button>
                                </div>
                            ) : (
                                <form onSubmit={handleSauvegarder} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <h3 style={{ color: 'var(--orange-primary)', marginTop: 0, fontSize: '1.1rem' }}>Mettre à jour le profil</h3>

                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Changer la photo de profil</label>
                                        <input type="file" accept="image/*" onChange={e => setFichierAvatar(e.target.files[0])} style={{ padding: 0 }} />
                                    </div>

                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nom d'athlète</label>
                                        <input type="text" value={formData.nom} onChange={e => setFormData({ ...formData, nom: e.target.value })} required />
                                    </div>
                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Adresse Email</label>
                                        <input type="email" value={formData.email} onChange={e => setFormData({ ...formData, email: e.target.value })} required />
                                    </div>
                                    <div>

        }

        // --- COMPOSANT ÉVÉNEMENTS (Correction du mode clair pour le calendrier et bouton) ---
        function Evenements({ utilisateurConnecte, modalOuverte, fermerModal }) {
            const [listeEvenements, setListeEvenements] = React.useState([]);
            const [mesEvenements, setMesEvenements] = React.useState([]);
            const [dateCalendrier, setDateCalendrier] = React.useState(new Date());
            const [chargement, setChargement] = React.useState(true);

            const [nouveauEvt, setNouveauEvt] = React.useState({ titre: '', description: '', date: '', lieu: '' });

            const chargerDonnees = () => {
                fetch("../Backend/get_evenements.php")
                    .then(r => r.json())
                    .then(data => { setListeEvenements(data.erreur ? [] : data); setChargement(false); });

                if (utilisateurConnecte) {
                    fetch(`../Backend/get_mes_evenements.php?user_id=${utilisateurConnecte.ID}`)
                        .then(r => r.json())
                        .then(data => setMesEvenements(data.erreur ? [] : data));
                }
            };

            React.useEffect(() => { chargerDonnees(); }, [utilisateurConnecte]);

            const handleCreer = (e) => {
                e.preventDefault();
                fetch("../Backend/creer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ...nouveauEvt, createur_id: utilisateurConnecte.ID })
                })
                    .then(r => r.json()).then(data => {
                        if (data.erreur) alert("❌ " + data.erreur);
                        else {
                            setNouveauEvt({ titre: '', description: '', date: '', lieu: '' });
                            fermerModal();
                            chargerDonnees();
                        }
                    });
            };

            const handleRejoindre = (id) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter pour rejoindre un événement.");

                fetch("../Backend/rejoindre_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ evenement_id: id, utilisateur_id: utilisateurConnecte.ID })
                })
                    .then(r => r.text())
                    .then(text => {
                        try {
                            const data = JSON.parse(text);
                            if (data.erreur) {
                                alert("❌ Erreur : " + data.erreur);
                            } else {
                                alert("✅ " + data.succes);
                                chargerDonnees();
                            }
                        } catch (e) {
                            alert("Erreur Serveur. Réponse brute : " + text);
                            console.error("Réponse brute du serveur :", text);
                        }
                    })
                    .catch(err => alert("Erreur réseau : " + err));
            };

            const moisActuel = dateCalendrier.getMonth();
            const anneeActuelle = dateCalendrier.getFullYear();
            const nomsMois = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
            const joursSemaine = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

            const premierJourDuMois = new Date(anneeActuelle, moisActuel, 1).getDay();
            const joursDansLeMois = new Date(anneeActuelle, moisActuel + 1, 0).getDate();

            const decalage = premierJourDuMois === 0 ? 6 : premierJourDuMois - 1;

            const cellulesCalendrier = [];
            for (let i = 0; i < decalage; i++) cellulesCalendrier.push(null);
            for (let i = 1; i <= joursDansLeMois; i++) cellulesCalendrier.push(i);

            const getEvenementsDuJour = (jour) => {
                if (!jour) return [];
                const dateStr = `${anneeActuelle}-${String(moisActuel + 1).padStart(2, '0')}-${String(jour).padStart(2, '0')}`;
                return mesEvenements.filter(e => e.Date_Evenement && e.Date_Evenement.startsWith(dateStr));
            };

            const moisPrecedent = () => setDateCalendrier(new Date(anneeActuelle, moisActuel - 1, 1));
            const moisSuivant = () => setDateCalendrier(new Date(anneeActuelle, moisActuel + 1, 1));

            return (
                <div>
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Créer un Événement</h3>
                                <form onSubmit={handleCreer} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <input type="text" placeholder="Titre de l'événement..." value={nouveauEvt.titre} onChange={e => setNouveauEvt({ ...nouveauEvt, titre: e.target.value })} required />
                                    <input type="datetime-local" value={nouveauEvt.date} onChange={e => setNouveauEvt({ ...nouveauEvt, date: e.target.value })} required style={{ padding: '0.8rem', backgroundColor: 'var(--bg-dark)', color: 'var(--text-light)', border: '1px solid var(--border-color)', borderRadius: '8px' }} />
                                    <input type="text" placeholder="Lieu (Ville, Salle, Parc...)" value={nouveauEvt.lieu} onChange={e => setNouveauEvt({ ...nouveauEvt, lieu: e.target.value })} required />
                                    <textarea placeholder="Description, programme, prérequis..." value={nouveauEvt.description} onChange={e => setNouveauEvt({ ...nouveauEvt, description: e.target.value })} rows="4" required />
                                    <button type="submit" className="btn-primary">Publier l'événement</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {utilisateurConnecte && (
                        <div className="card" style={{ marginBottom: '2rem', padding: '1rem' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                <button onClick={moisPrecedent} style={{ background: 'none', border: 'none', color: 'var(--orange-primary)', cursor: 'pointer', fontSize: '1.2rem' }}>◀</button>
                                <h3 style={{ margin: 0, color: 'var(--text-light)' }}>Mon Calendrier : {nomsMois[moisActuel]} {anneeActuelle}</h3>
                                <button onClick={moisSuivant} style={{ background: 'none', border: 'none', color: 'var(--orange-primary)', cursor: 'pointer', fontSize: '1.2rem' }}>▶</button>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px', textAlign: 'center', marginBottom: '0.5rem' }}>
                                {joursSemaine.map(j => <strong key={j} style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>{j}</strong>)}
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px' }}>
                                {cellulesCalendrier.map((jour, index) => {
                                    const evts = getEvenementsDuJour(jour);
                                    const estAujourdhui = jour === new Date().getDate() && moisActuel === new Date().getMonth() && anneeActuelle === new Date().getFullYear();

                                    return (
                                        <div key={index} style={{
                                            minHeight: '80px',
                                            backgroundColor: 'var(--bg-dark)',
                                            border: estAujourdhui ? '1px solid var(--orange-primary)' : '1px solid var(--border-color)',
                                            borderRadius: '6px',
                                            padding: '4px',
                                            display: 'flex',
                                            flexDirection: 'column'
                                        }}>
                                            <span style={{ fontSize: '0.85rem', color: estAujourdhui ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: estAujourdhui ? 'bold' : 'normal', alignSelf: 'flex-end' }}>
                                                {jour}
                                            </span>

                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', marginTop: '4px' }}>
                                                {evts.map(e => (
                                                    <div key={e.ID} style={{
                                                        backgroundColor: 'var(--orange-primary)',
                                                        color: 'white',
                                                        fontSize: '0.7rem',
                                                        padding: '2px 4px',
                                                        borderRadius: '4px',
                                                        whiteSpace: 'nowrap',
                                                        overflow: 'hidden',
                                                        textOverflow: 'ellipsis',
                                                        fontWeight: 'bold'
                                                    }} title={`${e.Titre} - ${e.Lieu}`}>
                                                        {e.Titre}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <h2 style={{ color: 'var(--orange-primary)', marginBottom: '1rem' }}>Tous les Événements</h2>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {chargement ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche d'événements...</p>
                        ) : listeEvenements.length === 0 ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun événement à venir.</p>
                        ) : (
                            listeEvenements.map(evt => {
                                const estInscrit = mesEvenements.some(m => m.ID == evt.ID);

                                return (
                                    <div key={evt.ID} className="card" style={{ borderLeft: '4px solid #28a745' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                            <div>
                                                <h3 style={{ margin: '0 0 0.5rem 0', color: 'var(--text-light)' }}>{evt.Titre}</h3>
                                                <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', marginBottom: '0.5rem' }}>
                                                    <span>📅 {evt.Date_Evenement}</span> • <span>📍 {evt.Lieu}</span>
                                                </div>
                                                <p style={{ margin: '0 0 1rem 0', fontSize: '0.9rem', color: 'var(--text-light)' }}>{evt.Description}</p>
                                            </div>
                                        </div>

                                        <div style={{ borderTop: '1px solid var(--border-color)', paddingTop: '0.8rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Organisé par <strong>{evt.Organisateur_Nom}</strong></span>
                                            <button
                                                onClick={() => handleRejoindre(evt.ID)}
                                                className="btn-primary"
                                                style={{
                                                    padding: '0.4rem 1rem',
                                                    fontSize: '0.8rem',
                                                    backgroundColor: estInscrit ? 'var(--border-color)' : '#28a745',
                                                    color: estInscrit ? 'var(--text-light)' : 'white'
                                                }}
                                            >
                                                {estInscrit ? 'Inscrit ✓' : 'S\'inscrire'}
                                            </button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        }
        function Recherche({ utilisateurConnecte, ouvrirProfil }) {
            const [requete, setRequete] = React.useState("");
            const [ongletActif, setOngletActif] = React.useState("tous");
            const [resultats, setResultats] = React.useState([]);
            const [chargement, setChargement] = React.useState(false);
            const [triActif, setTriActif] = React.useState("pertinence");

            const onglets = [
                { id: 'tous', label: 'Tout' },
                { id: 'publications', label: 'Publications' },
                { id: 'utilisateurs', label: 'Athlètes' },
                { id: 'communautes', label: 'Hubs' },
                { id: 'evenements', label: 'Événements' }
            ];

            React.useEffect(() => {
                if (requete.trim() === "") { setResultats([]); return; }
                setChargement(true);
                fetch("../Backend/rechercher.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ requete: requete, type: ongletActif })
                })
                    .then(res => res.json())
                    .then(data => { setResultats(data); setChargement(false); });
            }, [requete, ongletActif]);

            // Tri intelligent basé sur ce que l'utilisateur lit
            const getTexteTri = (item) => {
                const type = item.Type_Source || ongletActif;
                if (type === 'communaute') return ("hub " + (item.Nom || "")).toLowerCase();
                if (type === 'publication') return ((item.Nom || "") + " " + (item.Contenu || "")).toLowerCase();
                return (item.Nom || item.Titre || "").toString().toLowerCase();
            };

            const getTimestamp = (item) => {
                const dateBrute = item.Date_Publication || item.Date_Evenement;
                if (!dateBrute) return null;
                const parsed = new Date(dateBrute.replace(' ', 'T')).getTime();
                return isNaN(parsed) ? null : parsed;
            };

            const resultatsTries = [...resultats].sort((a, b) => {
                if (triActif === 'pertinence') return 0;

                if (triActif === 'az') return getTexteTri(a).localeCompare(getTexteTri(b));
                if (triActif === 'za') return getTexteTri(b).localeCompare(getTexteTri(a));

                const timeA = getTimestamp(a);
                const timeB = getTimestamp(b);

                if (triActif === 'recent') {
                    if (timeA === null && timeB === null) return 0;
                    if (timeA === null) return 1;
                    if (timeB === null) return -1;
                    return timeB - timeA;
                }
                if (triActif === 'ancien') {
                    if (timeA === null && timeB === null) return 0;
                    if (timeA === null) return 1;
                    if (timeB === null) return -1;
                    return timeA - timeB;
                }
                return 0;
            });

            return (
                <div>
                    <div className="card" style={{ padding: '1rem', marginBottom: '1rem' }}>
                        <div style={{ position: 'relative' }}>
                            <span style={{ position: 'absolute', left: '15px', top: '15px', fontSize: '1.2rem', color: 'var(--text-muted)' }}>🔍</span>
                            <input
                                type="text" placeholder="Recherche globale..." value={requete}
                                onChange={(e) => setRequete(e.target.value)}
                                style={{ width: '100%', padding: '1rem 1rem 1rem 3rem', borderRadius: '25px', backgroundColor: 'var(--bg-dark)', border: '1px solid var(--border-color)', color: 'var(--text-light)' }}
                            />
                        </div>

                        <div className="search-controls">
                            <div className="onglet-container">
                                {onglets.map(onglet => (
                                    <button
                                        key={onglet.id}
                                        onClick={() => setOngletActif(onglet.id)}
                                        style={{
                                            backgroundColor: ongletActif === onglet.id ? 'var(--orange-primary)' : 'transparent',
                                            color: ongletActif === onglet.id ? 'white' : 'var(--text-muted)',
                                            border: `1px solid ${ongletActif === onglet.id ? 'var(--orange-primary)' : 'var(--border-color)'}`,
                                            padding: '0.4rem 1rem', borderRadius: '20px', cursor: 'pointer', fontWeight: ongletActif === onglet.id ? 'bold' : 'normal',
                                            fontSize: '0.85rem'
                                        }}
                                    >
                                        {onglet.label}
                                    </button>
                                ))}
                            </div>

                            <select
                                value={triActif} onChange={(e) => setTriActif(e.target.value)}
                                style={{ padding: '0.4rem 1rem', borderRadius: '20px', backgroundColor: 'var(--bg-dark)', color: 'var(--text-light)', border: '1px solid var(--border-color)', cursor: 'pointer', fontSize: '0.85rem' }}
                            >
                                <option value="pertinence">Pertinence</option>
                                <option value="recent">Plus récents</option>
                                <option value="ancien">Plus anciens</option>
                                <option value="az">A à Z</option>
                                <option value="za">Z à A</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        {requete === "" ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)', marginTop: '2rem' }}>Entrez un mot-clé pour explorer ConnectHub.</p>
                        ) : chargement ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche dynamique...</p>
                        ) : resultatsTries.length === 0 ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun résultat pour "{requete}".</p>
                        ) : (
                            resultatsTries.map((res, index) => {
                                const typeOrigine = res.Type_Source || ongletActif;
                                const cleUnique = `res-${typeOrigine}-${res.ID}-${index}`;

                                return (
                                    <div key={cleUnique} className="card" style={{ padding: '1rem', marginBottom: '0.5rem' }}>
                                        {
                                            res.Type_Source === 'utilisateur' || (!res.Type_Source && ongletActif === 'utilisateurs') ? (
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', cursor: 'pointer' }} onClick={() => ouvrirProfil(res.ID)}>
                                                    <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', width: '40px', height: '40px', backgroundColor: 'var(--bg-dark)' }}>{res.Nom ? res.Nom.charAt(0) : 'U'}</div>
                                                    <div>
                                                        <div style={{ fontWeight: 'bold', color: 'var(--text-light)' }}>{res.Nom}</div>
                                                        <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Athlète • {res.Role || 'Membre'}</div>
                                                    </div>
                                                </div>
                                            ) : res.Type_Source === 'communaute' || (!res.Type_Source && ongletActif === 'communautes') ? (
                                                <div>
                                                    <div style={{ fontWeight: 'bold', color: 'var(--orange-primary)' }}>👥 Hub {res.Nom}</div>
                                                    <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{res.Description}</p>
                                                </div>
                                            ) : res.Type_Source === 'evenement' || (!res.Type_Source && ongletActif === 'evenements') ? (
                                                <div>
                                                    <div style={{ fontWeight: 'bold', color: '#28a745' }}>📅 {res.Nom || res.Titre}</div>
                                                    <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>📍 {res.Lieu}</div>
                                                    <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{res.Description}</p>
                                                    {res.Date_Evenement && <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '0.3rem' }}>Prévu le : {res.Date_Evenement}</div>}
                                                </div>
                                            ) : res.Type_Source === 'publication' || (!res.Type_Source && ongletActif === 'publications') ? (
                                                <div>
                                                    <div className="post-author" style={{ fontSize: '0.9rem', cursor: 'pointer', textDecoration: 'underline' }} onClick={() => ouvrirProfil(res.Auteur_ID)}>{res.Nom}</div>
                                                    {res.Date_Publication && <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginBottom: '0.4rem' }}>{res.Date_Publication}</div>}
                                                    <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.9rem', color: 'var(--text-light)' }}>{res.Contenu}</p>
                                                </div>
                                            ) : null
                                        }
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        }
        // --- COMPOSANT COMMUNAUTÉS ---
        function Communautes({ utilisateurConnecte, modalOuverte, fermerModal }) {
            const [listeCommunautes, setListeCommunautes] = React.useState([]);
            const [communauteActive, setCommunauteActive] = React.useState(null);
            const [discussions, setDiscussions] = React.useState([]);

            const [vueModeration, setVueModeration] = React.useState(false);
            const [ongletAdmin, setOngletAdmin] = React.useState('demandes');
            const [listeMembres, setListeMembres] = React.useState([]);
            const [listeDemandes, setListeDemandes] = React.useState([]);

            const [nouveauGroupe, setNouveauGroupe] = React.useState({ nom: '', description: '' });
            const [titrePost, setTitrePost] = React.useState('');
            const [contenuPost, setContenuPost] = React.useState('');

            const chargerCommunautes = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_communautes.php?user_id=${userId}`)
                    .then(r => r.json()).then(data => setListeCommunautes(data));
            };

            const ouvrirCommunaute = (communaute) => {
                setCommunauteActive(communaute);
                setVueModeration(false);
                setOngletAdmin('demandes');
                chargerDiscussions(communaute.ID);
            };

            const chargerDiscussions = (id) => {
                fetch(`../Backend/get_discussions.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setDiscussions(data.erreur ? [] : data));
            };

            const chargerMembresAdmin = (id) => {
                fetch(`../Backend/get_membres_communaute.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setListeMembres(data.erreur ? [] : data));
            };

            const chargerDemandesAdmin = (id) => {
                fetch(`../Backend/get_demandes_communaute.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setListeDemandes(data.erreur ? [] : data));
            };

            const basculerModeration = () => {
                if (!vueModeration) {
                    chargerDemandesAdmin(communauteActive.ID);
                    chargerMembresAdmin(communauteActive.ID);
                }
                setVueModeration(!vueModeration);
            };

            const handleGererDemande = (demandeurId, actionRequise) => {
                fetch("../Backend/gerer_demande_communaute.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        communaute_id: communauteActive.ID,
                        demandeur_id: demandeurId,
                        moderateur_id: utilisateurConnecte.ID,
                        action: actionRequise
                    })
                })
                    .then(res => res.json()).then(data => {
                        if (data.erreur) alert("Erreur : " + data.erreur);
                        else {
                            chargerDemandesAdmin(communauteActive.ID);
                            chargerMembresAdmin(communauteActive.ID);
                            chargerCommunautes();
                        }
                    });
            };

            const handlePromouvoir = (cibleId, cibleNom) => {
                if (!confirm(`Voulez-vous vraiment nommer ${cibleNom} modérateur de ce groupe ?`)) return;
                fetch("../Backend/promouvoir_moderateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ communaute_id: communauteActive.ID, cible_id: cibleId, moderateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.json()).then(data => {
                        if (data.erreur) alert("Erreur : " + data.erreur);
                        else {
                            alert("Succès : " + data.succes);
                            chargerMembresAdmin(communauteActive.ID);
                        }
                    });
            };

            React.useEffect(() => { chargerCommunautes(); }, [utilisateurConnecte]);

            const handleDemanderAdhesion = (e, id) => {
                e.stopPropagation();
                if (!utilisateurConnecte) return alert("Veuillez vous connecter.");
                fetch("../Backend/rejoindre_communaute.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ communaute_id: id, utilisateur_id: utilisateurConnecte.ID })
                })

                    return alert("Vous devez être membre approuvé pour voter.");

                setDiscussions(discussions.map(d => {

            return (

                            {communauteActive.Statut_Membre === 'Accepte' && !vueModeration && (
