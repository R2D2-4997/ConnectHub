<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub - Sport & Performance</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* === NOUVELLE DA : NOIR ET ORANGE === */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --orange-primary: #FF6B00;
            --orange-hover: #e65c00;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-bottom: 70px;
            /* Espace pour la barre de navigation en bas */
        }

        /* === BANDEAU SUPÉRIEUR (Header épuré) === */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            box-sizing: border-box;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        /* === DISPOSITION INTERNE DU CONTENU === */
        .content-container-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1.5rem;
            align-items: start;
            width: 100%;
        }

        .sidebar-left-action {
            position: sticky;
            top: 90px;
        }

        /* Bouton Plus dans la colonne de gauche */
        .sidebar-left-action .btn-plus {
            width: 100%;
            background-color: var(--orange-primary);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0.8rem 0.5rem;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .sidebar-left-action .btn-plus:hover {
            background-color: var(--orange-hover);
            transform: translateY(-2px);
        }

        /* Zone principale globale élargie */
        main {
            padding-top: 90px;
            padding-bottom: 80px;
            max-width: 750px;
            margin: auto;
        }

        @media (max-width: 650px) {
            .content-container-grid {
                grid-template-columns: 1fr;
            }

            .sidebar-left-action {
                position: relative;
                top: 0;
                margin-bottom: 1rem;
            }
        }

        /* === MENU NOTIFICATIONS FLOTTANT === */
        .notif-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .notif-bell {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            padding: 0;
            margin-right: 1rem;
        }

        .notif-dropdown {
            position: absolute;
            top: 45px;
            right: -50px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 1rem;
        }

        /* === MODALE (Fenêtre de création en superposition) === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--orange-primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            position: relative;
            animation: apparition 0.2s ease-out;
        }

        @keyframes apparition {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: white;
        }

        /* Profil / Connexion (Haut Droite) */
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-weight: bold;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--orange-primary);
            object-fit: cover;
        }

        /* Cartes (Cards) */
        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        /* Formulaire & Boutons */
        textarea,
        input {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--orange-primary);
        }

        .btn-primary {
            background-color: var(--orange-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background-color: var(--orange-hover);
        }

        /* Publications */
        .post {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .post:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            align-items: center;
        }

        .post-author {
            font-weight: bold;
            color: var(--orange-primary);
            font-size: 1.1rem;
        }

        .post-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-like {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-like:hover,
        .btn-like.active {
            border-color: var(--orange-primary);
            color: var(--orange-primary);
        }

        /* Navigation Bas (Mobile/App style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            gap: 0.3rem;
        }

        .nav-item.active {
            color: var(--orange-primary);
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        /* === NOUVEAU LAYOUT MESSAGERIE (Deux colonnes fixes) === */
        .messages-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 65vh;
            overflow: hidden;
        }

        .contacts-sidebar {
            border-right: 1px solid var(--border-color);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .contact-item {
            padding: 0.8rem;
            background-color: #111;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .contact-item:hover,
        .contact-item.active {
            border-color: var(--orange-primary);
            background-color: #1a1a1a;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            height: 100%;
            box-sizing: border-box;
            background-color: transparent;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- COMPOSANT PROFIL PERSONNEL ---
        function Profil({ utilisateurConnecte, setUtilisateurConnecte, setOngletActif }) {
            const [sousOnglet, setSousOnglet] = React.useState('publications');
            const [modeEditionForm, setModeEditionForm] = React.useState(false);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [fichierAvatar, setFichierAvatar] = React.useState(null); // Nouvel état pour l'image
            const [message, setMessage] = React.useState('');
            
            const [donneesReseau, setDonneesReseau] = React.useState(null);
            const [chargementDonnees, setChargementDonnees] = React.useState(true);

            const chargerDonneesPerso = () => {
                fetch(`../Backend/get_profil_public.php?id=${utilisateurConnecte.ID}&visiteur=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setDonneesReseau(data); setChargementDonnees(false); });
            };

            React.useEffect(() => { chargerDonneesPerso(); }, [utilisateurConnecte]);

            const lancerEdition = () => {
                setFormData({ nom: utilisateurConnecte.Nom, email: utilisateurConnecte.Email, motDePasse: '' });
                setFichierAvatar(null);
                setModeEditionForm(true);
                setMessage('');
            };

            const handleSauvegarder = (e) => {
                e.preventDefault();
                
                // On utilise FormData pour pouvoir envoyer l'image et le texte ensemble
                const formObj = new FormData();
                formObj.append('id', utilisateurConnecte.ID);
                formObj.append('nom', formData.nom);
                formObj.append('email', formData.email);
                formObj.append('motDePasse', formData.motDePasse);
                if (fichierAvatar) formObj.append('avatar', fichierAvatar);

                fetch("../Backend/modifier_profil.php", {
                    method: "POST",
                    body: formObj
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) setMessage("❌ " + data.erreur);
                    else { 
                        setMessage("✅ Profil mis à jour !"); 
                        setUtilisateurConnecte(data.utilisateur); 
                        setModeEditionForm(false); 
                        chargerDonneesPerso(); 
                    }
                });
            };

            const uStats = donneesReseau ? donneesReseau.utilisateurs || donneesReseau.utilisateur : utilisateurConnecte;
            const mesPubs = donneesReseau ? donneesReseau.publications : [];

            return (
                <div>
                    <div className="card" style={{ textAlign: 'center' }}>
                        {/* AFFICHAGE DE LA PHOTO DE PROFIL */}
                        {utilisateurConnecte.Photo_Profil ? (
                            <img 
                                src={`../Backend/${utilisateurConnecte.Photo_Profil}`} 
                                alt="Profil" 
                                className="profile-pic" 
                                style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'block' }} 
                            />
                        ) : (
                            <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: '#333' }}>
                                {utilisateurConnecte.Nom.charAt(0).toUpperCase()}
                            </div>
                        )}
                        
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{utilisateurConnecte.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{utilisateurConnecte.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{uStats.NbAbonnes || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{uStats.NbAbonnements || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                            <button onClick={() => setSousOnglet('publications')} style={{ background: 'none', border: 'none', color: sousOnglet === 'publications' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1rem', borderBottom: sousOnglet === 'publications' ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Performances</button>
                            <button onClick={() => setSousOnglet('parametres')} style={{ background: 'none', border: 'none', color: sousOnglet === 'parametres' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1rem', borderBottom: sousOnglet === 'parametres' ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Paramètres</button>
                        </div>
                    </div>

                    {sousOnglet === 'publications' ? (
                        <div>
                            <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem', fontSize: '1.1rem' }}>Vos performances publiées</h3>
                            {chargementDonnees ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Chargement...</p> : mesPubs.length === 0 ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune activité partagée.</p> : mesPubs.map(pub => (
                                <div key={pub.ID} className="card post">
                                    <span className="post-date" style={{ display: 'block', marginBottom: '0.5rem' }}>{pub.Date_Publication}</span>
                                    <p style={{ whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                    {pub.Media_URL && <div style={{ textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden', marginBottom: '1rem' }}><img src={`../Backend/${pub.Media_URL}`} style={{ maxWidth: '100%', maxHeight: '350px', objectFit: 'contain' }} /></div>}
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects reçus</span>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="card">
                            {!modeEditionForm ? (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <button className="btn-primary" onClick={lancerEdition}>⚙️ Modifier mes informations</button>
                                    {utilisateurConnecte.Role === 'Moderateur' && (
                                        <div style={{ marginTop: '1.5rem', borderTop: '1px solid var(--border-color)', paddingTop: '1.5rem' }}>
                                            <DashboardModeration utilisateurConnecte={utilisateurConnecte} />
                                        </div>
                                    )}
                                    <button className="btn-primary" style={{ backgroundColor: '#333', marginTop: '1rem' }} onClick={() => { setUtilisateurConnecte(null); setOngletActif('accueil'); }}>Se déconnecter</button>
                                </div>
                            ) : (
                                <form onSubmit={handleSauvegarder} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <h3 style={{ color: 'var(--orange-primary)', marginTop: 0, fontSize: '1.1rem' }}>Mettre à jour le profil</h3>
                                    
                                    {/* NOUVEAU CHAMP : PHOTO DE PROFIL */}
                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Changer la photo de profil</label>
                                        <input type="file" accept="image/*" onChange={e => setFichierAvatar(e.target.files[0])} style={{ padding: 0 }} />
                                    </div>

                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nom d'athlète</label>
                                        <input type="text" value={formData.nom} onChange={e => setFormData({...formData, nom: e.target.value})} required />
                                    </div>
                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Adresse Email</label>
                                        <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} required />
                                    </div>
                                    <div>
                                        <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nouveau mot de passe <small>(laisser vide pour conserver)</small></label>
                                        <input type="password" placeholder="***" value={formData.motDePasse} onChange={e => setFormData({...formData, motDePasse: e.target.value})} />
                                    </div>
                                    <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                                        <button type="button" className="btn-primary" style={{ flex: 1, backgroundColor: '#333' }} onClick={() => setModeEditionForm(false)}>Annuler</button>
                                        <button type="submit" className="btn-primary" style={{ flex: 1, backgroundColor: '#28a745' }}>Enregistrer</button>
                                    </div>
                                    {message && <p style={{ marginTop: '0.5rem', textAlign: 'center', fontSize: '0.9rem' }}>{message}</p>}
                                </form>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- COMPOSANT ÉVÉNEMENTS (Avec formulaire de création opérationnel) ---
        function Evenements({ utilisateurConnecte, modalOuverte, fermerModal }) {
            const [listeEvenements, setListeEvenements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            // État pour le formulaire de création
            const [formEvt, setFormEvt] = React.useState({ titre: '', lieu: '', date_evenement: '', description: '' });

            const chargerEvenements = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_evenements.php?user_id=${userId}`)
                    .then(r => r.json())
                    .then(data => { if (!data.erreur) setListeEvenements(data); setChargement(false); });
            };

            React.useEffect(() => { chargerEvenements(); }, [utilisateurConnecte]);

            const handleParticiper = (id) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter.");
                fetch("../Backend/participer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ evenement_id: id, utilisateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.json()).then(data => { alert(data.succes || data.info || data.erreur); chargerEvenements(); });
            };

            const soumettreEvenement = (e) => {
                e.preventDefault();
                fetch("../Backend/creer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formEvt)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.erreur) alert("❌ " + data.erreur);
                        else {
                            alert("✅ " + data.succes);
                            setFormEvt({ titre: '', lieu: '', date_evenement: '', description: '' });
                            fermerModal();
                            chargerEvenements();
                        }
                    });
            };

            return (
                <div>
                    {/* MODALE DE CRÉATION DE SESSION SÉCURISÉE */}
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Organiser un entraînement</h3>
                                <form onSubmit={soumettreEvenement} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <input type="text" placeholder="Nom de la session (ex: Séance Cardio / Muscu)" value={formEvt.titre} onChange={e => setFormEvt({ ...formEvt, titre: e.target.value })} required />
                                    <input type="text" placeholder="Lieu ou équipement (ex: Parc / Salle)" value={formEvt.lieu} onChange={e => setFormEvt({ ...formEvt, lieu: e.target.value })} required />
                                    <input type="datetime-local" value={formEvt.date_evenement} onChange={e => setFormEvt({ ...formEvt, date_evenement: e.target.value })} required />
                                    <textarea placeholder="Objectifs et exercices prévus..." value={formEvt.description} onChange={e => setFormEvt({ ...formEvt, description: e.target.value })} rows="3" />
                                    <button type="submit" className="btn-primary">Publier la session</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Sessions Sportives</h2>
                        <p style={{ margin: 0, color: 'var(--text-muted)' }}>Rejoignez un entraînement programmé par la communauté ConnectHub.</p>
                    </div>

                    {chargement ? <p style={{ textAlign: 'center' }}>Chargement...</p> : listeEvenements.map(evt => (
                        <div key={evt.ID} className="card" style={{ borderLeft: evt.EstInscrit ? '4px solid #28a745' : '4px solid var(--orange-primary)' }}>
                            <h3 style={{ margin: '0 0 0.5rem 0', color: evt.EstInscrit ? '#28a745' : 'white' }}>{evt.Titre}</h3>
                            <div style={{ fontSize: '0.9rem', color: 'var(--text-light)', marginBottom: '1rem' }}>
                                <span>📅 <strong>{evt.Date_Formatee}</strong></span><br />
                                <span>📍 {evt.Lieu}</span>
                            </div>
                            <p>{evt.Description}</p>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                                {!evt.EstInscrit ? <button onClick={() => handleParticiper(evt.ID)} style={{ flex: 1, backgroundColor: 'transparent', color: 'var(--orange-primary)', border: '1px solid var(--orange-primary)', padding: '0.6rem', borderRadius: '20px', cursor: 'pointer', fontWeight: 'bold' }}>Je participe</button> : <div style={{ flex: 1, textAlign: 'center', color: '#28a745', padding: '0.6rem', border: '1px dashed #28a745', borderRadius: '20px' }}>Place réservée ✓</div>}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🏃 {evt.NbParticipants} inscrits</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }
        // --- COMPOSANT RECHERCHE (Syntaxe Corrigée) ---
        function Recherche({ utilisateurConnecte, ouvrirProfil }) {
            const [requete, setRequete] = React.useState("");
            const [ongletActif, setOngletActif] = React.useState("tous");
            const [resultats, setResultats] = React.useState([]);
            const [chargement, setChargement] = React.useState(false);

            const onglets = [
                { id: 'tous', label: 'Tout' },
                { id: 'publications', label: 'Publications' },
                { id: 'utilisateurs', label: 'Athlètes' },
                { id: 'communautes', label: 'Communautés' },
                { id: 'evenements', label: 'Événements' }
            ];

            React.useEffect(() => {
                if (requete.trim() === "") {
                    setResultats([]);
                    return;
                }

                setChargement(true);
                fetch("../Backend/rechercher.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ requete: requete, type: ongletActif })
                })
                .then(res => res.json())
                .then(data => {
                    setResultats(data);
                    setChargement(false);
                })
                .catch(err => { console.error(err); setChargement(false); });

            }, [requete, ongletActif]);

            return (
                <div>
                    <div className="card" style={{ padding: '1rem', marginBottom: '1rem' }}>
                        <div style={{ position: 'relative' }}>
                            <span style={{ position: 'absolute', left: '15px', top: '15px', fontSize: '1.2rem' }}>🔍</span>
                            <input 
                                type="text" 
                                placeholder="Recherche globale ConnectHub..."
                                value={requete}
                                onChange={(e) => setRequete(e.target.value)}
                                style={{ width: '100%', padding: '1rem 1rem 1rem 3rem', borderRadius: '25px', backgroundColor: '#111', border: '1px solid var(--border-color)', color: 'white' }} 
                            />
                        </div>

                        <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', overflowX: 'auto', paddingBottom: '0.5rem' }}>
                            {onglets.map(onglet => (
                                <button 
                                    key={onglet.id}
                                    onClick={() => setOngletActif(onglet.id)}
                                    style={{
                                        backgroundColor: ongletActif === onglet.id ? 'var(--orange-primary)' : 'transparent',
                                        color: ongletActif === onglet.id ? 'white' : 'var(--text-muted)',
                                        border: `1px solid ${ongletActif === onglet.id ? 'var(--orange-primary)' : 'var(--border-color)'}`,
                                        padding: '0.4rem 1rem',
                                        borderRadius: '20px',
                                        cursor: 'pointer',
                                        whiteSpace: 'nowrap',
                                        fontWeight: ongletActif === onglet.id ? 'bold' : 'normal'
                                    }}
                                >
                                    {onglet.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div>
                        {requete === "" ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)', marginTop: '2rem' }}>Entrez un mot-clé pour explorer ConnectHub.</p>
                        ) : chargement ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche dynamique...</p>
                        ) : resultats.length === 0 ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun résultat pour "{requete}".</p>
                        ) : (
                            resultats.map((res, index) => (
                                <div key={res.ID || index} className="card" style={{ padding: '1rem', marginBottom: '0.5rem' }}>
                                    {
                                        res.Type_Source === 'utilisateur' || (!res.Type_Source && ongletActif === 'utilisateurs') ? (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', cursor: 'pointer' }} onClick={() => ouvrirProfil(res.ID)}>
                                                <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', width: '40px', height: '40px' }}>{res.Nom ? res.Nom.charAt(0) : 'U'}</div>
                                                <div>
                                                    <div style={{ fontWeight: 'bold' }}>{res.Nom}</div>
                                                    <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Athlète • {res.Role || 'Membre'}</div>
                                                </div>
                                            </div>
                                        ) : res.Type_Source === 'communaute' || (!res.Type_Source && ongletActif === 'communautes') ? (
                                            <div>
                                                <div style={{ fontWeight: 'bold', color: 'var(--orange-primary)' }}>👥 r/{res.Nom}</div>
                                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{res.Description}</p>
                                            </div>
                                        ) : res.Type_Source === 'evenement' || (!res.Type_Source && ongletActif === 'evenements') ? (
                                            <div>
                                                <div style={{ fontWeight: 'bold', color: '#28a745' }}>📅 {res.Nom}</div>
                                                <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>📍 {res.Lieu}</div>
                                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{res.Description}</p>
                                            </div>
                                        ) : res.Type_Source === 'publication' || (!res.Type_Source && ongletActif === 'publications') ? (
                                            <div>
                                                <div className="post-author" style={{ fontSize: '0.9rem', cursor: 'pointer', textDecoration: 'underline' }} onClick={() => ouvrirProfil(res.Auteur_ID)}>{res.Nom}</div>
                                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.9rem' }}>{res.Contenu}</p>
                                            </div>
                                        ) : null
                                    }
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }
        // --- COMPOSANT COMMUNAUTÉS (Publication réelle activée pour les membres abonnés) ---
        function Communautes({ utilisateurConnecte, modalOuverte, fermerModal }) {
            const [listeCommunautes, setListeCommunautes] = React.useState([]);
            const [communauteActive, setCommunauteActive] = React.useState(null); 
            const [discussions, setDiscussions] = React.useState([]);
            
            const [vueModeration, setVueModeration] = React.useState(false); 
            const [ongletAdmin, setOngletAdmin] = React.useState('demandes'); 
            const [listeMembres, setListeMembres] = React.useState([]);
            const [listeDemandes, setListeDemandes] = React.useState([]);
            
            const [nouveauGroupe, setNouveauGroupe] = React.useState({ nom: '', description: '' });
            const [nouveauPost, setNouveauPost] = React.useState({ titre: '', contenu: '' });

            const chargerCommunautes = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_communautes.php?user_id=${userId}`)
                    .then(r => r.json()).then(data => setListeCommunautes(data));
            };

            const ouvrirCommunaute = (communaute) => {
                setCommunauteActive(communaute);
                setVueModeration(false);
                setOngletAdmin('demandes');
                chargerDiscussions(communaute.ID);
            };

            const chargerDiscussions = (id) => {
                fetch(`../Backend/get_discussions.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setDiscussions(data.erreur ? [] : data));
            };

            const chargerMembresAdmin = (id) => {
                fetch(`../Backend/get_membres_communaute.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setListeMembres(data.erreur ? [] : data));
            };

            const chargerDemandesAdmin = (id) => {
                fetch(`../Backend/get_demandes_communaute.php?communaute_id=${id}`)
                    .then(r => r.json()).then(data => setListeDemandes(data.erreur ? [] : data));
            };

            const basculerModeration = () => {
                if (!vueModeration) {
                    chargerDemandesAdmin(communauteActive.ID);
                    chargerMembresAdmin(communauteActive.ID);
                }
                setVueModeration(!vueModeration);
            };

            const handleGererDemande = (demandeurId, actionRequise) => {
                fetch("../Backend/gerer_demande_communaute.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        communaute_id: communauteActive.ID, 
                        demandeur_id: demandeurId,
                        moderateur_id: utilisateurConnecte.ID,
                        action: actionRequise
                    })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        chargerDemandesAdmin(communauteActive.ID); 
                        chargerMembresAdmin(communauteActive.ID); 
                        chargerCommunautes(); 
                    }
                });
            };

            const handlePromouvoir = (cibleId, cibleNom) => {
                if (!confirm(`Voulez-vous vraiment nommer ${cibleNom} modérateur de ce groupe ?`)) return;
                fetch("../Backend/promouvoir_moderateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ communaute_id: communauteActive.ID, cible_id: cibleId, moderateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        alert("✅ " + data.succes);
                        chargerMembresAdmin(communauteActive.ID);
                    }
                });
            };

            React.useEffect(() => { chargerCommunautes(); }, [utilisateurConnecte]);

            const handleDemanderAdhesion = (e, id) => {
                e.stopPropagation(); 
                if (!utilisateurConnecte) return alert("Veuillez vous connecter.");
                fetch("../Backend/rejoindre_communaute.php", { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ communaute_id: id, utilisateur_id: utilisateurConnecte.ID }) 
                })
                .then(res => res.json()).then(data => {
                    if(data.succes) alert("✅ " + data.succes);
                    chargerCommunautes();
                });
            };

            const handleCreerGroupe = (e) => {
                e.preventDefault();
                fetch("../Backend/creer_communaute.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nom: nouveauGroupe.nom, description: nouveauGroupe.description, createur_id: utilisateurConnecte.ID }) })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else { setNouveauGroupe({ nom: '', description: '' }); fermerModal(); chargerCommunautes(); }
                });
            };

            // LA VÉRITABLE FONCTION DE PUBLICATION 
            const handleCreerPost = (e) => {
                e.preventDefault();
                
                // Vérification Frontend
                if (communauteActive.Statut_Membre !== 'Accepte') {
                    alert("Action refusée : Vous devez être un membre abonné pour publier.");
                    return;
                }

                // Envoi réel à la base de données
                fetch("../Backend/creer_discussion.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        communaute_id: communauteActive.ID, 
                        auteur_id: utilisateurConnecte.ID,
                        titre: nouveauPost.titre,
                        contenu: nouveauPost.contenu
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) {
                        alert("❌ " + data.erreur);
                    } else {
                        setNouveauPost({ titre: '', contenu: '' });
                        fermerModal(); // On ferme la popup
                        chargerDiscussions(communauteActive.ID); // On rafraîchit le fil de la communauté pour voir le nouveau post
                    }
                })
                .catch(err => console.error("Erreur de publication :", err));
            };

            const simulerVote = (id, valeur) => {
                if (!utilisateurConnecte || communauteActive.Statut_Membre !== 'Accepte') {
                    return alert("Vous devez être membre approuvé pour voter.");
                }
                setDiscussions(discussions.map(d => {
                    if (d.ID === id) return { ...d, Score: parseInt(d.Score) + valeur };
                    return d;
                }));
            };

            return (
                <div>
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                
                                {!communauteActive ? (
                                    <>
                                        <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Créer une Communauté</h3>
                                        <form onSubmit={handleCreerGroupe} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                            <input type="text" placeholder="Nom (ex: r/Calisthenics)" value={nouveauGroupe.nom} onChange={(e) => setNouveauGroupe({...nouveauGroupe, nom: e.target.value})} required />
                                            <textarea placeholder="Description et objectifs du groupe..." value={nouveauGroupe.description} onChange={(e) => setNouveauGroupe({...nouveauGroupe, description: e.target.value})} rows="3" />
                                            <button type="submit" className="btn-primary">Créer le Sub</button>
                                        </form>
                                    </>
                                ) : (
                                    <>
                                        {/* LE CADENAS PROTÈGE L'AFFICHAGE DU FORMULAIRE */}
                                        {communauteActive.Statut_Membre === 'Accepte' ? (
                                            <>
                                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Nouveau Post dans r/{communauteActive.Nom}</h3>
                                                <form onSubmit={handleCreerPost} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                                    <input type="text" placeholder="Un titre explicite..." value={nouveauPost.titre} onChange={(e) => setNouveauPost({...nouveauPost, titre: e.target.value})} required />
                                                    <textarea placeholder="Développez votre sujet..." value={nouveauPost.contenu} onChange={(e) => setNouveauPost({...nouveauPost, contenu: e.target.value})} rows="5" required />
                                                    <button type="submit" className="btn-primary">Publier le Thread</button>
                                                </form>
                                            </>
                                        ) : (
                                            <div style={{ textAlign: 'center', padding: '1rem' }}>
                                                <span style={{ fontSize: '2rem' }}>🔒</span>
                                                <h3 style={{ color: 'var(--orange-primary)' }}>Espace Restreint</h3>
                                                <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Vous devez être membre abonné et validé par un modérateur de la communauté pour ouvrir un sujet.</p>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {!communauteActive ? (
                        <>
                            <div className="card" style={{ marginBottom: '2rem' }}>
                                <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Hubs ConnectHub</h2>
                                <p style={{ margin: 0, color: 'var(--text-muted)' }}>Forums ouverts à la lecture. Abonnez-vous pour interagir.</p>
                            </div>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                {listeCommunautes.map(communaute => {
                                    const estAccepte = communaute.Statut_Membre === 'Accepte';
                                    const estEnAttente = communaute.Statut_Membre === 'En_Attente';

                                    return (
                                        <div key={communaute.ID} className="card" onClick={() => ouvrirCommunaute(communaute)} style={{ cursor: 'pointer', borderLeft: '4px solid var(--orange-primary)' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                                                <h3 style={{ margin: 0 }}>r/{communaute.Nom}</h3>
                                                <span style={{ backgroundColor: '#333', padding: '0.2rem 0.6rem', borderRadius: '15px', fontSize: '0.8rem' }}>👥 {communaute.NbMembres}</span>
                                            </div>
                                            <p style={{ margin: '0 0 1rem 0', fontSize: '0.9rem', color: 'var(--text-muted)' }}>{communaute.Description}</p>
                                            
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '1rem' }}>
                                                <span style={{ fontSize: '0.8rem', color: 'var(--orange-primary)', fontWeight: 'bold' }}>Consulter le forum ➔</span>
                                                
                                                {!estAccepte && !estEnAttente && (
                                                    <button onClick={(e) => handleDemanderAdhesion(e, communaute.ID)} className="btn-primary" style={{ padding: '0.4rem 0.8rem', fontSize: '0.75rem' }}>S'abonner</button>
                                                )}
                                                {estEnAttente && <span style={{ fontSize: '0.75rem', color: '#ffc107' }}>⏳ En attente de validation</span>}
                                                {estAccepte && <span style={{ fontSize: '0.75rem', color: '#28a745' }}>✓ Membre Approuvé</span>}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </>
                    ) : (
                        <>
                            <button onClick={() => setCommunauteActive(null)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', marginBottom: '1rem', padding: 0, fontSize: '0.9rem' }}>
                                ⬅ Retour aux Hubs
                            </button>
                            
                            <div className="card" style={{ backgroundColor: 'rgba(255, 107, 0, 0.05)', border: '1px solid var(--orange-primary)' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                    <div>
                                        <h2 style={{ color: 'white', marginTop: 0, marginBottom: '0.5rem' }}>r/{communauteActive.Nom}</h2>
                                        <p style={{ margin: 0, color: 'var(--text-muted)', fontSize: '0.9rem' }}>{communauteActive.Description}</p>
                                    </div>
                                    
                                    {communauteActive.Role_Communaute === 'Moderateur' && (
                                        <button 
                                            onClick={basculerModeration}
                                            className="btn-primary" 
                                            style={{ backgroundColor: vueModeration ? '#333' : '#dc3545', fontSize: '0.8rem', padding: '0.5rem' }}
                                        >
                                            {vueModeration ? "Fermer l'Admin" : "🛡️ Gérer la Communauté"}
                                        </button>
                                    )}
                                </div>
                                
                                {communauteActive.Statut_Membre !== 'Accepte' && (
                                    <p style={{ margin: '1rem 0 0 0', color: '#ffc107', fontSize: '0.8rem', fontWeight: 'bold' }}>
                                        ⚠️ Mode Lecture Seule : Abonnez-vous et attendez la validation pour participer.
                                    </p>
                                )}
                            </div>

                            {vueModeration ? (
                                <div className="card" style={{ border: '1px dashed #dc3545' }}>
                                    <div style={{ display: 'flex', gap: '1rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>
                                        <button onClick={() => setOngletAdmin('demandes')} style={{ background: 'none', border: 'none', color: ongletAdmin === 'demandes' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '0.9rem' }}>En attente</button>
                                        <button onClick={() => setOngletAdmin('membres')} style={{ background: 'none', border: 'none', color: ongletAdmin === 'membres' ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '0.9rem' }}>Membres Actifs</button>
                                    </div>

                                    {ongletAdmin === 'demandes' ? (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                            {listeDemandes.length === 0 ? <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Aucune demande en attente.</p> : listeDemandes.map(d => (
                                                <div key={d.ID} style={{ textAlign: 'center', padding: '1rem', backgroundColor: '#111', borderRadius: '8px', fontSize: '0.9rem' }}>
                                                    Demande de : <strong style={{color: 'white'}}>{d.Nom}</strong>
                                                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', marginTop: '1rem' }}>
                                                        <button onClick={() => handleGererDemande(d.ID, 'accepter')} className="btn-primary" style={{ backgroundColor: '#28a745', padding: '0.4rem 1rem', fontSize: '0.8rem' }}>Approuver</button>
                                                        <button onClick={() => handleGererDemande(d.ID, 'rejeter')} className="btn-primary" style={{ backgroundColor: '#dc3545', padding: '0.4rem 1rem', fontSize: '0.8rem' }}>Rejeter</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                            {listeMembres.length === 0 ? <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Aucun membre trouvé.</p> : listeMembres.map(m => (
                                                <div key={m.ID} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.8rem', backgroundColor: '#111', borderRadius: '8px' }}>
                                                    <div>
                                                        <strong style={{ color: 'white' }}>{m.Nom}</strong>
                                                        <span style={{ marginLeft: '0.5rem', fontSize: '0.75rem', color: m.Role_Communaute === 'Moderateur' ? '#dc3545' : 'var(--text-muted)' }}>
                                                            ({m.Role_Communaute})
                                                        </span>
                                                    </div>
                                                    {m.Role_Communaute !== 'Moderateur' && (
                                                        <button 
                                                            onClick={() => handlePromouvoir(m.ID, m.Nom)} 
                                                            style={{ backgroundColor: 'transparent', border: '1px solid #dc3545', color: '#dc3545', padding: '0.3rem 0.6rem', borderRadius: '15px', cursor: 'pointer', fontSize: '0.75rem' }}
                                                        >
                                                            Promouvoir Modo
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : discussions.length === 0 ? (
                                <p style={{ textAlign: 'center', color: 'var(--text-muted)', marginTop: '2rem' }}>Aucun sujet ouvert pour l'instant.</p>
                            ) : (
                                discussions.map(disc => (
                                    <div key={disc.ID} className="card" style={{ display: 'flex', gap: '1rem', padding: '1rem' }}>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.3rem' }}>
                                            <button onClick={() => simulerVote(disc.ID, 1)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>▲</button>
                                            <span style={{ fontWeight: 'bold', color: disc.Score > 0 ? 'var(--orange-primary)' : 'white' }}>{disc.Score}</span>
                                            <button onClick={() => simulerVote(disc.ID, -1)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>▼</button>
                                        </div>
                                        
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '0.4rem' }}>
                                                Posté par <strong style={{ color: 'var(--text-light)' }}>{disc.Auteur}</strong> • {disc.DateF}
                                            </div>
                                            <h3 style={{ margin: '0 0 0.5rem 0', fontSize: '1.1rem' }}>{disc.Titre}</h3>
                                            <p style={{ margin: 0, fontSize: '0.95rem', lineHeight: '1.4', color: 'var(--text-light)' }}>{disc.Contenu}</p>
                                            
                                            {communauteActive.Statut_Membre === 'Accepte' && (
                                                <div style={{ marginTop: '1rem', display: 'flex', gap: '1rem' }}>
                                                    <span style={{ fontSize: '0.85rem', color: 'var(--orange-primary)', cursor: 'pointer', fontWeight: 'bold' }}>💬 Répondre</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </>
                    )}
                </div>
            );
        }
        // --- COMPOSANT MESSAGERIE PRIVÉE (Correction d'ascenseur et Auto-scroll) ---
        function Messages({ utilisateurConnecte, contactPreselectionne }) {
            const [listeContacts, setListeContacts] = React.useState([]);
            const [evenementsRejoints, setEvenementsRejoints] = React.useState([]);
            const [salonsPrives, setSalonsPrives] = React.useState([]); 
            
            const [contactSelectionne, setContactSelectionne] = React.useState(null);
            const [discussionType, setDiscussionType] = React.useState('prive'); 
            const [historiqueMessages, setHistoriqueMessages] = React.useState([]);
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [infoStatut, setInfoStatut] = React.useState("");

            const chatContainerRef = React.useRef(null);
            
            // Correction du scroll : Un léger délai assure que le DOM est à jour avant de scroller
            React.useEffect(() => {
                if (chatContainerRef.current) {
                    setTimeout(() => {
                        if (chatContainerRef.current) {
                            chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                        }
                    }, 50);
                }
            }, [historiqueMessages]);

            const [modalGroupe, setModalGroupe] = React.useState(false);
            const [nomNouveauGroupe, setNomNouveauGroupe] = React.useState("");
            const [membresCoches, setMembresCoches] = React.useState([]);

            const chargerSidebar = () => {
                if (!utilisateurConnecte) return;
                
                fetch("../Backend/get_utilisateurs.php")
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setListeContacts(data.filter(u => u.ID != utilisateurConnecte.ID)); });
                
                fetch(`../Backend/get_chats_evenements.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setEvenementsRejoints(data); });

                fetch(`../Backend/get_salons.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setSalonsPrives(data); });
            };

            React.useEffect(() => {
                chargerSidebar();
                if (contactPreselectionne) {
                    setDiscussionType('prive');
                    ouvrirDiscussionPrivee(contactPreselectionne);
                }
            }, [utilisateurConnecte, contactPreselectionne]);

            const ouvrirDiscussionPrivee = (contact) => {
                setContactSelectionne(contact); setDiscussionType('prive'); setInfoStatut("");
                fetch("../Backend/get_messages.php", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user1: utilisateurConnecte.ID, user2: contact.ID })
                }).then(res => res.json()).then(data => { if (!data.erreur) setHistoriqueMessages(data); });
            };

            const ouvrirDiscussionEvenement = (evt) => {
                setContactSelectionne(evt); setDiscussionType('evenement'); setInfoStatut("");
                fetch(`../Backend/get_messages_evenement.php?evenement_id=${evt.ID}`)
                    .then(res => res.json()).then(data => { if (!data.erreur) setHistoriqueMessages(data); });
            };

            const ouvrirDiscussionSalon = (salon) => {
                setContactSelectionne(salon); setDiscussionType('salon'); setInfoStatut("");
                fetch(`../Backend/get_messages_salon.php?salon_id=${salon.ID}`)
                    .then(res => res.json()).then(data => { if (!data.erreur) setHistoriqueMessages(data); });
            };

            const handleEnvoyer = (e) => {
                e.preventDefault();
                if (nouveauMessage.trim() === "") return;

                let url, payload;
                if (discussionType === 'prive') {
                    url = "../Backend/envoyer_message.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, destinataire_id: contactSelectionne.ID, contenu: nouveauMessage };
                } else if (discussionType === 'evenement') {
                    url = "../Backend/envoyer_message_evenement.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, evenement_id: contactSelectionne.ID, contenu: nouveauMessage };
                } else {
                    url = "../Backend/envoyer_message_salon.php";
                    payload = { expediteur_id: utilisateurConnecte.ID, salon_id: contactSelectionne.ID, contenu: nouveauMessage };
                }

                fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        setNouveauMessage("");
                        if (discussionType === 'prive') {
                            if (data.statut === 'En_Attente') setInfoStatut("⏳ Demande envoyée !");
                            ouvrirDiscussionPrivee(contactSelectionne);
                        } else if (discussionType === 'evenement') {
                            ouvrirDiscussionEvenement(contactSelectionne);
                        } else {
                            ouvrirDiscussionSalon(contactSelectionne);
                        }
                    }
                });
            };

            const handleCreerGroupe = (e) => {
                e.preventDefault();
                if (membresCoches.length === 0) return alert("Sélectionnez au moins un membre.");
                
                fetch("../Backend/creer_salon.php", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nom: nomNouveauGroupe, createur_id: utilisateurConnecte.ID, membres: membresCoches })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert(data.erreur);
                    else {
                        setModalGroupe(false);
                        setNomNouveauGroupe("");
                        setMembresCoches([]);
                        chargerSidebar();
                    }
                });
            };

            const toggleMembre = (id) => {
                if (membresCoches.includes(id)) setMembresCoches(membresCoches.filter(m => m !== id));
                else setMembresCoches([...membresCoches, id]);
            };

            if (!utilisateurConnecte) return <div className="card" style={{ textAlign: 'center' }}><h2>Messagerie</h2><p>Veuillez vous connecter pour accéder à vos salons.</p></div>;

            return (
                <div className="messages-layout">
                    {modalGroupe && (
                        <div className="modal-overlay" onClick={() => setModalGroupe(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Nouveau Groupe Privé</h3>
                                <form onSubmit={handleCreerGroupe} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <input type="text" placeholder="Nom du groupe..." value={nomNouveauGroupe} onChange={e => setNomNouveauGroupe(e.target.value)} required />
                                    
                                    <div style={{ maxHeight: '150px', overflowY: 'auto', border: '1px solid var(--border-color)', padding: '0.5rem', borderRadius: '8px' }}>
                                        <p style={{ margin: '0 0 0.5rem 0', color: 'var(--text-muted)', fontSize: '0.9rem' }}>Sélectionnez les membres :</p>
                                        {listeContacts.map(c => (
                                            <label key={c.ID} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.4rem', cursor: 'pointer' }}>
                                                <input type="checkbox" checked={membresCoches.includes(c.ID)} onChange={() => toggleMembre(c.ID)} />
                                                {c.Nom}
                                            </label>
                                        ))}
                                    </div>

                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button type="button" className="btn-primary" style={{ flex: 1, backgroundColor: '#333' }} onClick={() => setModalGroupe(false)}>Annuler</button>
                                        <button type="submit" className="btn-primary" style={{ flex: 1 }}>Créer</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="contacts-sidebar">
                        <button className="btn-primary" style={{ padding: '0.5rem', fontSize: '0.8rem', marginBottom: '1rem' }} onClick={() => setModalGroupe(true)}>
                            ➕ Nouveau Groupe
                        </button>

                        <h4 style={{ margin: '0 0 0.5rem 0', color: 'var(--orange-primary)', fontSize: '0.85rem' }}>GROUPES PRIVÉS</h4>
                        {salonsPrives.length === 0 ? <p style={{ fontSize: '0.8rem', color: 'var(--text-muted)', fontStyle: 'italic', margin: '0 0 1rem 0' }}>Aucun groupe.</p> : salonsPrives.map(s => (
                            <div key={s.ID} onClick={() => ouvrirDiscussionSalon(s)} className={`contact-item ${discussionType === 'salon' && contactSelectionne?.ID === s.ID ? 'active' : ''}`} style={{ marginBottom: '0.2rem' }}>
                                <strong>🔒 {s.Nom}</strong>
                            </div>
                        ))}

                        <h4 style={{ margin: '1rem 0 0.5rem 0', color: 'var(--orange-primary)', fontSize: '0.85rem' }}>ATHLÈTES</h4>
                        {listeContacts.map(c => (
                            <div key={c.ID} onClick={() => ouvrirDiscussionPrivee(c)} className={`contact-item ${discussionType === 'prive' && contactSelectionne?.ID === c.ID ? 'active' : ''}`} style={{ marginBottom: '0.2rem' }}>
                                <strong>{c.Nom}</strong>
                            </div>
                        ))}
                        
                        <h4 style={{ margin: '1.5rem 0 0.5rem 0', color: 'var(--orange-primary)', fontSize: '0.85rem' }}>ÉVÉNEMENTS REJOINTS</h4>
                        {evenementsRejoints.map(e => (
                            <div key={e.ID} onClick={() => ouvrirDiscussionEvenement(e)} className={`contact-item ${discussionType === 'evenement' && contactSelectionne?.ID === e.ID ? 'active' : ''}`} style={{ marginBottom: '0.2rem' }}>
                                <strong>📢 {e.Titre}</strong>
                            </div>
                        ))}
                    </div>

                    <div className="chat-area">
                        {contactSelectionne ? (
                            <React.Fragment>
                                <div style={{ paddingBottom: '0.5rem', borderBottom: '1px solid var(--border-color)', marginBottom: '1rem' }}>
                                    <h3 style={{ margin: 0, color: 'var(--orange-primary)', fontSize: '1.1rem' }}>
                                        {discussionType === 'prive' ? contactSelectionne.Nom : discussionType === 'evenement' ? `Événement : ${contactSelectionne.Titre}` : `Groupe : ${contactSelectionne.Nom}`}
                                    </h3>
                                </div>
                                
                                {/* LA CLÉ DU SCROLL: minHeight: 0 et flex: '1 1 0' empêchent le dépassement */}
                                <div className="messages-container" ref={chatContainerRef} style={{ overflowY: 'auto', flex: '1 1 0', minHeight: 0, paddingRight: '0.5rem' }}>
                                    {historiqueMessages.map(msg => {
                                        const estMoi = msg.Expediteur_ID === utilisateurConnecte.ID;
                                        return (
                                            <div key={msg.ID} style={{ display: 'flex', flexDirection: 'column', alignItems: estMoi ? 'flex-end' : 'flex-start', marginBottom: '0.6rem' }}>
                                                {(discussionType === 'evenement' || discussionType === 'salon') && !estMoi && (
                                                    <small style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginBottom: '2px', marginLeft: '4px' }}>{msg.Expediteur_Nom}</small>
                                                )}
                                                <div style={{ backgroundColor: estMoi ? (msg.Statut === 'En_Attente' ? '#555' : 'var(--orange-primary)') : '#333', padding: '0.6rem 1rem', borderRadius: '15px', fontSize: '0.9rem', maxWidth: '85%', wordWrap: 'break-word' }}>
                                                    {msg.Contenu}
                                                    {msg.Statut === 'En_Attente' && estMoi && <small style={{ fontSize: '0.7rem', display: 'block', color: '#aaa' }}>(Demande)</small>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {infoStatut && <p style={{ color: 'var(--orange-primary)', fontSize: '0.85rem', margin: '0 0 0.5rem 0' }}>{infoStatut}</p>}

                                <form onSubmit={handleEnvoyer} style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem' }}>
                                    <input type="text" placeholder="Écrire dans le salon..." value={nouveauMessage} onChange={e => setNouveauMessage(e.target.value)} required />
                                    <button type="submit" className="btn-primary" style={{ padding: '0.6rem 1.2rem' }}>➤</button>
                                </form>
                            </React.Fragment>
                        ) : (
                            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%', color: 'var(--text-muted)', fontSize: '0.95rem' }}>
                                <p>Sélectionnez un athlète ou un groupe pour ouvrir la discussion.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        // --- NOUVEAU COMPOSANT : CONNEXION / INSCRIPTION ---
        function Authentification({ onConnect }) {
            const [isLogin, setIsLogin] = React.useState(true);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setMessage("Chargement...");

                // Le fetch pointe vers login.php ou inscription.php selon le mode
                const url = isLogin ? "../Backend/login.php" : "../Backend/inscription.php";

                fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.erreur) {
                            setMessage("❌ " + data.erreur);
                        } else {
                            if (isLogin) {
                                setMessage("✅ Connexion réussie !");
                                onConnect(data.utilisateur); // Transmet l'utilisateur au composant principal
                            } else {
                                setMessage("✅ Inscription réussie ! Vous pouvez maintenant vous connecter.");
                                setIsLogin(true); // Bascule sur l'onglet connexion
                            }
                        }
                    })
                    .catch(() => setMessage("❌ Erreur de communication avec le serveur."));
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)' }}>{isLogin ? "Se connecter" : "Créer un compte"}</h2>
                    <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {!isLogin && (
                            <input type="text" placeholder="Nom complet" value={formData.nom} onChange={e => setFormData({ ...formData, nom: e.target.value })} required />
                        )}
                        <input type="email" placeholder="Adresse Email" value={formData.email} onChange={e => setFormData({ ...formData, email: e.target.value })} required />
                        <input type="password" placeholder="Mot de passe" value={formData.motDePasse} onChange={e => setFormData({ ...formData, motDePasse: e.target.value })} required />

                        <button type="submit" className="btn-primary">{isLogin ? "Connexion" : "S'inscrire"}</button>
                    </form>
                    <p style={{ marginTop: '1.5rem', textAlign: 'center', fontSize: '0.9rem' }}>
                        {isLogin ? "Pas encore de compte ? " : "Déjà un compte ? "}
                        <span style={{ color: 'var(--orange-primary)', cursor: 'pointer', fontWeight: 'bold' }} onClick={() => setIsLogin(!isLogin)}>
                            {isLogin ? "S'inscrire" : "Se connecter"}
                        </span>
                    </p>
                    {message && <p style={{ fontWeight: 'bold', textAlign: 'center', marginTop: '1rem' }}>{message}</p>}
                </div>
            );
        }

       // --- COMPOSANT FIL D'ACTUALITÉ (Signalement intégré et déplacé) ---
        function FilActualite({ utilisateurConnecte, ouvrirProfil, modalOuverte, fermerModal }) {
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [fichierMedia, setFichierMedia] = React.useState(null);
            const [publications, setPublications] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            const [fluxActif, setFluxActif] = React.useState("recommandations");
            
            const [commentairesOuverts, setCommentairesOuverts] = React.useState(null);
            const [listeCommentaires, setListeCommentaires] = React.useState([]);

            // ÉTATS : Édition, Suppression, Partage, Signalement
            const [idPostEnEdition, setIdPostEnEdition] = React.useState(null);
            const [texteEdition, setTexteEdition] = React.useState("");
            const [idPostEnSuppression, setIdPostEnSuppression] = React.useState(null);
            
            const [pubAPartager, setPubAPartager] = React.useState(null);
            const [listeContacts, setListeContacts] = React.useState([]);

            const [idPostEnSignalement, setIdPostEnSignalement] = React.useState(null);
            const [motifSignalement, setMotifSignalement] = React.useState("");

            const chargerPublications = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_publications.php?user_id=${userId}&flux=${fluxActif}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setPublications(data); setChargement(false); });
            };

            React.useEffect(() => { chargerPublications(); }, [fluxActif, utilisateurConnecte]);

            const handlePublier = (e) => {
                e.preventDefault();
                const formData = new FormData();
                formData.append('contenu', nouveauMessage);
