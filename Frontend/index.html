<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub - Sport & Performance</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* === NOUVELLE DA : NOIR ET ORANGE === */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --orange-primary: #FF6B00;
            --orange-hover: #e65c00;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-light);
            padding-bottom: 70px; /* Espace pour la barre de navigation en bas */
        }

        /* === BANDEAU SUPÉRIEUR (Header épuré) === */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            box-sizing: border-box;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        /* === DISPOSITION INTERNE DU CONTENU === */
        .content-container-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1.5rem;
            align-items: start;
            width: 100%;
        }

        .sidebar-left-action {
            position: sticky;
            top: 90px;
        }

        /* Bouton Plus dans la colonne de gauche */
        .sidebar-left-action .btn-plus {
            width: 100%;
            background-color: var(--orange-primary);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0.8rem 0.5rem;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .sidebar-left-action .btn-plus:hover {
            background-color: var(--orange-hover);
            transform: translateY(-2px);
        }

        /* Zone principale globale élargie */
        main { 
            padding-top: 90px; 
            padding-bottom: 80px; 
            max-width: 750px; 
            margin: auto; 
        }

        @media (max-width: 650px) {
            .content-container-grid {
                grid-template-columns: 1fr;
            }
            .sidebar-left-action {
                position: relative;
                top: 0;
                margin-bottom: 1rem;
            }
        }

        /* === MENU NOTIFICATIONS FLOTTANT === */
        .notif-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .notif-bell {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            padding: 0;
            margin-right: 1rem;
        }
        .notif-dropdown {
            position: absolute;
            top: 45px;
            right: -50px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 1rem;
        }

        /* === MODALE (Fenêtre de création en superposition) === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--orange-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            position: relative;
            animation: apparition 0.2s ease-out;
        }
        @keyframes apparition {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-close:hover { color: white; }

        /* Profil / Connexion (Haut Droite) */
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-weight: bold;
        }
        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--orange-primary);
            object-fit: cover;
        }

        /* Cartes (Cards) */
        .card { 
            background: var(--bg-card); 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        /* Formulaire & Boutons */
        textarea, input {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea:focus, input:focus { outline: none; border-color: var(--orange-primary); }
        
        .btn-primary { 
            background-color: var(--orange-primary); 
            color: white; 
            border: none; 
            padding: 0.75rem 1.5rem; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-primary:hover { background-color: var(--orange-hover); }

        /* Publications */
        .post { border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .post:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; align-items: center; }
        .post-author { font-weight: bold; color: var(--orange-primary); font-size: 1.1rem; }
        .post-date { color: var(--text-muted); font-size: 0.85rem; }
        .btn-like {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-like:hover, .btn-like.active { border-color: var(--orange-primary); color: var(--orange-primary); }

        /* Navigation Bas (Mobile/App style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            gap: 0.3rem;
        }
        .nav-item.active { color: var(--orange-primary); }
        .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- COMPOSANT PROFIL PERSONNEL UNIFIÉ (Style Réseau Social Public) ---
        function Profil({ utilisateurConnecte, setUtilisateurConnecte, setOngletActif }) {
            const [modeEdition, setModeEdition] = React.useState(false);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');
            
            // États pour stocker vos publications et compteurs dynamiques
            const [donneesReseau, setDonneesReseau] = React.useState(null);
            const [chargementDonnees, setChargementDonnees] = React.useState(true);

            const chargerDonneesPerso = () => {
                // Réutilisation parfaite de l'API de profil public pour charger vos propres données
                fetch(`../Backend/get_profil_public.php?id=${utilisateurConnecte.ID}&visiteur=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setDonneesReseau(data); setChargementDonnees(false); });
            };

            React.useEffect(() => { if (!modeEdition) chargerDonneesPerso(); }, [modeEdition, utilisateurConnecte]);

            const lancerEdition = () => {
                setFormData({ nom: utilisateurConnecte.Nom, email: utilisateurConnecte.Email, motDePasse: '' });
                setModeEdition(true);
                setMessage('');
            };

            const handleSauvegarder = (e) => {
                e.preventDefault();
                fetch("../Backend/modifier_profil.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: utilisateurConnecte.ID, nom: formData.nom, email: formData.email, motDePasse: formData.motDePasse })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) setMessage("❌ " + data.erreur);
                    else { setMessage("✅ " + data.succes); setUtilisateurConnecte(data.utilisateur); setModeEdition(false); }
                });
            };

            if (modeEdition) {
                return (
                    <div className="card">
                        <form onSubmit={handleSauvegarder} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            <h2 style={{ color: 'var(--orange-primary)', textAlign: 'center', marginTop: 0 }}>Modifier mes informations</h2>
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nom d'athlète</label>
                                <input type="text" value={formData.nom} onChange={e => setFormData({...formData, nom: e.target.value})} required />
                            </div>
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Adresse Email</label>
                                <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} required />
                            </div>
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nouveau mot de passe <small>(laisser vide pour conserver l'actuel)</small></label>
                                <input type="password" placeholder="***" value={formData.motDePasse} onChange={e => setFormData({...formData, motDePasse: e.target.value})} />
                            </div>
                            <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                                <button type="button" className="btn-primary" style={{ flex: 1, backgroundColor: '#333' }} onClick={() => setModeEdition(false)}>Annuler</button>
                                <button type="submit" className="btn-primary" style={{ flex: 1, backgroundColor: '#28a745' }}>Enregistrer</button>
                            </div>
                        </form>
                    </div>
                );
            }

            const uStats = donneesReseau ? donneesReseau.utilisateurs || donneesReseau.utilisateur : utilisateurConnecte;
            const mesPubs = donneesReseau ? donneesReseau.publications : [];

            return (
                <div>
                    {/* EN-TÊTE IDENTIQUE AU PROFIL PUBLIC */}
                    <div className="card" style={{ textAlign: 'center' }}>
                        <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: '#333' }}>
                            {utilisateurConnecte.Nom.charAt(0).toUpperCase()}
                        </div>
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{utilisateurConnecte.Nom} (Moi)</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{utilisateurConnecte.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{uStats.NbAbonnes || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{uStats.NbAbonnements || 0}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        {/* LIENS ET OPTIONS COMPLÉMENTAIRES */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.8rem', maxWidth: '350px', margin: '0 auto' }}>
                            <button className="btn-primary" onClick={lancerEdition}>⚙️ Paramètres du compte</button>
                            
                            {utilisateurConnecte.Role === 'Moderateur' && (
                                <button className="btn-primary" style={{ backgroundColor: '#dc3545' }} onClick={() => setOngletActif('moderation')}>
                                    🛡️ Espace Modération
                                </button>
                            )}

                            <button className="btn-primary" style={{ backgroundColor: '#333' }} onClick={() => { setUtilisateurConnecte(null); setOngletActif('accueil'); }}>
                                Se déconnecter
                              </button>
                        </div>
                        {message && <p style={{ marginTop: '1rem', color: '#28a745' }}>{message}</p>}
                    </div>

                    {/* FLUX DE VOS PROPRES SÉANCES EN BAS DE PAGE */}
                    <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>Vos performances publiées</h3>
                    
                    {chargementDonnees ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Chargement de vos publications...</p>
                    ) : mesPubs.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Vous n'avez pas encore partagé de performance.</p>
                    ) : (
                        mesPubs.map(pub => (
                            <div key={pub.ID} className="card post">
                                <span className="post-date" style={{ display: 'block', marginBottom: '0.5rem' }}>{pub.Date_Publication}</span>
                                <p style={{ whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                {pub.Media_URL && (
                                    <div style={{ textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden', marginBottom: '1rem' }}>
                                        <img src={`../Backend/${pub.Media_URL}`} style={{ maxWidth: '100%', maxHeight: '350px', objectFit: 'contain' }} />
                                    </div>
                                )}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects reçus</span>
                            </div>
                        ))
                    )}
                </div>
            );
        }

        // --- COMPOSANT ÉVÉNEMENTS (Avec formulaire de création opérationnel) ---
        function Evenements({ utilisateurConnecte, modalOuverte, fermerModal }) {
            const [listeEvenements, setListeEvenements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            
            // État pour le formulaire de création
            const [formEvt, setFormEvt] = React.useState({ titre: '', lieu: '', date_evenement: '', description: '' });

            const chargerEvenements = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_evenements.php?user_id=${userId}`)
                    .then(r => r.json())
                    .then(data => { if (!data.erreur) setListeEvenements(data); setChargement(false); });
            };

            React.useEffect(() => { chargerEvenements(); }, [utilisateurConnecte]);

            const handleParticiper = (id) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter.");
                fetch("../Backend/participer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ evenement_id: id, utilisateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json()).then(data => { alert(data.succes || data.info || data.erreur); chargerEvenements(); });
            };

            const soumettreEvenement = (e) => {
                e.preventDefault();
                fetch("../Backend/creer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formEvt)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        alert("✅ " + data.succes);
                        setFormEvt({ titre: '', lieu: '', date_evenement: '', description: '' });
                        fermerModal();
                        chargerEvenements();
                    }
                });
            };

            return (
                <div>
                    {/* MODALE DE CRÉATION DE SESSION SÉCURISÉE */}
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Organiser un entraînement</h3>
                                <form onSubmit={soumettreEvenement} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <input type="text" placeholder="Nom de la session (ex: Séance Cardio / Muscu)" value={formEvt.titre} onChange={e => setFormEvt({...formEvt, titre: e.target.value})} required />
                                    <input type="text" placeholder="Lieu ou équipement (ex: Parc / Salle)" value={formEvt.lieu} onChange={e => setFormEvt({...formEvt, lieu: e.target.value})} required />
                                    <input type="datetime-local" value={formEvt.date_evenement} onChange={e => setFormEvt({...formEvt, date_evenement: e.target.value})} required />
                                    <textarea placeholder="Objectifs et exercices prévus..." value={formEvt.description} onChange={e => setFormEvt({...formEvt, description: e.target.value})} rows="3" />
                                    <button type="submit" className="btn-primary">Publier la session</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Sessions Sportives</h2>
                        <p style={{ margin: 0, color: 'var(--text-muted)' }}>Rejoignez un entraînement programmé par la communauté ConnectHub.</p>
                    </div>

                    {chargement ? <p style={{ textAlign: 'center' }}>Chargement...</p> : listeEvenements.map(evt => (
                        <div key={evt.ID} className="card" style={{ borderLeft: evt.EstInscrit ? '4px solid #28a745' : '4px solid var(--orange-primary)' }}>
                            <h3 style={{ margin: '0 0 0.5rem 0', color: evt.EstInscrit ? '#28a745' : 'white' }}>{evt.Titre}</h3>
                            <div style={{ fontSize: '0.9rem', color: 'var(--text-light)', marginBottom: '1rem' }}>
                                <span>📅 <strong>{evt.Date_Formatee}</strong></span><br/>
                                <span>📍 {evt.Lieu}</span>
                            </div>
                            <p>{evt.Description}</p>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                                {!evt.EstInscrit ? <button onClick={() => handleParticiper(evt.ID)} style={{ flex: 1, backgroundColor: 'transparent', color: 'var(--orange-primary)', border: '1px solid var(--orange-primary)', padding: '0.6rem', borderRadius: '20px', cursor: 'pointer', fontWeight: 'bold' }}>Je participe</button> : <div style={{ flex: 1, textAlign: 'center', color: '#28a745', padding: '0.6rem', border: '1px dashed #28a745', borderRadius: '20px' }}>Place réservée ✓</div>}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🏃 {evt.NbParticipants} inscrits</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }
        // --- COMPOSANT RECHERCHE (Connecté à la BDD) ---
        // --- COMPOSANT RECHERCHE (Avec option Tout) ---
        function Recherche({ utilisateurConnecte, ouvrirProfil }) {
            const [requete, setRequete] = React.useState("");
            const [ongletActif, setOngletActif] = React.useState("tous");
            const [resultats, setResultats] = React.useState([]);
            const [chargement, setChargement] = React.useState(false);

            const onglets = [
                { id: 'tous', label: 'Tout' },
                { id: 'publications', label: 'Publications' },
                { id: 'utilisateurs', label: 'Athlètes' },
                { id: 'communautes', label: 'Communautés' },
                { id: 'evenements', label: 'Événements' }
            ];

            React.useEffect(() => {
                if (requete.trim() === "") {
                    setResultats([]);
                    return;
                }

                setChargement(true);
                fetch("../Backend/rechercher.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ requete: requete, type: ongletActif })
                })
                .then(res => res.json())
                .then(data => {
                    setResultats(data);
                    setChargement(false);
                })
                .catch(err => { console.error(err); setChargement(false); });

            }, [requete, ongletActif]);

            return (
                <div>
                    <div className="card" style={{ padding: '1rem', marginBottom: '1rem' }}>
                        <div style={{ position: 'relative' }}>
                            <span style={{ position: 'absolute', left: '15px', top: '15px', fontSize: '1.2rem' }}>🔍</span>
                            <input 
                                type="text" 
                                placeholder="Recherche globale ConnectHub..."
                                value={requete}
                                onChange={(e) => setRequete(e.target.value)}
                                style={{ width: '100%', padding: '1rem 1rem 1rem 3rem', borderRadius: '25px', backgroundColor: '#111', border: '1px solid var(--border-color)', color: 'white' }} 
                            />
                        </div>

                        <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', overflowX: 'auto', paddingBottom: '0.5rem' }}>
                            {onglets.map(onglet => (
                                <button 
                                    key={onglet.id}
                                    onClick={() => setOngletActif(onglet.id)}
                                    style={{
                                        backgroundColor: ongletActif === onglet.id ? 'var(--orange-primary)' : 'transparent',
                                        color: ongletActif === onglet.id ? 'white' : 'var(--text-muted)',
                                        border: `1px solid ${ongletActif === onglet.id ? 'var(--orange-primary)' : 'var(--border-color)'}`,
                                        padding: '0.4rem 1rem',
                                        borderRadius: '20px',
                                        cursor: 'pointer',
                                        whiteSpace: 'nowrap',
                                        fontWeight: ongletActif === onglet.id ? 'bold' : 'normal'
                                    }}
                                >
                                    {onglet.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div>
                        {requete === "" ? (

        // --- COMPOSANT COMMUNAUTÉS (Connecté à la BDD avec création) ---

        // --- COMPOSANT MESSAGERIE PRIVÉE (Version complète avec correction du défilement) ---
        // --- COMPOSANT MESSAGERIE PRIVÉE (Avec Gestion des Demandes) ---
        function Messages({ utilisateurConnecte, contactPreselectionne }) {
            const [listeContacts, setListeContacts] = React.useState([]);
            const [contactSelectionne, setContactSelectionne] = React.useState(null);
            const [historiqueMessages, setHistoriqueMessages] = React.useState([]);
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [infoStatut, setInfoStatut] = React.useState("");
            React.useEffect(() => {
                if (contactPreselectionne) {
                    chargerConversation(contactPreselectionne);
                }
            }, [contactPreselectionne]);

            React.useEffect(() => {
                fetch("../Backend/get_utilisateurs.php")
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) {
                            const autres = utilisateurConnecte ? data.filter(u => u.ID != utilisateurConnecte.ID) : data;
                            setListeContacts(autres);
                        }
                    });
            }, [utilisateurConnecte]);

            const chargerConversation = (contact) => {
                setContactSelectionne(contact);
                setInfoStatut("");
                fetch("../Backend/get_messages.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user1: utilisateurConnecte.ID, user2: contact.ID })
                })
                .then(res => res.json())
                .then(data => { if (!data.erreur) setHistoriqueMessages(data); });
            };

            const handleEnvoyer = (e) => {
                e.preventDefault();
                if (nouveauMessage.trim() === "") return;

                fetch("../Backend/envoyer_message.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ expediteur_id: utilisateurConnecte.ID, destinataire_id: contactSelectionne.ID, contenu: nouveauMessage })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        setNouveauMessage("");
                        if (data.statut === 'En_Attente') {
                            setInfoStatut("⏳ Demande envoyée ! Ce message sera accepté lorsque l'athlète vous suivra en retour.");
                        }
                        chargerConversation(contactSelectionne);
                    }
                });
            };

            if (!utilisateurConnecte) return <div className="card" style={{ textAlign: 'center' }}><h2>Messagerie</h2><p>Connectez-vous pour discuter.</p></div>;

            return (
                <div>
                    {!contactSelectionne ? (
                        <div className="card">
                            <h2>Vos Contacts</h2>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                {listeContacts.map(c => (
                                    <div key={c.ID} onClick={() => chargerConversation(c)} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', cursor: 'pointer', border: '1px solid var(--border-color)' }}>
                                        <strong>{c.Nom}</strong>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="card" style={{ display: 'flex', flexDirection: 'column', height: '60vh' }}>
                            <div style={{ paddingBottom: '1rem', borderBottom: '1px solid var(--border-color)', marginBottom: '1rem' }}>
                                <button onClick={() => setContactSelectionne(null)} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer' }}>⬅ Retour</button>
                                <h3 style={{ display: 'inline', marginLeft: '1rem', color: 'var(--orange-primary)' }}>{contactSelectionne.Nom}</h3>
                            </div>
                            
                            <div style={{ flex: 1, overflowY: 'auto', marginBottom: '1rem' }}>
                                {historiqueMessages.map(msg => {
                                    const estMoi = msg.Expediteur_ID === utilisateurConnecte.ID;
                                    return (
                                        <div key={msg.ID} style={{ display: 'flex', justifyContent: estMoi ? 'flex-end' : 'flex-start', marginBottom: '0.5rem' }}>
                                            <div style={{ backgroundColor: estMoi ? (msg.Statut === 'En_Attente' ? '#555' : 'var(--orange-primary)') : '#333', padding: '0.6rem 1rem', borderRadius: '15px' }}>
                                                {msg.Contenu} {msg.Statut === 'En_Attente' && estMoi && <small style={{ fontSize: '0.7rem', display: 'block', color: '#aaa' }}>(Demande)</small>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {infoStatut && <p style={{ color: 'var(--orange-primary)', fontSize: '0.85rem', margin: '0 0 0.5rem 0' }}>{infoStatut}</p>}

                            <form onSubmit={handleEnvoyer} style={{ display: 'flex', gap: '0.5rem' }}>
                                <input type="text" placeholder="Écrivez votre message..." value={nouveauMessage} onChange={e => setNouveauMessage(e.target.value)} required />
                                <button type="submit" className="btn-primary">➤</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        // --- NOUVEAU COMPOSANT : CONNEXION / INSCRIPTION ---
        function Authentification({ onConnect }) {
            const [isLogin, setIsLogin] = React.useState(true);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setMessage("Chargement...");
                
                // Le fetch pointe vers login.php ou inscription.php selon le mode
                const url = isLogin ? "../Backend/login.php" : "../Backend/inscription.php";
                
                fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) {
                        setMessage("❌ " + data.erreur);
                    } else {
                        if (isLogin) {
                            setMessage("✅ Connexion réussie !");
                            onConnect(data.utilisateur); // Transmet l'utilisateur au composant principal
                        } else {
                            setMessage("✅ Inscription réussie ! Vous pouvez maintenant vous connecter.");
                            setIsLogin(true); // Bascule sur l'onglet connexion
                        }
                    }
                })
                .catch(() => setMessage("❌ Erreur de communication avec le serveur."));
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)' }}>{isLogin ? "Se connecter" : "Créer un compte"}</h2>
                    <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {!isLogin && (
                            <input type="text" placeholder="Nom complet" value={formData.nom} onChange={e => setFormData({...formData, nom: e.target.value})} required />
                        )}
                        <input type="email" placeholder="Adresse Email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} required />
                        <input type="password" placeholder="Mot de passe" value={formData.motDePasse} onChange={e => setFormData({...formData, motDePasse: e.target.value})} required />
                        
                        <button type="submit" className="btn-primary">{isLogin ? "Connexion" : "S'inscrire"}</button>
                    </form>
                    <p style={{ marginTop: '1.5rem', textAlign: 'center', fontSize: '0.9rem' }}>
                        {isLogin ? "Pas encore de compte ? " : "Déjà un compte ? "}
                        <span style={{ color: 'var(--orange-primary)', cursor: 'pointer', fontWeight: 'bold' }} onClick={() => setIsLogin(!isLogin)}>
                            {isLogin ? "S'inscrire" : "Se connecter"}
                        </span>
                    </p>
                    {message && <p style={{ fontWeight: 'bold', textAlign: 'center', marginTop: '1rem' }}>{message}</p>}
                </div>
            );
        }

        // --- COMPOSANT FIL D'ACTUALITÉ (Modale intégrée) ---
        function FilActualite({ utilisateurConnecte, ouvrirProfil, modalOuverte, fermerModal }) {
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [fichierMedia, setFichierMedia] = React.useState(null);
            const [publications, setPublications] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            const [fluxActif, setFluxActif] = React.useState("recommandations");
            
            const [commentairesOuverts, setCommentairesOuverts] = React.useState(null);
            const [texteCommentaire, setTexteCommentaire] = React.useState("");
            const [listeCommentaires, setListeCommentaires] = React.useState([]);

            const chargerPublications = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_publications.php?user_id=${userId}&flux=${fluxActif}`)
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setPublications(data); setChargement(false); });
            };

                formData.append('contenu', nouveauMessage);
                formData.append('auteur_id', utilisateurConnecte.ID);
                if (fichierMedia) formData.append('media', fichierMedia);

                fetch("../Backend/ajouter_publication.php", { method: "POST", body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        setNouveauMessage("");
                        setFichierMedia(null);
                        fermerModal(); // On ferme la fenêtre après publication !
                        chargerPublications();
                    }
                });
            };

            const handleActionAbonnement = (auteurId) => { /* ... votre code existant ... */ 
                fetch("../Backend/suivre_utilisateur.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ suiveur_id: utilisateurConnecte.ID, suivi_id: auteurId }) })
                .then(res => res.json()).then(data => { if (!data.erreur) chargerPublications(); });
            };
            const gererLike = (pubId) => { /* ... votre code existant ... */ 
                fetch("../Backend/liker_publication.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID }) })
                .then(res => res.json()).then(data => { if (!data.erreur) chargerPublications(); });
            };
            const handleSignaler = (pubId) => { /* ... votre code existant ... */ 
                const motif = prompt("Motif de signalement ?"); if(!motif) return;
                fetch("../Backend/signaler_publication.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ publication_id: pubId, signaleur_id: utilisateurConnecte.ID, motif: motif }) });
            };
            const basculerCommentaires = (pubId) => { /* ... votre code existant ... */ 
                if (commentairesOuverts === pubId) setCommentairesOuverts(null);
                else { setCommentairesOuverts(pubId); setListeCommentaires([]); fetch(`../Backend/get_commentaires.php?pub_id=${pubId}`).then(res=>res.json()).then(data=> setListeCommentaires(data)); }
            };
            const envoyerCommentaire = (e, pubId) => { /* ... votre code existant ... */ 
                e.preventDefault();
                fetch("../Backend/ajouter_commentaire.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ publication_id: pubId, auteur_id: utilisateurConnecte.ID, contenu: texteCommentaire }) })
                .then(res=>res.json()).then(data=>{ if(!data.erreur) { setTexteCommentaire(""); fetch(`../Backend/get_commentaires.php?pub_id=${pubId}`).then(r=>r.json()).then(d=>setListeCommentaires(d)); } });
            };

            return (
                <div>
                    {/* LA FENÊTRE MODALE DE CRÉATION DE POST */}
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>

                                <form onSubmit={handlePublier} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>

                                        placeholder="Décrivez votre séance, posez une question..." rows="4" required={!fichierMedia} 
                                    />
                                    <input type="file" accept="image/*,video/*" onChange={(e) => setFichierMedia(e.target.files[0])} style={{ padding: 0 }} />

                                </form>

                                    </div>

        // --- COMPOSANT PROFIL PUBLIC (Vue d'un autre utilisateur) ---
        function ProfilPublic({ id, visiteur, fermer, demarrerDiscussion }) {
            const [data, setData] = React.useState(null);
            const [chargement, setChargement] = React.useState(true);

            const chargerProfil = () => {
                fetch(`../Backend/get_profil_public.php?id=${id}&visiteur=${visiteur ? visiteur.ID : 0}`)
                    .then(res => res.json())
                    .then(resData => {
                        if (!resData.erreur) setData(resData);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerProfil(); }, [id]);

            const handleActionAbonnement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour vous abonner.");
                fetch("../Backend/suivre_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ suiveur_id: visiteur.ID, suivi_id: id })
                })
                .then(res => res.json())
                .then(d => {
                    if (!d.erreur) chargerProfil(); // Recharge le profil pour mettre à jour les compteurs
                });
            };

            if (chargement) return <div className="card" style={{ textAlign: 'center' }}>Chargement du profil...</div>;
            if (!data || !data.utilisateur) return <div className="card" style={{ textAlign: 'center' }}>Profil introuvable. <button className="btn-primary" onClick={fermer}>Retour</button></div>;

            const u = data.utilisateur;
            const pubs = data.publications;

            return (
                <div>
                    <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', marginBottom: '1rem', fontSize: '1rem' }}>
                        ⬅ Retour au fil d'actualité
                    </button>

                    <div className="card" style={{ textAlign: 'center' }}>
                        <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: '#333' }}>
                            {u.Nom.charAt(0).toUpperCase()}
                        </div>
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{u.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{u.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnes}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnements}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        {visiteur && visiteur.ID !== u.ID && (
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '1rem' }}>
                                <button 
                                    onClick={handleActionAbonnement}
                                    className="btn-primary"
                                    style={{ backgroundColor: u.EstAbonne ? '#333' : 'var(--orange-primary)', color: 'white', border: u.EstAbonne ? '1px solid var(--border-color)' : 'none' }}
                                >
                                    {u.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                </button>
                                <button 
                                    onClick={() => demarrerDiscussion(u)}
                                    className="btn-primary"
                                    style={{ backgroundColor: 'transparent', border: '1px solid var(--orange-primary)', color: 'var(--orange-primary)' }}
                                >
                                    💬 Message
                                </button>
                            </div>
                        )}
                    </div>

                    <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>Performances de {u.Nom}</h3>

                    {pubs.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune publication pour le moment.</p>
                    ) : (
                        pubs.map(pub => (
                            <div key={pub.ID} className="card post" style={{ padding: '1.5rem' }}>
                                <div className="post-header">
                                    <span className="post-author">{pub.Nom}</span>
                                    <span className="post-date">{pub.Date_Publication}</span>
                                </div>
                                <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                {/* Affichage Media */}
                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} alt="Performance" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                        )}
                                    </div>
                                )}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects</span>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT NOTIFICATIONS ---
        // --- COMPOSANT MENU DÉROULANT DES NOTIFICATIONS ---
        function NotificationsDropdown({ utilisateurConnecte, fermer }) {
            const [notifs, setNotifs] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            React.useEffect(() => {
                if (utilisateurConnecte) {
                    fetch(`../Backend/get_notifications.php?user_id=${utilisateurConnecte.ID}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.erreur) setNotifs(data);
                            setChargement(false);
                        });
                }
            }, [utilisateurConnecte]);

            return (
                <div className="notif-dropdown">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>
                        <h3 style={{ margin: 0, color: 'var(--orange-primary)', fontSize: '1.1rem' }}>Alertes</h3>
                        <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>✖</button>
                    </div>
                    
                    {chargement ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Vérification...</p>
                    ) : notifs.length === 0 ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Aucune activité récente.</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                            {notifs.map(n => (
                                <div key={n.ID} style={{ 
                                    padding: '0.8rem', 
                                    backgroundColor: n.Lu ? 'transparent' : '#1a1a1a', 
                                    borderLeft: n.Lu ? '3px solid transparent' : '3px solid var(--orange-primary)', 
                                    borderRadius: '4px',
                                    fontSize: '0.85rem'
                                }}>
                                    {n.Type_Action === 'Like' && <span>🔥 <strong>{n.ActeurNom}</strong> a lâché un Respect.</span>}
                                    {n.Type_Action === 'Abonnement' && <span>👤 <strong>{n.ActeurNom}</strong> vous suit.</span>}
                                    <div style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginTop: '0.3rem' }}>{n.Date_Notification}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT TABLEAU DE BORD DE MODÉRATION ---
        function DashboardModeration({ utilisateurConnecte }) {
            const [signalements, setSignalements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            const chargerSignalements = () => {
                fetch(`../Backend/get_signalements.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) setSignalements(data);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerSignalements(); }, []);

            const commanderAction = (sigId, pubId, action) => {
                fetch("../Backend/traiter_signalement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ signalement_id: sigId, publication_id: pubId, action: action, moderateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        alert("💼 " + data.succes);
                        chargerSignalements(); // Rafraîchit la liste
                    }
                });
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Espace Modération</h2>
                    <p style={{ color: 'var(--text-muted)' }}>Consultez et traitez les publications signalées par la communauté.</p>
                    
                    {chargement ? (
                        <p style={{ textAlign: 'center' }}>Chargement des alertes...</p>
                    ) : signalements.length === 0 ? (
                        <p style={{ textAlign: 'center', color: '#28a745' }}>✅ Aucun signalement en attente. Bon travail !</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            {signalements.map(s => (
                                <div key={s.ID} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', border: '1px solid #dc3545' }}>
                                    <div style={{ marginBottom: '0.5rem', fontSize: '0.9rem' }}>
                                        ⚠️ Post de <strong>{s.Auteur_Nom || s.AuteurNom}</strong> signalé pour : <span style={{ color: '#dc3545', fontWeight: 'bold' }}>{s.Motif}</span>
                                    </div>
                                    <blockquote style={{ margin: '0 0 1rem 0', paddingLeft: '0.5rem', borderLeft: '2px solid var(--border-color)', color: 'var(--text-muted)', italic: 'true' }}>
                                        "{s.PostContenu}"
                                    </blockquote>
                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'supprimer')} className="btn-primary" style={{ backgroundColor: '#dc3545', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Supprimer le post</button>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'rejeter')} className="btn-primary" style={{ backgroundColor: '#333', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Ignorer</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT PRINCIPAL DE L'APPLICATION ---
        // --- COMPOSANT PRINCIPAL DE L'APPLICATION ---
        function App() {
            const [ongletActif, setOngletActif] = React.useState('accueil');
            const [utilisateurConnecte, setUtilisateurConnecte] = React.useState(null); 
            
            const [profilCible, setProfilCible] = React.useState(null); 
            const [contactPreselectionne, setContactPreselectionne] = React.useState(null);
            const [afficherNotifs, setAfficherNotifs] = React.useState(false); 
            const [modalCreationOuverte, setModalCreationOuverte] = React.useState(false);

            const ouvrirProfil = (id) => setProfilCible(id);

            const demarrerDiscussion = (utilisateur) => {
                setContactPreselectionne(utilisateur);
                setProfilCible(null); 
                setOngletActif('messages'); 
            };

            const handlePlusAction = () => {
                if (!utilisateurConnecte) {
                    alert("Veuillez vous connecter pour créer du contenu.");
                    setOngletActif('profil');
                    return;
                }
                if (['accueil', 'evenements', 'communautes'].includes(ongletActif)) {
                    setModalCreationOuverte(true);
                }
            };

            return (
                <div>
                    {/* EN-TÊTE FIXE ÉPURÉ */}
                    <header className="top-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem', cursor: 'pointer' }} onClick={() => { setOngletActif('accueil'); setProfilCible(null); }}>
                            <span style={{ fontSize: '1.5rem', color: 'var(--orange-primary)', fontWeight: 'bold' }}>Connect</span>
                            <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>Hub</span>
                        </div>
                        
                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                            {utilisateurConnecte && (
                                <div className="notif-container">
                                    <button className="notif-bell" onClick={() => setAfficherNotifs(!afficherNotifs)}>🔔</button>
                                    {afficherNotifs && <NotificationsDropdown utilisateurConnecte={utilisateurConnecte} fermer={() => setAfficherNotifs(false)} />}
                                </div>
                            )}

                            <button className="profile-btn" onClick={() => { setOngletActif('profil'); setProfilCible(null); setAfficherNotifs(false); setModalCreationOuverte(false); }}>
                                <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', backgroundColor: '#333' }}>
                                    {utilisateurConnecte ? utilisateurConnecte.Nom.charAt(0).toUpperCase() : '👤'}
                                </div>
                            </button>
                        </div>
                    </header>

                    {/* GRILLE DE CONTENU PRINCIPALE */}
                    <main>
                        <div className="content-container-grid">
                            
                            {/* COLONNE GAUCHE : Bouton Créer contextuel */}
                            <div className="sidebar-left-action">
                                {['accueil', 'evenements', 'communautes'].includes(ongletActif) && !profilCible && (
                                    <button className="btn-plus" onClick={handlePlusAction}>
                                        <span>➕</span> Créer
                                    </button>
                                )}
                            </div>

                            {/* COLONNE DROITE : Flux applicatif principal */}
                            <div className="main-content-feed">
                                {profilCible ? (
                                    <ProfilPublic id={profilCible} visiteur={utilisateurConnecte} fermer={() => setProfilCible(null)} demarrerDiscussion={demarrerDiscussion} />
                                ) : (
                                    <>
                                        {ongletActif === 'profil' && (
                                            utilisateurConnecte ? <Profil utilisateurConnecte={utilisateurConnecte} setUtilisateurConnecte={setUtilisateurConnecte} setOngletActif={setOngletActif} />
                                            : <Authentification onConnect={(user) => { setUtilisateurConnecte(user); setOngletActif('accueil'); }} />
                                        )}

                                        {ongletActif === 'accueil' && <FilActualite utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'communautes' && <Communautes utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'evenements' && <Evenements utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'messages' && <Messages utilisateurConnecte={utilisateurConnecte} contactPreselectionne={contactPreselectionne} />}
                                        {ongletActif === 'recherche' && <Recherche utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} />}
                                        {ongletActif === 'moderation' && <DashboardModeration utilisateurConnecte={utilisateurConnecte} />}
                                    </>
                                )}
                            </div>

                        </div>
                    </main>

                    {/* BARRE DE NAVIGATION (Ordre strict) */}
                    <nav className="bottom-nav">
                        <div className={`nav-item ${ongletActif === 'accueil' ? 'active' : ''}`} onClick={() => { setOngletActif('accueil'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon" style={{ fontSize: '1.6rem', color: ongletActif === 'accueil' ? 'var(--orange-primary)' : 'inherit' }}>🏠</span>
                            <span style={{ fontSize: '0.7rem' }}>Accueil</span>
                        </div>

                        <div className={`nav-item ${ongletActif === 'communautes' ? 'active' : ''}`} onClick={() => { setOngletActif('communautes'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">👥</span>
                            <span style={{ fontSize: '0.7rem' }}>Groupes</span>
                        </div>
                        
                        <div className={`nav-item ${ongletActif === 'evenements' ? 'active' : ''}`} onClick={() => { setOngletActif('evenements'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">📅</span>
                            <span style={{ fontSize: '0.7rem' }}>Événements</span>
                        </div>
                        
                        <div className={`nav-item ${ongletActif === 'messages' ? 'active' : ''}`} onClick={() => { setOngletActif('messages'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">💬</span>
                            <span style={{ fontSize: '0.7rem' }}>Messages</span>
                        </div>

                        <div className={`nav-item ${ongletActif === 'recherche' ? 'active' : ''}`} onClick={() => { setOngletActif('recherche'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">🔍</span>
                            <span style={{ fontSize: '0.7rem' }}>Recherche</span>
                        </div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
