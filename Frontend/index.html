                formData.append('auteur_id', utilisateurConnecte.ID);
                if (fichierMedia) formData.append('media', fichierMedia);

                fetch("../Backend/ajouter_publication.php", { method: "POST", body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else { setNouveauMessage(""); setFichierMedia(null); fermerModal(); chargerPublications(); }
                });
            };

            // --- MODIFICATION ---
            const activerEditionInline = (pub) => {
                setIdPostEnEdition(pub.ID);
                setTexteEdition(pub.Contenu);
                setIdPostEnSuppression(null); 
                setPubAPartager(null);
                setIdPostEnSignalement(null);
            };

            const validerModificationInline = (pubId) => {
                if (!texteEdition.trim()) return;
                fetch("../Backend/modifier_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID, contenu: texteEdition })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert(data.erreur);
                    else { setIdPostEnEdition(null); chargerPublications(); }
                });
            };

            const validerSuppressionInline = (pubId) => {
                fetch("../Backend/supprimer_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, utilisateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert(data.erreur);
                    else { setIdPostEnSuppression(null); chargerPublications(); }
                });
            };

            // --- NOUVEAU : GESTION DU SIGNALEMENT INTÉGRÉ ---
            const ouvrirSignalement = (pub) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter pour signaler.");
                if (idPostEnSignalement === pub.ID) {
                    setIdPostEnSignalement(null); // Refermer
                    return;
                }
                setIdPostEnSignalement(pub.ID);
                setMotifSignalement("");
                // On ferme les autres fenêtres pour éviter la surcharge
                setPubAPartager(null);
                setIdPostEnEdition(null);
                setIdPostEnSuppression(null);
            };

            const validerSignalement = (pubId) => {
                if (!motifSignalement.trim()) return alert("Veuillez préciser la raison du signalement.");
                
                fetch("../Backend/signaler_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, signaleur_id: utilisateurConnecte.ID, motif: motifSignalement })
                })
                .then(res => res.json()).then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        alert("✅ " + data.succes);
                        setIdPostEnSignalement(null);
                    }
                });
            };

            // --- PARTAGE ---
            const ouvrirPartage = (pub) => {
                if (!utilisateurConnecte) return alert("Connectez-vous pour partager.");
                if (pubAPartager === pub.ID) {
                    setPubAPartager(null); 
                    return;
                }
                setPubAPartager(pub.ID);
                setIdPostEnSignalement(null); // Ferme le signalement si ouvert
                fetch("../Backend/get_utilisateurs.php")
                    .then(res => res.json())
                    .then(data => { if (!data.erreur) setListeContacts(data.filter(u => u.ID !== utilisateurConnecte.ID)); });
            };

            const envoyerPartage = (contactId, pub) => {
                const lien = `\n\n--- Performance partagée ---\nDe : ${pub.Nom}\n"${pub.Contenu}"\n--------------------------`;
                fetch("../Backend/envoyer_message.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ expediteur_id: utilisateurConnecte.ID, destinataire_id: contactId, contenu: lien })
                })
                .then(res => res.json())
                .then(data => {
                    if(!data.erreur) {
                        alert("✅ Publication envoyée en message privé !");
                        setPubAPartager(null);
                    } else {
                        alert("❌ Erreur d'envoi.");
                    }
                });
            };

            return (
                <div>
                    {modalOuverte && (
                        <div className="modal-overlay" onClick={fermerModal}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={fermerModal}>✖</button>
                                <h3 style={{ marginTop: 0, color: 'var(--orange-primary)' }}>Partager une performance</h3>
                                <form onSubmit={handlePublier} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <textarea value={nouveauMessage} onChange={(e) => setNouveauMessage(e.target.value)} placeholder="Décrivez votre séance, posez une question..." rows="4" required={!fichierMedia} />
                                    <input type="file" accept="image/*,video/*" onChange={(e) => setFichierMedia(e.target.files[0])} style={{ padding: 0 }} />
                                    <button type="submit" className="btn-primary">Publier</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div style={{ display: 'flex', gap: '1rem', marginBottom: '1rem', justifyContent: 'center' }}>
                        <button onClick={() => setFluxActif("recommandations")} style={{ background: 'none', border: 'none', color: fluxActif === "recommandations" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "recommandations" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Pour vous</button>
                        {utilisateurConnecte && (
                            <button onClick={() => setFluxActif("abonnes")} style={{ background: 'none', border: 'none', color: fluxActif === "abonnes" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "abonnes" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}>Abonnements</button>
                        )}
                    </div>

                    <div className="card">
                        {chargement ? <p style={{ textAlign: 'center' }}>Chargement...</p> : publications.length === 0 ? <p style={{ textAlign: 'center' }}>Aucune publication.</p> : publications.map(pub => (
                            <div key={pub.ID} className="post">
                                <div className="post-header">
                                    <span className="post-author" onClick={() => ouvrirProfil(pub.Auteur_ID)} style={{ cursor: 'pointer', textDecoration: 'underline' }}>{pub.Nom}</span>
                                    
                                    {/* Le bouton Signaler a été retiré d'ici */}
                                    {utilisateurConnecte && utilisateurConnecte.ID === pub.Auteur_ID && idPostEnEdition !== pub.ID ? (
                                        <div style={{ display: 'flex', gap: '0.6rem' }}>

       // --- COMPOSANT PROFIL PUBLIC (Vue avec Signalement intégré) ---
        function ProfilPublic({ id, visiteur, fermer, demarrerDiscussion }) {
            const [data, setData] = React.useState(null);
            const [chargement, setChargement] = React.useState(true);

            // NOUVEAUX ÉTATS POUR LE SIGNALEMENT
            const [modeSignalement, setModeSignalement] = React.useState(false);
            const [motifSignalement, setMotifSignalement] = React.useState("");

            const chargerProfil = () => {
                fetch(`../Backend/get_profil_public.php?id=${id}&visiteur=${visiteur ? visiteur.ID : 0}`)
                    .then(res => res.json())
                    .then(resData => {
                        if (!resData.erreur) setData(resData);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerProfil(); }, [id]);

            const handleActionAbonnement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour vous abonner.");
                fetch("../Backend/suivre_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ suiveur_id: visiteur.ID, suivi_id: id })
                })
                    .then(res => res.json())
                    .then(d => {
                        if (!d.erreur) chargerProfil(); 
                    });
            };

            const ouvrirSignalement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour signaler un profil.");
                setModeSignalement(!modeSignalement);
                setMotifSignalement("");
            };

            const validerSignalement = () => {
                if (!motifSignalement.trim()) return alert("Veuillez préciser la raison du signalement.");
                
                fetch("../Backend/signaler_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cible_id: id, signaleur_id: visiteur.ID, motif: motifSignalement })
                })
                .then(res => res.json())
                .then(resData => {
                    if (resData.erreur) alert("❌ " + resData.erreur);
                    else {
                        alert("✅ " + resData.succes);
                        setModeSignalement(false);
                        setMotifSignalement("");
                    }
                });
            };

            if (chargement) return <div className="card" style={{ textAlign: 'center' }}>Chargement du profil...</div>;
            if (!data || !data.utilisateur) return <div className="card" style={{ textAlign: 'center' }}>Profil introuvable. <button className="btn-primary" onClick={fermer}>Retour</button></div>;

            const u = data.utilisateur;
            const pubs = data.publications;

            return (
                <div>
                    <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', marginBottom: '1rem', fontSize: '1rem' }}>
                        ⬅ Retour
                    </button>

                    <div className="card" style={{ textAlign: 'center' }}>
                        <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: '#333' }}>
                            {u.Nom.charAt(0).toUpperCase()}
                        </div>
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{u.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{u.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnes}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnements}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        {visiteur && visiteur.ID !== u.ID && (
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.8rem', flexWrap: 'wrap' }}>
                                <button
                                    onClick={handleActionAbonnement}
                                    className="btn-primary"
                                    style={{ backgroundColor: u.EstAbonne ? '#333' : 'var(--orange-primary)', color: 'white', border: u.EstAbonne ? '1px solid var(--border-color)' : 'none' }}
                                >
                                    {u.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                </button>
                                <button
                                    onClick={() => demarrerDiscussion(u)}
                                    className="btn-primary"
                                    style={{ backgroundColor: 'transparent', border: '1px solid var(--orange-primary)', color: 'var(--orange-primary)' }}
                                >
                                    💬 Message
                                </button>
                                
                                <button
                                    onClick={ouvrirSignalement}
                                    className="btn-primary"
                                    style={{ backgroundColor: modeSignalement ? '#dc3545' : 'transparent', border: '1px solid #dc3545', color: modeSignalement ? 'white' : '#dc3545' }}
                                >
                                    ⚠️ Signaler
                                </button>
                            </div>
                        )}

                        {/* INTERFACE DE SIGNALEMENT INTÉGRÉE (Sous les boutons) */}
                        {modeSignalement && (
                            <div style={{ marginTop: '1.5rem', padding: '1rem', backgroundColor: 'rgba(220, 53, 69, 0.05)', borderRadius: '8px', border: '1px dashed #dc3545', textAlign: 'left' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}>
                                    <strong style={{ color: '#dc3545', fontSize: '0.9rem' }}>Signaler le profil de {u.Nom} :</strong>
                                    <button onClick={() => setModeSignalement(false)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer' }}>✖</button>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    <textarea 
                                        placeholder="Précisez la raison (Faux compte, usurpation d'identité, comportement inapproprié...)" 
                                        value={motifSignalement} 
                                        onChange={(e) => setMotifSignalement(e.target.value)} 
                                        rows="3" 
                                        style={{ fontSize: '0.9rem', padding: '0.6rem', borderColor: '#dc3545' }}
                                    />
                                    <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '0.5rem' }}>
                                        <button className="btn-primary" style={{ backgroundColor: '#333', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={() => setModeSignalement(false)}>Annuler</button>
                                        <button className="btn-primary" style={{ backgroundColor: '#dc3545', padding: '0.4rem 0.8rem', fontSize: '0.8rem' }} onClick={validerSignalement}>Envoyer le signalement</button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>

                    <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>Performances de {u.Nom}</h3>

                    {pubs.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune publication pour le moment.</p>
                    ) : (
                        pubs.map(pub => (
                            <div key={pub.ID} className="card post" style={{ padding: '1.5rem' }}>
                                <div className="post-header">
                                    <span className="post-author">{pub.Nom}</span>
                                    <span className="post-date">{pub.Date_Publication}</span>
                                </div>
                                <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} alt="Performance" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                        )}
                                    </div>
                                )}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects</span>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT MENU DÉROULANT DES NOTIFICATIONS (Interactif & Redirection) ---
        function NotificationsDropdown({ utilisateurConnecte, fermer, setOngletActif, setProfilCible }) {
            const [notifs, setNotifs] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            React.useEffect(() => {
                if (utilisateurConnecte) {
                    fetch(`../Backend/get_notifications.php?user_id=${utilisateurConnecte.ID}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.erreur) setNotifs(data);
                            setChargement(false);
                        });
                }
            }, [utilisateurConnecte]);

            // Fonction pour rediriger l'utilisateur et marquer comme "lu" (suppression)
            const traiterNotif = (notif) => {
                fetch("../Backend/supprimer_notification.php", {
                    method: "POST",
                    body: JSON.stringify({ notif_id: notif.ID })
                });

                if (notif.Type_Action === 'Like') {
                    setOngletActif('profil');
                    setProfilCible(null);
                } else if (notif.Type_Action === 'Abonnement') {
                    setProfilCible(notif.Acteur_ID); // Ouvre le profil de la personne
                } else if (notif.Type_Action === 'Signalement') {
                    setOngletActif('moderation');
                    setProfilCible(null);
                }
                fermer(); // Ferme le menu déroulant
            };

            // Fonction pour juste supprimer la notification sans rediriger
            const supprimerNotif = (e, id) => {
                e.stopPropagation(); // Empêche de déclencher le clic global "traiterNotif"
                fetch("../Backend/supprimer_notification.php", {
                    method: "POST",
                    body: JSON.stringify({ notif_id: id })
                }).then(() => {
                    setNotifs(notifs.filter(n => n.ID !== id));
                });
            };

            return (
                <div className="notif-dropdown">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>
                        <h3 style={{ margin: 0, color: 'var(--orange-primary)', fontSize: '1.1rem' }}>Alertes</h3>
                        <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>✖</button>
                    </div>

                    {chargement ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Vérification...</p>
                    ) : notifs.length === 0 ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Aucune activité récente.</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                            {notifs.map(n => (
                                <div key={n.ID} onClick={() => traiterNotif(n)} style={{
                                    padding: '0.8rem',
                                    backgroundColor: '#1a1a1a',
                                    borderLeft: '3px solid var(--orange-primary)',
                                    borderRadius: '4px',
                                    fontSize: '0.85rem',
                                    cursor: 'pointer',
                                    position: 'relative',
                                    transition: 'background-color 0.2s'
                                }}
                                onMouseEnter={e => e.currentTarget.style.backgroundColor = '#2a2a2a'}
                                onMouseLeave={e => e.currentTarget.style.backgroundColor = '#1a1a1a'}
                                >
                                    <button onClick={(e) => supprimerNotif(e, n.ID)} style={{position:'absolute', right:'5px', top:'5px', background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:'0.9rem'}}>✖</button>
                                    
                                    <div style={{ paddingRight: '1rem' }}>
                                        {n.Type_Action === 'Like' && <span>🔥 <strong>{n.ActeurNom}</strong> a lâché un Respect.</span>}
                                        {n.Type_Action === 'Abonnement' && <span>👤 <strong>{n.ActeurNom}</strong> vous suit.</span>}
                                        {n.Type_Action === 'Signalement' && <span>⚠️ <strong>{n.ActeurNom}</strong> a signalé un contenu.</span>}
                                    </div>
                                    <div style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginTop: '0.3rem' }}>{n.Date_Notification}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT TABLEAU DE BORD DE MODÉRATION ---
        function DashboardModeration({ utilisateurConnecte }) {
            const [signalements, setSignalements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            const chargerSignalements = () => {
                fetch(`../Backend/get_signalements.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) setSignalements(data);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerSignalements(); }, []);

            const commanderAction = (sigId, pubId, action) => {
                fetch("../Backend/traiter_signalement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ signalement_id: sigId, publication_id: pubId, action: action, moderateur_id: utilisateurConnecte.ID })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) {
                            alert("💼 " + data.succes);
                            chargerSignalements(); // Rafraîchit la liste
                        }
                    });
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Espace Modération</h2>
                    <p style={{ color: 'var(--text-muted)' }}>Consultez et traitez les publications signalées par la communauté.</p>

                    {chargement ? (
                        <p style={{ textAlign: 'center' }}>Chargement des alertes...</p>
                    ) : signalements.length === 0 ? (
                        <p style={{ textAlign: 'center', color: '#28a745' }}>✅ Aucun signalement en attente. Bon travail !</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            {signalements.map(s => (
                                <div key={s.ID} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', border: '1px solid #dc3545' }}>
                                    <div style={{ marginBottom: '0.5rem', fontSize: '0.9rem' }}>
                                        ⚠️ Post de <strong>{s.Auteur_Nom || s.AuteurNom}</strong> signalé pour : <span style={{ color: '#dc3545', fontWeight: 'bold' }}>{s.Motif}</span>
                                    </div>
                                    <blockquote style={{ margin: '0 0 1rem 0', paddingLeft: '0.5rem', borderLeft: '2px solid var(--border-color)', color: 'var(--text-muted)', italic: 'true' }}>
                                        "{s.PostContenu}"
                                    </blockquote>
                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'supprimer')} className="btn-primary" style={{ backgroundColor: '#dc3545', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Supprimer le post</button>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'rejeter')} className="btn-primary" style={{ backgroundColor: '#333', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Ignorer</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
       // --- COMPOSANT PRINCIPAL DE L'APPLICATION (Mise à jour pour les props des Notifs) ---
        function App() {
            const [ongletActif, setOngletActif] = React.useState('accueil');
            const [utilisateurConnecte, setUtilisateurConnecte] = React.useState(null);

            const [profilCible, setProfilCible] = React.useState(null);
            const [contactPreselectionne, setContactPreselectionne] = React.useState(null);
            const [afficherNotifs, setAfficherNotifs] = React.useState(false);
            const [modalCreationOuverte, setModalCreationOuverte] = React.useState(false);

            const ouvrirProfil = (id) => setProfilCible(id);

            const demarrerDiscussion = (utilisateur) => {
                setContactPreselectionne(utilisateur);
                setProfilCible(null);
                setOngletActif('messages');
            };

            const handlePlusAction = () => {
                if (!utilisateurConnecte) {
                    alert("Veuillez vous connecter pour créer du contenu.");
                    setOngletActif('profil');
                    return;
                }
                if (['accueil', 'evenements', 'communautes'].includes(ongletActif)) {
                    setModalCreationOuverte(true);
                }
            };

            return (
                <div>
                    <header className="top-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem', cursor: 'pointer' }} onClick={() => { setOngletActif('accueil'); setProfilCible(null); }}>
                            <span style={{ fontSize: '1.5rem', color: 'var(--orange-primary)', fontWeight: 'bold' }}>Connect</span>
                            <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>Hub</span>
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                            {utilisateurConnecte && (
                                <div className="notif-container">
                                    <button className="notif-bell" onClick={() => setAfficherNotifs(!afficherNotifs)}>🔔</button>
                                    {afficherNotifs && (
                                        <NotificationsDropdown 
                                            utilisateurConnecte={utilisateurConnecte} 
                                            fermer={() => setAfficherNotifs(false)} 
                                            setOngletActif={setOngletActif}
                                            setProfilCible={setProfilCible}
                                        />
                                    )}
                                </div>
                            )}

                            <button className="profile-btn" onClick={() => { setOngletActif('profil'); setProfilCible(null); setAfficherNotifs(false); setModalCreationOuverte(false); }}>
                                {utilisateurConnecte && utilisateurConnecte.Photo_Profil ? (
                                    <img src={`../Backend/${utilisateurConnecte.Photo_Profil}`} alt="Profil" className="profile-pic" />
                                ) : (
                                    <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', backgroundColor: '#333' }}>
                                        {utilisateurConnecte ? utilisateurConnecte.Nom.charAt(0).toUpperCase() : '👤'}
                                    </div>
                                )}
                            </button>
                        </div>
                    </header>

                    <main>
                        <div className="content-container-grid">
                            <div className="sidebar-left-action">
                                {['accueil', 'evenements', 'communautes'].includes(ongletActif) && !profilCible && (
                                    <button className="btn-plus" onClick={handlePlusAction}>
                                        <span>➕</span> Créer
                                    </button>
                                )}
                            </div>

                            <div className="main-content-feed">
                                {profilCible ? (
                                    <ProfilPublic id={profilCible} visiteur={utilisateurConnecte} fermer={() => setProfilCible(null)} demarrerDiscussion={demarrerDiscussion} />
                                ) : (
                                    <>
                                        {ongletActif === 'profil' && (
                                            utilisateurConnecte ? <Profil utilisateurConnecte={utilisateurConnecte} setUtilisateurConnecte={setUtilisateurConnecte} setOngletActif={setOngletActif} />
                                                : <Authentification onConnect={(user) => { setUtilisateurConnecte(user); setOngletActif('accueil'); }} />
                                        )}

                                        {ongletActif === 'accueil' && <FilActualite utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'communautes' && <Communautes utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'evenements' && <Evenements utilisateurConnecte={utilisateurConnecte} modalOuverte={modalCreationOuverte} fermerModal={() => setModalCreationOuverte(false)} />}
                                        {ongletActif === 'messages' && <Messages utilisateurConnecte={utilisateurConnecte} contactPreselectionne={contactPreselectionne} />}
                                        {ongletActif === 'recherche' && <Recherche utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} />}
                                        {ongletActif === 'moderation' && <DashboardModeration utilisateurConnecte={utilisateurConnecte} />}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>

                    <nav className="bottom-nav">
                        <div className={`nav-item ${ongletActif === 'accueil' ? 'active' : ''}`} onClick={() => { setOngletActif('accueil'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon" style={{ fontSize: '1.6rem', color: ongletActif === 'accueil' ? 'var(--orange-primary)' : 'inherit' }}>🏠</span>
                            <span style={{ fontSize: '0.7rem' }}>Accueil</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'communautes' ? 'active' : ''}`} onClick={() => { setOngletActif('communautes'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">👥</span>
                            <span style={{ fontSize: '0.7rem' }}>Groupes</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'evenements' ? 'active' : ''}`} onClick={() => { setOngletActif('evenements'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">📅</span>
                            <span style={{ fontSize: '0.7rem' }}>Événements</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'messages' ? 'active' : ''}`} onClick={() => { setOngletActif('messages'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">💬</span>
                            <span style={{ fontSize: '0.7rem' }}>Messages</span>
                        </div>
                        <div className={`nav-item ${ongletActif === 'recherche' ? 'active' : ''}`} onClick={() => { setOngletActif('recherche'); setProfilCible(null); setModalCreationOuverte(false); setAfficherNotifs(false); }}>
                            <span className="nav-icon">🔍</span>
                            <span style={{ fontSize: '0.7rem' }}>Recherche</span>
                        </div>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
