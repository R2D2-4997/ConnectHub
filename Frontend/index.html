<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub - Sport & Performance</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* === NOUVELLE DA : NOIR ET ORANGE === */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --orange-primary: #FF6B00;
            --orange-hover: #e65c00;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-light);
            padding-bottom: 70px; /* Espace pour la barre de navigation en bas */
        }
        /* === MENU NOTIFICATIONS FLOTTANT === */
        .notif-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .notif-bell {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            padding: 0;
            margin-right: 1rem;
        }
        .notif-dropdown {
            position: absolute;
            top: 45px;
            right: -50px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 1rem;
        }

        /* En-tête haut */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Profil / Connexion (Haut Gauche) */
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-weight: bold;
        }
        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--orange-primary);
            object-fit: cover;
        }

        /* Contenu principal */
        main { padding: 1rem; max-width: 600px; margin: auto; }

        .card { 
            background: var(--bg-card); 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        /* Formulaire & Boutons */
        textarea, input {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea:focus, input:focus { outline: none; border-color: var(--orange-primary); }
        
        .btn-primary { 
            background-color: var(--orange-primary); 
            color: white; 
            border: none; 
            padding: 0.75rem 1.5rem; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-primary:hover { background-color: var(--orange-hover); }

        /* Publications */
        .post { border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .post:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; align-items: center; }
        .post-author { font-weight: bold; color: var(--orange-primary); font-size: 1.1rem; }
        .post-date { color: var(--text-muted); font-size: 0.85rem; }
        .btn-like {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-like:hover, .btn-like.active { border-color: var(--orange-primary); color: var(--orange-primary); }

        /* Navigation Bas (Mobile/App style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            gap: 0.3rem;
        }
        .nav-item.active { color: var(--orange-primary); }
        .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- COMPOSANT PROFIL / PARAMÈTRES ---
        function Profil({ utilisateurConnecte, setUtilisateurConnecte, setOngletActif }) {
            const [modeEdition, setModeEdition] = React.useState(false);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');

            // Quand on clique sur "Modifier", on pré-remplit le formulaire avec les infos actuelles
            const lancerEdition = () => {
                setFormData({ nom: utilisateurConnecte.Nom, email: utilisateurConnecte.Email, motDePasse: '' });
                setModeEdition(true);
                setMessage('');
            };

            const handleSauvegarder = (e) => {
                e.preventDefault();
                
                const dataToUpdate = {
                    id: utilisateurConnecte.ID,
                    nom: formData.nom,
                    email: formData.email,
                    motDePasse: formData.motDePasse // Sera vide si l'utilisateur ne le modifie pas
                };

                fetch("../Backend/modifier_profil.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dataToUpdate)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) {
                        setMessage("❌ " + data.erreur);
                    } else {
                        setMessage("✅ " + data.succes);
                        setUtilisateurConnecte(data.utilisateur); // Met à jour l'état global avec le nouveau nom/email
                        setModeEdition(false); // Repasse en vue normale
                    }
                })
                .catch(() => setMessage("❌ Erreur de communication avec le serveur."));
            };

            return (
                <div className="card" style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🏅</div>
                    
                    {!modeEdition ? (
                        // VUE LECTURE (Profil normal)
                        <div>
                            <h2 style={{ color: 'var(--orange-primary)' }}>Profil de {utilisateurConnecte.Nom}</h2>
                            <p style={{ color: 'var(--text-muted)' }}>{utilisateurConnecte.Email}</p>
                            <p style={{ color: 'var(--text-muted)' }}>Rôle : {utilisateurConnecte.Role}</p>
                            
                            {message && <p style={{ fontWeight: 'bold', color: '#28a745' }}>{message}</p>}

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem', marginTop: '1.5rem' }}>
                                <button className="btn-primary" onClick={lancerEdition}>Paramètres du compte</button>
                                <button 
                                    className="btn-primary" 
                                    style={{ backgroundColor: '#333' }}
                                    onClick={() => { setUtilisateurConnecte(null); setOngletActif('accueil'); }}
                                >
                                    Se déconnecter
                                </button>
                            </div>
                        </div>
                    ) : (
                        // VUE ÉDITION (Formulaire)
                        <form onSubmit={handleSauvegarder} style={{ display: 'flex', flexDirection: 'column', gap: '1rem', textAlign: 'left' }}>
                            <h2 style={{ color: 'var(--orange-primary)', textAlign: 'center', marginTop: 0 }}>Modifier mes informations</h2>
                            
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nom d'athlète</label>
                                <input type="text" value={formData.nom} onChange={e => setFormData({...formData, nom: e.target.value})} required />
                            </div>
                            
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Adresse Email</label>
                                <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} required />
                            </div>
                            
                            <div>
                                <label style={{ color: 'var(--text-muted)', fontSize: '0.9rem', display: 'block', marginBottom: '0.5rem' }}>Nouveau mot de passe <small>(laisser vide pour conserver l'actuel)</small></label>
                                <input type="password" placeholder="***" value={formData.motDePasse} onChange={e => setFormData({...formData, motDePasse: e.target.value})} />
                            </div>
                            
                            <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                                <button type="button" className="btn-primary" style={{ flex: 1, backgroundColor: '#333' }} onClick={() => setModeEdition(false)}>Annuler</button>
                                <button type="submit" className="btn-primary" style={{ flex: 1, backgroundColor: '#28a745' }}>Enregistrer</button>
                            </div>
                        </form>
                    )}
                </div>
            );
        }

        // --- COMPOSANT PLACEHOLDER ÉVÉNEMENTS (Tout à gauche) ---
        // --- COMPOSANT ÉVÉNEMENTS (Connecté à la BDD) ---
        function Evenements({ utilisateurConnecte }) {
            const [listeEvenements, setListeEvenements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            const chargerEvenements = () => {
                fetch("../Backend/get_evenements.php")
                    .then(res => res.json())
                    .then(data => {
                        if (data.erreur) console.error(data.erreur);
                        else setListeEvenements(data);
                        setChargement(false);
                    })
                    .catch(err => { console.error(err); setChargement(false); });
            };

            React.useEffect(() => { chargerEvenements(); }, []);

            const handleParticiper = (id) => {
                if (!utilisateurConnecte) {
                    alert("Vous devez vous connecter pour participer à un événement.");
                    return;
                }

                fetch("../Backend/participer_evenement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ evenement_id: id, utilisateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else if (data.info) alert("ℹ️ " + data.info);
                    else {
                        alert("✅ " + data.succes);
                        chargerEvenements(); // Rafraîchit le nombre de participants
                    }
                });
            };

            return (
                <div>
                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Calendrier Sportif</h2>
                        <p style={{ color: 'var(--text-muted)' }}>Découvrez les sessions collectives et compétitions à venir.</p>
                        <button className="btn-primary" style={{ width: '100%' }} onClick={() => alert("Création d'événement bientôt disponible !")}>
                            + Organiser un événement
                        </button>
                    </div>

                    {chargement ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche des événements...</p>
                    ) : listeEvenements.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun événement prévu pour le moment.</p>
                    ) : (
                        listeEvenements.map(evt => (
                            <div key={evt.ID} className="card" style={{ borderLeft: '4px solid #28a745' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
                                    <h3 style={{ margin: 0, fontSize: '1.2rem' }}>{evt.Titre}</h3>
                                </div>
                                
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.3rem', marginBottom: '1rem', fontSize: '0.9rem', color: 'var(--text-light)' }}>
                                    <span>📅 <strong>{evt.Date_Formatee}</strong></span>
                                    <span>📍 {evt.Lieu}</span>
                                    <span style={{ color: 'var(--text-muted)' }}>👤 Organisé par {evt.Createur}</span>
                                </div>
                                
                                <p style={{ lineHeight: '1.4', marginBottom: '1.5rem', fontSize: '0.95rem' }}>
                                    {evt.Description}
                                </p>
                                
                                <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                                    <button 
                                        onClick={() => handleParticiper(evt.ID)}
                                        style={{ flex: 1, backgroundColor: 'transparent', color: '#28a745', border: '1px solid #28a745', padding: '0.6rem', borderRadius: '20px', cursor: 'pointer', fontWeight: 'bold' }}
                                    >
                                        Je participe
                                    </button>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>
                                        🏃 {evt.NbParticipants} inscrits
                                    </span>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT RECHERCHE (Connecté à la BDD) ---
        function Recherche({ utilisateurConnecte, ouvrirProfil }) {
            const [requete, setRequete] = React.useState("");
            const [ongletActif, setOngletActif] = React.useState("publications");
            const [resultats, setResultats] = React.useState([]);
            const [chargement, setChargement] = React.useState(false);

            // Liste de nos sous-onglets
            const onglets = [
                { id: 'publications', label: 'Publications' },
                { id: 'utilisateurs', label: 'Athlètes' },
                { id: 'communautes', label: 'Communautés' },
                { id: 'evenements', label: 'Événements' },
                { id: 'sports', label: 'Sports' }
            ];

            // Lance la recherche à chaque fois que la requête OU l'onglet change
            React.useEffect(() => {
                if (requete.trim() === "") {
                    setResultats([]); // On vide si la barre est vide
                    return;
                }

                // Simulation pour les tables non existantes
                if (ongletActif === 'evenements' || ongletActif === 'sports') {
                    setResultats([{ mock: true, message: `Bientôt : Recherche de ${ongletActif} liés à "${requete}"` }]);
                    return;
                }

                setChargement(true);
                fetch("../Backend/rechercher.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ requete: requete, type: ongletActif })
                })
                .then(res => res.json())
                .then(data => {
                    setResultats(data);
                    setChargement(false);
                })
                .catch(err => { console.error(err); setChargement(false); });

            }, [requete, ongletActif]);

            return (
                <div>
                    <div className="card" style={{ padding: '1rem', marginBottom: '1rem' }}>
                        {/* Barre de recherche */}
                        <div style={{ position: 'relative' }}>
                            <span style={{ position: 'absolute', left: '15px', top: '15px', fontSize: '1.2rem' }}>🔍</span>
                            <input 
                                type="text" 
                                placeholder={`Rechercher dans ${onglets.find(o => o.id === ongletActif).label}...`}
                                value={requete}
                                onChange={(e) => setRequete(e.target.value)}
                                style={{ width: '100%', padding: '1rem 1rem 1rem 3rem', borderRadius: '25px', backgroundColor: '#111', border: '1px solid var(--border-color)', color: 'white' }} 
                            />
                        </div>

                        {/* Sous-onglets de recherche horizontaux */}
                        <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', overflowX: 'auto', paddingBottom: '0.5rem' }}>
                            {onglets.map(onglet => (
                                <button 
                                    key={onglet.id}
                                    onClick={() => setOngletActif(onglet.id)}
                                    style={{
                                        backgroundColor: ongletActif === onglet.id ? 'var(--orange-primary)' : 'transparent',
                                        color: ongletActif === onglet.id ? 'white' : 'var(--text-muted)',
                                        border: `1px solid ${ongletActif === onglet.id ? 'var(--orange-primary)' : 'var(--border-color)'}`,
                                        padding: '0.4rem 1rem',
                                        borderRadius: '20px',
                                        cursor: 'pointer',
                                        whiteSpace: 'nowrap',
                                        fontWeight: ongletActif === onglet.id ? 'bold' : 'normal'
                                    }}
                                >
                                    {onglet.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Zone d'affichage des résultats */}
                    <div>
                        {requete === "" ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)', marginTop: '2rem' }}>Tapez un mot clé pour lancer la recherche.</p>
                        ) : chargement ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche en cours...</p>
                        ) : resultats.length === 0 ? (
                            <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun résultat trouvé pour "{requete}".</p>
                        ) : (
                            resultats.map((res, index) => (
                                <div key={res.ID || index} className="card" style={{ padding: '1rem', marginBottom: '0.5rem' }}>
                                    
                                    {/* Affichage adapté selon le type de résultat */}
                                    {res.mock ? (
                                        <p style={{ color: 'var(--orange-primary)', textAlign: 'center', margin: 0 }}>{res.message}</p>
                                    ) : ongletActif === 'publications' ? (
                                        <div>
                                            <div 
                                                className="post-author" 
                                                style={{ fontSize: '0.9rem', cursor: 'pointer', textDecoration: 'underline' }}
                                                onClick={() => ouvrirProfil(res.Auteur_ID)}
                                            >
                                                {res.Nom}
                                            </div>
                                            <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.9rem' }}>{res.Contenu}</p>
                                        </div>
                                    ) : ongletActif === 'utilisateurs' ? (
                                        <div 
                                            style={{ display: 'flex', alignItems: 'center', gap: '1rem', cursor: 'pointer' }}
                                            onClick={() => ouvrirProfil(res.ID)}
                                        >
                                            <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', width: '40px', height: '40px' }}>
                                                {res.Nom.charAt(0)}
                                            </div>
                                            <div>
                                                <div style={{ fontWeight: 'bold' }}>{res.Nom}</div>
                                                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{res.Role}</div>
                                            </div>
                                        </div>
                                    ) : ongletActif === 'communautes' ? (
                                        <div>
                                            <div style={{ fontWeight: 'bold', color: 'var(--orange-primary)' }}>{res.Nom}</div>
                                            <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{res.Description}</p>
                                        </div>
                                    ) : null}

                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        } 
        // --- COMPOSANT COMMUNAUTÉS (Connecté à la BDD avec création) ---
        function Communautes({ utilisateurConnecte }) {
            const [listeCommunautes, setListeCommunautes] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            
            // États pour gérer le formulaire de création
            const [afficherFormulaire, setAfficherFormulaire] = React.useState(false);
            const [nouveauGroupe, setNouveauGroupe] = React.useState({ nom: '', description: '' });

            const chargerCommunautes = () => {
                fetch("../Backend/get_communautes.php")
                    .then(response => response.json())
                    .then(data => {
                        if (data.erreur) console.error(data.erreur);
                        else setListeCommunautes(data);
                        setChargement(false);
                    })
                    .catch(error => { console.error("Erreur:", error); setChargement(false); });
            };

            React.useEffect(() => { chargerCommunautes(); }, []);

            const handleRejoindre = (id) => {
                if (!utilisateurConnecte) {
                    alert("Vous devez vous connecter pour rejoindre un groupe.");
                    return;
                }
                const dataJoin = { communaute_id: id, utilisateur_id: utilisateurConnecte.ID };

                fetch("../Backend/rejoindre_communaute.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dataJoin)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else if (data.info) alert("ℹ️ " + data.info);
                    else {
                        alert("✅ " + data.succes);
                        chargerCommunautes(); // Rafraîchit le nombre de membres
                    }
                });
            };

            const handleCreer = (e) => {
                e.preventDefault();
                if (!utilisateurConnecte) {
                    alert("Vous devez vous connecter pour créer un groupe.");
                    return;
                }

                const postData = {
                    nom: nouveauGroupe.nom,
                    description: nouveauGroupe.description,
                    createur_id: utilisateurConnecte.ID
                };

                fetch("../Backend/creer_communaute.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(postData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.erreur) {
                        alert("❌ " + data.erreur);
                    } else {
                        alert("✅ " + data.succes);
                        setNouveauGroupe({ nom: '', description: '' }); // Vide le formulaire
                        setAfficherFormulaire(false); // Masque le formulaire
                        chargerCommunautes(); // Met à jour la liste des groupes
                    }
                });
            };

            return (
                <div>
                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Groupes d'entraînement</h2>
                        <p style={{ color: 'var(--text-muted)' }}>Trouvez des partenaires et partagez vos routines spécifiques.</p>
                        
                        {/* Bouton pour afficher/masquer le formulaire */}
                        <button 
                            className="btn-primary" 
                            style={{ width: '100%', marginBottom: afficherFormulaire ? '1rem' : '0' }} 
                            onClick={() => {
                                if(!utilisateurConnecte) alert("Veuillez vous connecter d'abord.");
                                else setAfficherFormulaire(!afficherFormulaire);
                            }}
                        >
                            {afficherFormulaire ? "Annuler" : "+ Créer une nouvelle communauté"}
                        </button>

                        {/* Formulaire de création (visible uniquement si afficherFormulaire est true) */}
                        {afficherFormulaire && (
                            <form onSubmit={handleCreer} style={{ display: 'flex', flexDirection: 'column', gap: '1rem', marginTop: '1rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                                <input 
                                    type="text" 
                                    placeholder="Nom du groupe (ex: Natation Paris)" 
                                    value={nouveauGroupe.nom} 
                                    onChange={(e) => setNouveauGroupe({...nouveauGroupe, nom: e.target.value})} 
                                    required 
                                />
                                <textarea 
                                    placeholder="Description de votre groupe et des objectifs..." 
                                    value={nouveauGroupe.description} 
                                    onChange={(e) => setNouveauGroupe({...nouveauGroupe, description: e.target.value})} 
                                    rows="3"
                                />
                                <button type="submit" className="btn-primary" style={{ backgroundColor: '#28a745' }}>Valider la création</button>
                            </form>
                        )}
                    </div>

                    {chargement ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Recherche des groupes...</p>
                    ) : listeCommunautes.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucun groupe pour le moment.</p>
                    ) : (
                        listeCommunautes.map(communaute => (
                            <div key={communaute.ID} className="card" style={{ borderLeft: '4px solid var(--orange-primary)' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
                                    <h3 style={{ margin: 0, fontSize: '1.2rem' }}>{communaute.Nom}</h3>
                                    <span style={{ backgroundColor: '#333', padding: '0.2rem 0.6rem', borderRadius: '15px', fontSize: '0.8rem' }}>
                                        👥 {communaute.NbMembres} membres
                                    </span>
                                </div>
                                <p style={{ fontSize: '0.85rem', color: 'var(--text-muted)', marginBottom: '1rem' }}>
                                    Créé par <strong style={{ color: 'white' }}>{communaute.Createur}</strong>
                                </p>
                                <p style={{ lineHeight: '1.4', marginBottom: '1.5rem' }}>
                                    {communaute.Description}
                                </p>
                                <button 
                                    onClick={() => handleRejoindre(communaute.ID)}
                                    style={{ backgroundColor: 'transparent', color: 'var(--orange-primary)', border: '1px solid var(--orange-primary)', padding: '0.5rem 1rem', borderRadius: '20px', cursor: 'pointer', width: '100%', fontWeight: 'bold' }}
                                >
                                    Rejoindre le groupe
                                </button>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT MESSAGERIE PRIVÉE (Version complète avec correction du défilement) ---
        // --- COMPOSANT MESSAGERIE PRIVÉE (Avec Gestion des Demandes) ---
        function Messages({ utilisateurConnecte, contactPreselectionne }) {
            const [listeContacts, setListeContacts] = React.useState([]);
            const [contactSelectionne, setContactSelectionne] = React.useState(null);
            const [historiqueMessages, setHistoriqueMessages] = React.useState([]);
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [infoStatut, setInfoStatut] = React.useState("");
            React.useEffect(() => {
                if (contactPreselectionne) {
                    chargerConversation(contactPreselectionne);
                }
            }, [contactPreselectionne]);

            React.useEffect(() => {
                fetch("../Backend/get_utilisateurs.php")
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) {
                            const autres = utilisateurConnecte ? data.filter(u => u.ID != utilisateurConnecte.ID) : data;
                            setListeContacts(autres);
                        }
                    });
            }, [utilisateurConnecte]);

            const chargerConversation = (contact) => {
                setContactSelectionne(contact);
                setInfoStatut("");
                fetch("../Backend/get_messages.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user1: utilisateurConnecte.ID, user2: contact.ID })
                })
                .then(res => res.json())
                .then(data => { if (!data.erreur) setHistoriqueMessages(data); });
            };

            const handleEnvoyer = (e) => {
                e.preventDefault();
                if (nouveauMessage.trim() === "") return;

                fetch("../Backend/envoyer_message.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ expediteur_id: utilisateurConnecte.ID, destinataire_id: contactSelectionne.ID, contenu: nouveauMessage })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        setNouveauMessage("");
                        if (data.statut === 'En_Attente') {
                            setInfoStatut("⏳ Demande envoyée ! Ce message sera accepté lorsque l'athlète vous suivra en retour.");
                        }
                        chargerConversation(contactSelectionne);
                    }
                });
            };

            if (!utilisateurConnecte) return <div className="card" style={{ textAlign: 'center' }}><h2>Messagerie</h2><p>Connectez-vous pour discuter.</p></div>;

            return (
                <div>
                    {!contactSelectionne ? (
                        <div className="card">
                            <h2>Vos Contacts</h2>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                {listeContacts.map(c => (
                                    <div key={c.ID} onClick={() => chargerConversation(c)} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', cursor: 'pointer', border: '1px solid var(--border-color)' }}>
                                        <strong>{c.Nom}</strong>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="card" style={{ display: 'flex', flexDirection: 'column', height: '60vh' }}>
                            <div style={{ paddingBottom: '1rem', borderBottom: '1px solid var(--border-color)', marginBottom: '1rem' }}>
                                <button onClick={() => setContactSelectionne(null)} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer' }}>⬅ Retour</button>
                                <h3 style={{ display: 'inline', marginLeft: '1rem', color: 'var(--orange-primary)' }}>{contactSelectionne.Nom}</h3>
                            </div>
                            
                            <div style={{ flex: 1, overflowY: 'auto', marginBottom: '1rem' }}>
                                {historiqueMessages.map(msg => {
                                    const estMoi = msg.Expediteur_ID === utilisateurConnecte.ID;
                                    return (
                                        <div key={msg.ID} style={{ display: 'flex', justifyContent: estMoi ? 'flex-end' : 'flex-start', marginBottom: '0.5rem' }}>
                                            <div style={{ backgroundColor: estMoi ? (msg.Statut === 'En_Attente' ? '#555' : 'var(--orange-primary)') : '#333', padding: '0.6rem 1rem', borderRadius: '15px' }}>
                                                {msg.Contenu} {msg.Statut === 'En_Attente' && estMoi && <small style={{ fontSize: '0.7rem', display: 'block', color: '#aaa' }}>(Demande)</small>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {infoStatut && <p style={{ color: 'var(--orange-primary)', fontSize: '0.85rem', margin: '0 0 0.5rem 0' }}>{infoStatut}</p>}

                            <form onSubmit={handleEnvoyer} style={{ display: 'flex', gap: '0.5rem' }}>
                                <input type="text" placeholder="Écrivez votre message..." value={nouveauMessage} onChange={e => setNouveauMessage(e.target.value)} required />
                                <button type="submit" className="btn-primary">➤</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        // --- NOUVEAU COMPOSANT : CONNEXION / INSCRIPTION ---
        function Authentification({ onConnect }) {
            const [isLogin, setIsLogin] = React.useState(true);
            const [formData, setFormData] = React.useState({ nom: '', email: '', motDePasse: '' });
            const [message, setMessage] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setMessage("Chargement...");
                
                // Le fetch pointe vers login.php ou inscription.php selon le mode
                const url = isLogin ? "../Backend/login.php" : "../Backend/inscription.php";
                
                fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.erreur) {
                        setMessage("❌ " + data.erreur);
                    } else {
                        if (isLogin) {
                            setMessage("✅ Connexion réussie !");
                            onConnect(data.utilisateur); // Transmet l'utilisateur au composant principal
                        } else {
                            setMessage("✅ Inscription réussie ! Vous pouvez maintenant vous connecter.");
                            setIsLogin(true); // Bascule sur l'onglet connexion
                        }
                    }
                })
                .catch(() => setMessage("❌ Erreur de communication avec le serveur."));
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)' }}>{isLogin ? "Se connecter" : "Créer un compte"}</h2>
                    <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {!isLogin && (
                            <input type="text" placeholder="Nom complet" value={formData.nom} onChange={e => setFormData({...formData, nom: e.target.value})} required />
                        )}
                        <input type="email" placeholder="Adresse Email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} required />
                        <input type="password" placeholder="Mot de passe" value={formData.motDePasse} onChange={e => setFormData({...formData, motDePasse: e.target.value})} required />
                        
                        <button type="submit" className="btn-primary">{isLogin ? "Connexion" : "S'inscrire"}</button>
                    </form>
                    <p style={{ marginTop: '1.5rem', textAlign: 'center', fontSize: '0.9rem' }}>
                        {isLogin ? "Pas encore de compte ? " : "Déjà un compte ? "}
                        <span style={{ color: 'var(--orange-primary)', cursor: 'pointer', fontWeight: 'bold' }} onClick={() => setIsLogin(!isLogin)}>
                            {isLogin ? "S'inscrire" : "Se connecter"}
                        </span>
                    </p>
                    {message && <p style={{ fontWeight: 'bold', textAlign: 'center', marginTop: '1rem' }}>{message}</p>}
                </div>
            );
        }

        // --- COMPOSANT FIL D'ACTUALITÉ ---
        // Il reçoit désormais "utilisateurConnecte" en paramètre (les props)
        // --- COMPOSANT FIL D'ACTUALITÉ ---
        // --- COMPOSANT FIL D'ACTUALITÉ (Texte, Médias & Commentaires connectés) ---
        // --- COMPOSANT FIL D'ACTUALITÉ (Abonnements & Recommandations) ---
        // --- COMPOSANT FIL D'ACTUALITÉ (Flux, Médias, Commentaires, Signalement) ---
        function FilActualite({ utilisateurConnecte, ouvrirProfil }) {
            const [nouveauMessage, setNouveauMessage] = React.useState("");
            const [fichierMedia, setFichierMedia] = React.useState(null);
            const [publications, setPublications] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);
            const [fluxActif, setFluxActif] = React.useState("recommandations");
            
            // États pour les commentaires
            const [commentairesOuverts, setCommentairesOuverts] = React.useState(null);
            const [texteCommentaire, setTexteCommentaire] = React.useState("");
            const [listeCommentaires, setListeCommentaires] = React.useState([]);

            // Chargement du flux
            const chargerPublications = () => {
                const userId = utilisateurConnecte ? utilisateurConnecte.ID : 0;
                fetch(`../Backend/get_publications.php?user_id=${userId}&flux=${fluxActif}`)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.erreur) setPublications(data);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerPublications(); }, [fluxActif, utilisateurConnecte]);

            // Publication avec support des images/vidéos
            const handlePublier = (e) => {
                e.preventDefault();
                if (!utilisateurConnecte) return alert("Veuillez vous connecter pour publier.");
                
                const formData = new FormData();
                formData.append('contenu', nouveauMessage);
                formData.append('auteur_id', utilisateurConnecte.ID);
                if (fichierMedia) formData.append('media', fichierMedia);

                fetch("../Backend/ajouter_publication.php", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.erreur) alert("❌ " + data.erreur);
                    else {
                        setNouveauMessage("");
                        setFichierMedia(null);
                        document.getElementById("input-fichier").value = "";
                        chargerPublications();
                    }
                });
            };

            // Interactions : Abonnement, Likes, Signalement
            const handleActionAbonnement = (auteurId) => {
                if (!utilisateurConnecte) return alert("Veuillez vous connecter pour vous abonner.");
                fetch("../Backend/suivre_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ suiveur_id: utilisateurConnecte.ID, suivi_id: auteurId })
                })
                .then(res => res.json())
                .then(data => { if (!data.erreur) chargerPublications(); });
            };

            const gererLike = (publicationId) => {
                if (!utilisateurConnecte) return alert("Connectez-vous pour soutenir un athlète.");
                fetch("../Backend/liker_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: publicationId, utilisateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json())
                .then(data => { if (!data.erreur) chargerPublications(); });
            };

            const handleSignaler = (pubId) => {
                if (!utilisateurConnecte) return alert("Connectez-vous pour signaler un contenu.");
                const motif = prompt("Pour quel motif signalez-vous cette publication ? (ex: Propos inappropriés, Spam...)");
                if (!motif) return;

                fetch("../Backend/signaler_publication.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, signaleur_id: utilisateurConnecte.ID, motif: motif })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) alert("✅ " + data.succes);
                });
            };

            // Gestion de la zone de commentaires
            const basculerCommentaires = (pubId) => {
                if (commentairesOuverts === pubId) {
                    setCommentairesOuverts(null);
                } else {
                    setCommentairesOuverts(pubId);
                    setListeCommentaires([]);
                    fetch(`../Backend/get_commentaires.php?pub_id=${pubId}`)
                        .then(res => res.json())
                        .then(data => { if (!data.erreur) setListeCommentaires(data); });
                }
            };

            const envoyerCommentaire = (e, pubId) => {
                e.preventDefault();
                if (!utilisateurConnecte) return alert("Connectez-vous pour commenter.");
                if (texteCommentaire.trim() === "") return;
                fetch("../Backend/ajouter_commentaire.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ publication_id: pubId, auteur_id: utilisateurConnecte.ID, contenu: texteCommentaire })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        setTexteCommentaire("");
                        fetch(`../Backend/get_commentaires.php?pub_id=${pubId}`)
                            .then(res => res.json())
                            .then(nouvellesData => setListeCommentaires(nouvellesData));
                    }
                });
            };

            return (
                <div>
                    {/* Onglets du flux */}
                    <div style={{ display: 'flex', gap: '1rem', marginBottom: '1rem', justifyContent: 'center' }}>
                        <button 
                            onClick={() => setFluxActif("recommandations")}
                            style={{ background: 'none', border: 'none', color: fluxActif === "recommandations" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "recommandations" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}
                        >
                            Pour vous
                        </button>
                        {utilisateurConnecte && (
                            <button 
                                onClick={() => setFluxActif("abonnes")}
                                style={{ background: 'none', border: 'none', color: fluxActif === "abonnes" ? 'var(--orange-primary)' : 'var(--text-muted)', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.1rem', borderBottom: fluxActif === "abonnes" ? '2px solid var(--orange-primary)' : 'none', paddingBottom: '0.3rem' }}
                            >
                                Abonnements
                            </button>
                        )}
                    </div>

                    {/* Zone de création de post */}
                    <div className="card">
                        <form onSubmit={handlePublier} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            <textarea 
                                value={nouveauMessage} 
                                onChange={(e) => setNouveauMessage(e.target.value)} 
                                placeholder="Partagez vos performances ou vos photos..." 
                                rows="3" 
                                required={!fichierMedia} 
                            />
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <input id="input-fichier" type="file" accept="image/*,video/*" onChange={(e) => setFichierMedia(e.target.files[0])} style={{ padding: '0', backgroundColor: 'transparent', border: 'none', width: 'auto' }} />
                                <button type="submit" className="btn-primary">Partager</button>
                            </div>
                        </form>
                    </div>

                    {/* Affichage des publications */}
                    <div className="card">
                        {chargement ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Chargement...</p> : publications.length === 0 ? <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune publication pour le moment.</p> : publications.map(pub => (
                            <div key={pub.ID} className="post">
                                <div className="post-header">
                                    <span className="post-author" onClick={() => ouvrirProfil(pub.Auteur_ID)} style={{ cursor: 'pointer', textDecoration: 'underline' }}>{pub.Nom}</span>
                                    {utilisateurConnecte && utilisateurConnecte.ID !== pub.Auteur_ID && (
                                        <button 
                                            onClick={() => handleActionAbonnement(pub.Auteur_ID)}
                                            style={{ backgroundColor: pub.EstAbonne ? '#333' : 'transparent', color: pub.EstAbonne ? 'white' : 'var(--orange-primary)', border: '1px solid var(--orange-primary)', borderRadius: '15px', padding: '0.2rem 0.8rem', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 'bold' }}
                                        >
                                            {pub.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                        </button>
                                    )}
                                </div>
                                <span className="post-date" style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.85rem', color: 'var(--text-muted)' }}>{pub.Date_Publication}</span>
                                {pub.Contenu && <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>}
                                
                                {/* Affichage Média */}
                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} alt="Performance" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                        )}
                                    </div>
                                )}

                                {/* Barre d'actions */}
                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                                    <button className="btn-like" onClick={() => gererLike(pub.ID)}>🔥 Respect {pub.NbLikes > 0 && `(${pub.NbLikes})`}</button>
                                    <button className="btn-like" onClick={() => basculerCommentaires(pub.ID)}>💬 Commenter</button>
                                    <button className="btn-like" onClick={() => handleSignaler(pub.ID)}>⚠️ Signaler</button>
                                </div>

                                {/* Zone de commentaires */}
                                {commentairesOuverts === pub.ID && (
                                    <div style={{ marginTop: '1rem', padding: '1rem', backgroundColor: '#111', borderRadius: '8px' }}>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.8rem', marginBottom: '1rem' }}>
                                            {listeCommentaires.length === 0 ? <span style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>Soyez le premier à réagir !</span> : listeCommentaires.map(c => (
                                                <div key={c.ID} style={{ fontSize: '0.9rem' }}><strong style={{ color: 'var(--orange-primary)' }}>{c.Nom}</strong> : {c.Contenu}</div>
                                            ))}
                                        </div>
                                        <form onSubmit={(e) => envoyerCommentaire(e, pub.ID)} style={{ display: 'flex', gap: '0.5rem' }}>
                                            <input type="text" placeholder="Écrivez une réponse..." value={texteCommentaire} onChange={(e) => setTexteCommentaire(e.target.value)} style={{ flex: 1, padding: '0.6rem', borderRadius: '20px', backgroundColor: 'var(--bg-dark)' }} required />
                                            <button type="submit" className="btn-primary" style={{ padding: '0.6rem 1.2rem' }}>Envoyer</button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        // --- COMPOSANT PROFIL PUBLIC (Vue d'un autre utilisateur) ---
        function ProfilPublic({ id, visiteur, fermer, demarrerDiscussion }) {
            const [data, setData] = React.useState(null);
            const [chargement, setChargement] = React.useState(true);

            const chargerProfil = () => {
                fetch(`../Backend/get_profil_public.php?id=${id}&visiteur=${visiteur ? visiteur.ID : 0}`)
                    .then(res => res.json())
                    .then(resData => {
                        if (!resData.erreur) setData(resData);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerProfil(); }, [id]);

            const handleActionAbonnement = () => {
                if (!visiteur) return alert("Veuillez vous connecter pour vous abonner.");
                fetch("../Backend/suivre_utilisateur.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ suiveur_id: visiteur.ID, suivi_id: id })
                })
                .then(res => res.json())
                .then(d => {
                    if (!d.erreur) chargerProfil(); // Recharge le profil pour mettre à jour les compteurs
                });
            };

            if (chargement) return <div className="card" style={{ textAlign: 'center' }}>Chargement du profil...</div>;
            if (!data || !data.utilisateur) return <div className="card" style={{ textAlign: 'center' }}>Profil introuvable. <button className="btn-primary" onClick={fermer}>Retour</button></div>;

            const u = data.utilisateur;
            const pubs = data.publications;

            return (
                <div>
                    <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', marginBottom: '1rem', fontSize: '1rem' }}>
                        ⬅ Retour au fil d'actualité
                    </button>

                    <div className="card" style={{ textAlign: 'center' }}>
                        <div className="profile-pic" style={{ width: '80px', height: '80px', margin: '0 auto 1rem auto', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '2.5rem', backgroundColor: '#333' }}>
                            {u.Nom.charAt(0).toUpperCase()}
                        </div>
                        <h2 style={{ color: 'var(--orange-primary)', margin: '0 0 0.5rem 0' }}>{u.Nom}</h2>
                        <p style={{ color: 'var(--text-muted)', margin: '0 0 1.5rem 0' }}>{u.Role}</p>

                        <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnes}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnés</span></div>
                            <div><strong style={{ display: 'block', fontSize: '1.2rem', color: 'white' }}>{u.NbAbonnements}</strong> <span style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Abonnements</span></div>
                        </div>

                        {visiteur && visiteur.ID !== u.ID && (
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '1rem' }}>
                                <button 
                                    onClick={handleActionAbonnement}
                                    className="btn-primary"
                                    style={{ backgroundColor: u.EstAbonne ? '#333' : 'var(--orange-primary)', color: 'white', border: u.EstAbonne ? '1px solid var(--border-color)' : 'none' }}
                                >
                                    {u.EstAbonne ? "Abonné ✓" : "+ Suivre"}
                                </button>
                                <button 
                                    onClick={() => demarrerDiscussion(u)}
                                    className="btn-primary"
                                    style={{ backgroundColor: 'transparent', border: '1px solid var(--orange-primary)', color: 'var(--orange-primary)' }}
                                >
                                    💬 Message
                                </button>
                            </div>
                        )}
                    </div>

                    <h3 style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>Performances de {u.Nom}</h3>

                    {pubs.length === 0 ? (
                        <p style={{ textAlign: 'center', color: 'var(--text-muted)' }}>Aucune publication pour le moment.</p>
                    ) : (
                        pubs.map(pub => (
                            <div key={pub.ID} className="card post" style={{ padding: '1.5rem' }}>
                                <div className="post-header">
                                    <span className="post-author">{pub.Nom}</span>
                                    <span className="post-date">{pub.Date_Publication}</span>
                                </div>
                                <p style={{ margin: '0 0 1rem 0', whiteSpace: 'pre-wrap', lineHeight: '1.5' }}>{pub.Contenu}</p>
                                {/* Affichage Media */}
                                {pub.Media_URL && (
                                    <div style={{ marginBottom: '1rem', textAlign: 'center', backgroundColor: '#000', borderRadius: '8px', overflow: 'hidden' }}>
                                        {pub.Media_URL.match(/\.(mp4|webm)$/i) ? (
                                            <video controls style={{ maxWidth: '100%', maxHeight: '400px', display: 'block', margin: '0 auto' }}>
                                                <source src={`../Backend/${pub.Media_URL}`} type={`video/${pub.Media_URL.split('.').pop()}`} />
                                            </video>
                                        ) : (
                                            <img src={`../Backend/${pub.Media_URL}`} alt="Performance" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                        )}
                                    </div>
                                )}
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>🔥 {pub.NbLikes} Respects</span>
                            </div>
                        ))
                    )}
                </div>
            );
        }
        // --- COMPOSANT NOTIFICATIONS ---
        // --- COMPOSANT MENU DÉROULANT DES NOTIFICATIONS ---
        function NotificationsDropdown({ utilisateurConnecte, fermer }) {
            const [notifs, setNotifs] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            React.useEffect(() => {
                if (utilisateurConnecte) {
                    fetch(`../Backend/get_notifications.php?user_id=${utilisateurConnecte.ID}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!data.erreur) setNotifs(data);
                            setChargement(false);
                        });
                }
            }, [utilisateurConnecte]);

            return (
                <div className="notif-dropdown">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '1rem' }}>
                        <h3 style={{ margin: 0, color: 'var(--orange-primary)', fontSize: '1.1rem' }}>Alertes</h3>
                        <button onClick={fermer} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>✖</button>
                    </div>
                    
                    {chargement ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Vérification...</p>
                    ) : notifs.length === 0 ? (
                        <p style={{ textAlign: 'center', fontSize: '0.9rem', color: 'var(--text-muted)' }}>Aucune activité récente.</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                            {notifs.map(n => (
                                <div key={n.ID} style={{ 
                                    padding: '0.8rem', 
                                    backgroundColor: n.Lu ? 'transparent' : '#1a1a1a', 
                                    borderLeft: n.Lu ? '3px solid transparent' : '3px solid var(--orange-primary)', 
                                    borderRadius: '4px',
                                    fontSize: '0.85rem'
                                }}>
                                    {n.Type_Action === 'Like' && <span>🔥 <strong>{n.ActeurNom}</strong> a lâché un Respect.</span>}
                                    {n.Type_Action === 'Abonnement' && <span>👤 <strong>{n.ActeurNom}</strong> vous suit.</span>}
                                    <div style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginTop: '0.3rem' }}>{n.Date_Notification}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT TABLEAU DE BORD DE MODÉRATION ---
        function DashboardModeration({ utilisateurConnecte }) {
            const [signalements, setSignalements] = React.useState([]);
            const [chargement, setChargement] = React.useState(true);

            const chargerSignalements = () => {
                fetch(`../Backend/get_signalements.php?user_id=${utilisateurConnecte.ID}`)
                    .then(res => res.json())
                    .then(data => {
                        if (!data.erreur) setSignalements(data);
                        setChargement(false);
                    });
            };

            React.useEffect(() => { chargerSignalements(); }, []);

            const commanderAction = (sigId, pubId, action) => {
                fetch("../Backend/traiter_signalement.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ signalement_id: sigId, publication_id: pubId, action: action, moderateur_id: utilisateurConnecte.ID })
                })
                .then(res => res.json())
                .then(data => {
                    if (!data.erreur) {
                        alert("💼 " + data.succes);
                        chargerSignalements(); // Rafraîchit la liste
                    }
                });
            };

            return (
                <div className="card">
                    <h2 style={{ color: 'var(--orange-primary)', marginTop: 0 }}>Espace Modération</h2>
                    <p style={{ color: 'var(--text-muted)' }}>Consultez et traitez les publications signalées par la communauté.</p>
                    
                    {chargement ? (
                        <p style={{ textAlign: 'center' }}>Chargement des alertes...</p>
                    ) : signalements.length === 0 ? (
                        <p style={{ textAlign: 'center', color: '#28a745' }}>✅ Aucun signalement en attente. Bon travail !</p>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            {signalements.map(s => (
                                <div key={s.ID} style={{ padding: '1rem', backgroundColor: '#111', borderRadius: '8px', border: '1px solid #dc3545' }}>
                                    <div style={{ marginBottom: '0.5rem', fontSize: '0.9rem' }}>
                                        ⚠️ Post de <strong>{s.Auteur_Nom || s.AuteurNom}</strong> signalé pour : <span style={{ color: '#dc3545', fontWeight: 'bold' }}>{s.Motif}</span>
                                    </div>
                                    <blockquote style={{ margin: '0 0 1rem 0', paddingLeft: '0.5rem', borderLeft: '2px solid var(--border-color)', color: 'var(--text-muted)', italic: 'true' }}>
                                        "{s.PostContenu}"
                                    </blockquote>
                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'supprimer')} className="btn-primary" style={{ backgroundColor: '#dc3545', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Supprimer le post</button>
                                        <button onClick={() => commanderAction(s.ID, s.PubID, 'rejeter')} className="btn-primary" style={{ backgroundColor: '#333', fontSize: '0.8rem', padding: '0.5rem 1rem' }}>Ignorer</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        // --- COMPOSANT PRINCIPAL (Version intégrée et finalisée) ---
        // --- COMPOSANT PRINCIPAL DE L'APPLICATION ---
        // --- COMPOSANT PRINCIPAL DE L'APPLICATION ---
        function App() {
            const [ongletActif, setOngletActif] = React.useState('accueil');
            const [utilisateurConnecte, setUtilisateurConnecte] = React.useState(null); 
            
            // États pour les profils et les notifications
            const [profilCible, setProfilCible] = React.useState(null); 
            const [contactPreselectionne, setContactPreselectionne] = React.useState(null);
            const [afficherNotifs, setAfficherNotifs] = React.useState(false); // Gère l'ouverture du menu cloche

            const ouvrirProfil = (id) => setProfilCible(id);

            const demarrerDiscussion = (utilisateur) => {
                setContactPreselectionne(utilisateur);
                setProfilCible(null); 
                setOngletActif('messages'); 
            };

            return (
                <div>
                    {/* EN-TÊTE DU SITE */}
                    <header className="top-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                            <span style={{ fontSize: '1.5rem', color: 'var(--orange-primary)', fontWeight: 'bold' }}>Connect</span>
                            <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>Hub</span>
                        </div>
                        
                        <div style={{ display: 'flex', alignItems: 'center' }}>
                            {/* La cloche de notifications (visible seulement si connecté) */}
                            {utilisateurConnecte && (
                                <div className="notif-container">
                                    <button className="notif-bell" onClick={() => setAfficherNotifs(!afficherNotifs)}>
                                        🔔
                                    </button>
                                    {afficherNotifs && (
                                        <NotificationsDropdown 
                                            utilisateurConnecte={utilisateurConnecte} 
                                            fermer={() => setAfficherNotifs(false)} 
                                        />
                                    )}
                                </div>
                            )}

                            <button className="profile-btn" onClick={() => { setOngletActif('profil'); setProfilCible(null); setAfficherNotifs(false); }}>
                                <div className="profile-pic" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', backgroundColor: '#333' }}>
                                    {utilisateurConnecte ? utilisateurConnecte.Nom.charAt(0).toUpperCase() : '👤'}
                                </div>
                                <span>{utilisateurConnecte ? utilisateurConnecte.Nom : "Connexion"}</span>
                            </button>
                        </div>
                    </header>

                    {/* ZONE PRINCIPALE DE L'APPLICATION */}
                    <main style={{ paddingBottom: '2rem' }}>
                        {profilCible ? (
                            <ProfilPublic 
                                id={profilCible} 
                                visiteur={utilisateurConnecte} 
                                fermer={() => setProfilCible(null)}
                                demarrerDiscussion={demarrerDiscussion}
                            />
                        ) : (
                            <>
                                {ongletActif === 'profil' && (
                                    utilisateurConnecte ? (
                                        <Profil 
                                            utilisateurConnecte={utilisateurConnecte} 
                                            setUtilisateurConnecte={setUtilisateurConnecte}
                                            setOngletActif={setOngletActif}
                                        />
                                    ) : (
                                        <Authentification onConnect={(user) => { 
                                            setUtilisateurConnecte(user); 
                                            setOngletActif('accueil'); 
                                        }} />
                                    )
                                )}

                                {ongletActif === 'evenements' && <Evenements utilisateurConnecte={utilisateurConnecte} />}
                                {ongletActif === 'communautes' && <Communautes utilisateurConnecte={utilisateurConnecte} />}
                                {ongletActif === 'accueil' && <FilActualite utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} />}
                                {ongletActif === 'messages' && <Messages utilisateurConnecte={utilisateurConnecte} contactPreselectionne={contactPreselectionne} />}
                                {ongletActif === 'recherche' && <Recherche utilisateurConnecte={utilisateurConnecte} ouvrirProfil={ouvrirProfil} />}
                                {ongletActif === 'moderation' && <DashboardModeration utilisateurConnecte={utilisateurConnecte} />}
                            </>
                        )}
                    </main>

                    {/* NAVIGATION FIXE BAS (Allégée) */}
                    <nav className="bottom-nav">
                        <div className={`nav-item ${ongletActif === 'evenements' ? 'active' : ''}`} onClick={() => { setOngletActif('evenements'); setProfilCible(null); setAfficherNotifs(false); }}>
                            <span className="nav-icon">📅</span>
                            <span style={{ fontSize: '0.7rem' }}>Événements</span>
                        </div>

                        <div className={`nav-item ${ongletActif === 'communautes' ? 'active' : ''}`} onClick={() => { setOngletActif('communautes'); setProfilCible(null); setAfficherNotifs(false); }}>
                            <span className="nav-icon">👥</span>
                            <span style={{ fontSize: '0.7rem' }}>Groupes</span>
                        </div>
                        
                        <div className={`nav-item ${ongletActif === 'accueil' ? 'active' : ''}`} onClick={() => { setOngletActif('accueil'); setProfilCible(null); setAfficherNotifs(false); }}>
                            <span className="nav-icon" style={{ fontSize: '1.6rem', color: ongletActif === 'accueil' ? 'var(--orange-primary)' : 'inherit' }}>🏠</span>
                            <span style={{ fontSize: '0.7rem' }}>Accueil</span>
                        </div>
                        
                        <div className={`nav-item ${ongletActif === 'messages' ? 'active' : ''}`} onClick={() => { setOngletActif('messages'); setProfilCible(null); setAfficherNotifs(false); }}>
                            <span className="nav-icon">💬</span>
                            <span style={{ fontSize: '0.7rem' }}>Messages</span>
                        </div>

                        <div className={`nav-item ${ongletActif === 'recherche' ? 'active' : ''}`} onClick={() => { setOngletActif('recherche'); setProfilCible(null); setAfficherNotifs(false); }}>
                            <span className="nav-icon">🔍</span>
                            <span style={{ fontSize: '0.7rem' }}>Recherche</span>
                        </div>

                        {utilisateurConnecte?.Role === 'Moderateur' && (
                            <div className={`nav-item ${ongletActif === 'moderation' ? 'active' : ''}`} onClick={() => { setOngletActif('moderation'); setProfilCible(null); setAfficherNotifs(false); }}>
                                <span className="nav-icon">🛡️</span>
                                <span style={{ fontSize: '0.7rem' }}>Admin</span>
                            </div>
                        )}
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
